/* ===================== Actions ===================== */
function handleSaveProject(editId){
  var name = document.getElementById('f-project-name').value.trim();
  var desc = document.getElementById('f-project-desc').value.trim();
  var owner = document.getElementById('f-project-owner').value.trim();
  var category = document.getElementById('f-project-category-grid').getAttribute('data-selected');
  var categoryOtherEl = document.getElementById('f-project-category-other');
  var categoryOther = categoryOtherEl ? categoryOtherEl.value.trim() : '';
  var priority = document.getElementById('f-project-priority-grid').getAttribute('data-selected');
  var color = document.getElementById('f-project-swatches').getAttribute('data-color');
  var errEl = document.getElementById('f-project-error');
  if(!name){ errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  var proj;
  if(editId){
    proj = projectById(editId);
    if(proj){
      proj.name = name; proj.description = desc; proj.color = color;
      proj.owner = owner; proj.category = category; proj.categoryOther = categoryOther; proj.priority = priority;
    }
  } else {
    proj = { id: uid('proj'), name: name, description: desc, color: color, owner: owner, category: category, categoryOther: categoryOther, priority: priority, createdAt: Date.now() };
    projects.push(proj);
  }
  pushProject(proj);
  closeModal();
  render();
}

function handleSaveTask(projectId, editId){
  var title = document.getElementById('f-task-title').value.trim();
  var assignee = document.getElementById('f-task-assignee').value.trim();
  var start = document.getElementById('f-task-start').value;
  var due = document.getElementById('f-task-due').value;
  var progress = document.getElementById('f-task-progress').value;
  var errEl = document.getElementById('f-task-error');

  if(!title || !assignee || !start || !due){
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ: ชื่องาน ผู้รับผิดชอบ วันเริ่มต้น และวันกำหนดส่ง';
    errEl.classList.add('show');
    return;
  }
  if(due < start){
    errEl.textContent = 'วันกำหนดส่งต้องไม่อยู่ก่อนวันเริ่มต้น';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  var task;
  if(editId){
    task = taskById(editId);
    if(task){ task.title = title; task.assignee = assignee; task.startDate = start; task.dueDate = due; task.progress = Number(progress); task.updatedAt = Date.now(); }
  } else {
    task = { id: uid('task'), projectId: projectId, title: title, assignee: assignee, startDate: start, dueDate: due, progress: Number(progress), notes: [], createdAt: Date.now() };
    tasks.push(task);
  }
  pushTask(task);
  closeModal();
  render();
}

function handleUpdateProgress(taskId){
  var val = document.getElementById('f-detail-progress').value;
  var t = taskById(taskId);
  if(t){ t.progress = Number(val); t.updatedAt = Date.now(); pushTask(t); }
  closeModal();
  render();
}

function handleAddNote(taskId){
  var ta = document.getElementById('f-new-note');
  var text = ta.value.trim();
  if(!text) return;
  var t = taskById(taskId);
  if(t){
    if(!t.notes) t.notes = [];
    t.notes.push({ id: uid('note'), date: Date.now(), text: text });
    pushTask(t);
  }
  openModal(taskDetailModalHtml(taskId));
}

function handleDeleteProject(projectId){
  if(!confirm('ลบโปรเจกต์นี้และงานทั้งหมดในโปรเจกต์? การลบนี้ไม่สามารถย้อนกลับได้')) return;
  var orphanTasks = tasks.filter(function(t){ return t.projectId === projectId; });
  projects = projects.filter(function(p){ return p.id !== projectId; });
  tasks = tasks.filter(function(t){ return t.projectId !== projectId; });
  removeProject(projectId);
  orphanTasks.forEach(function(t){ removeTask(t.id); });
  if(currentProjectId === projectId) currentProjectId = null;
  render();
}

function handleDeleteTask(taskId){
  if(!confirm('ลบงานนี้? การลบนี้ไม่สามารถย้อนกลับได้')) return;
  tasks = tasks.filter(function(t){ return t.id !== taskId; });
  removeTask(taskId);
  closeModal();
  render();
}

function handleSaveTodo(editId){
  var description = document.getElementById('f-todo-desc').value.trim();
  var assignee = document.getElementById('f-todo-assignee').value.trim();
  var dueDate = document.getElementById('f-todo-due').value;
  var urgency = document.getElementById('f-todo-urgency-grid').getAttribute('data-selected');
  var importance = document.getElementById('f-todo-importance-grid').getAttribute('data-selected');
  var status = document.getElementById('f-todo-status-grid').getAttribute('data-selected');
  var errEl = document.getElementById('f-todo-error');

  if(!description || !assignee || !dueDate){
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ: รายละเอียดงาน ผู้รับผิดชอบ และ Due Date';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  var todo;
  if(editId){
    todo = todoById(editId);
    if(todo){ todo.description = description; todo.assignee = assignee; todo.dueDate = dueDate; todo.urgency = urgency; todo.importance = importance; todo.status = status; todo.updatedAt = Date.now(); }
  } else {
    todo = { id: uid('todo'), description: description, assignee: assignee, dueDate: dueDate, urgency: urgency, importance: importance, status: status, notes: [], createdAt: Date.now() };
    todos.push(todo);
  }
  pushTodo(todo);
  closeModal();
  render();
}

function handleDeleteTodo(todoId){
  if(!confirm('ลบงานนี้? การลบนี้ไม่สามารถย้อนกลับได้')) return;
  todos = todos.filter(function(t){ return t.id !== todoId; });
  removeTodo(todoId);
  closeModal();
  render();
}

function handleAddTodoNote(todoId){
  var ta = document.getElementById('ta-' + todoId);
  if(!ta) return;
  var text = ta.value.trim();
  if(!text) return;
  var td = todoById(todoId);
  if(td){
    if(!td.notes) td.notes = [];
    td.notes.push({ id: uid('tnote'), date: Date.now(), text: text });
    pushTodo(td);
  }
  render();
  // re-open the panel after render
  setTimeout(function(){
    var panel = document.getElementById('tnp-' + todoId);
    if(panel) panel.style.display = 'table-row';
  }, 50);
}

function exportProjectToExcel(pid){
  var p = projectById(pid);
  if(!p) return;
  if(typeof XLSX === 'undefined'){
    alert('ไม่สามารถโหลดไลบรารี Excel ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่');
    return;
  }
  var pt = sortByStartDate(tasksOfProject(pid));
  if(!pt.length){ alert('โปรเจกต์นี้ยังไม่มีงานให้ export'); return; }

  /* ── Sheet 1: task data ── */
  var dataRows = [['ลำดับ','ชื่องาน','ผู้รับผิดชอบ','วันเริ่มต้น','วันกำหนดส่ง','ระยะเวลา (วัน)','ความคืบหน้า (%)','สถานะ','เกินกำหนด (วัน)','บันทึกล่าสุด']];
  pt.forEach(function(t, idx){
    var s = statusInfo(t);
    var note = latestNote(t);
    var dur = (t.startDate && t.dueDate) ? (dayDiff(parseDateStr(t.startDate), parseDateStr(t.dueDate)) + 1) : '';
    dataRows.push([idx+1, t.title, t.assignee, t.startDate||'', t.dueDate||'', dur, Number(t.progress), s.label, overdueDaysOf(t)||'', note ? note.text : '']);
  });
  var ws1 = XLSX.utils.aoa_to_sheet(dataRows);
  ws1['!cols'] = [{wch:5},{wch:34},{wch:16},{wch:12},{wch:12},{wch:11},{wch:12},{wch:15},{wch:11},{wch:42}];

  /* ── Sheet 2: text Gantt grid ── */
  var validTasks = pt.filter(function(t){ return t.startDate && t.dueDate; });
  var ganttRows = [['โปรเจกต์: ' + p.name + '   (ส่งออกเมื่อ ' + fmtDateThai(todayStr()) + ')']];
  if(validTasks.length){
    var minS = null, maxE = null;
    validTasks.forEach(function(t){
      var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
      if(!minS || s < minS) minS = s;
      if(!maxE || e > maxE) maxE = e;
    });
    var todayD = parseDateStr(todayStr());
    var rangeStartD = minS;
    var rangeEndD = (maxE && maxE > todayD) ? maxE : todayD;
    var totalDays = dayDiff(rangeStartD, rangeEndD) + 1;

    var monthRow = ['', '', '', ''];
    var dayRow = ['ชื่องาน', 'ผู้รับผิดชอบ', 'ความคืบหน้า', 'สถานะ'];
    for(var i=0;i<totalDays;i++){
      var d = addDays(rangeStartD, i);
      monthRow.push((i===0 || d.getDate()===1) ? fmtMonthYearShort(d) : '');
      var dayLabel = String(d.getDate());
      if(toDateStr(d) === todayStr()) dayLabel = '[' + dayLabel + ']';
      dayRow.push(dayLabel);
    }
    ganttRows.push(monthRow, dayRow);

    validTasks.forEach(function(t){
      var s = statusInfo(t);
      var row = [t.title, t.assignee, t.progress + '%', s.label];
      var ts = parseDateStr(t.startDate), te = parseDateStr(t.dueDate);
      var totalTaskDays = dayDiff(ts, te) + 1;
      var completedDays = Math.round(totalTaskDays * Number(t.progress) / 100);
      for(var di=0; di<totalDays; di++){
        var dd = addDays(rangeStartD, di);
        var ds = toDateStr(dd);
        var cell = '';
        if(ds >= t.startDate && ds <= t.dueDate){
          var dayIdxInTask = dayDiff(ts, dd);
          cell = dayIdxInTask < completedDays ? '\u25A0' : '\u25A2';
        } else if(isOverdue(t) && ds > t.dueDate && ds <= todayStr()){
          cell = '\u2715';
        }
        row.push(cell);
      }
      ganttRows.push(row);
    });
    ganttRows.push([]);
    ganttRows.push(['สัญลักษณ์:  \u25A0 = ดำเนินการแล้ว    \u25A2 = ตามแผน (ยังไม่ถึง)    \u2715 = เกินกำหนด    [ ] = วันนี้']);
  } else {
    ganttRows.push(['ไม่มีงานที่มีวันเริ่มต้นและวันกำหนดส่งครบถ้วนสำหรับสร้างแผนภูมิ']);
  }
  var ws2 = XLSX.utils.aoa_to_sheet(ganttRows);
  var cols2 = [{wch:30},{wch:14},{wch:10},{wch:15}];
  var dayColCount = Math.max(0, (ganttRows[1] ? ganttRows[1].length : 4) - 4);
  for(var c=0;c<dayColCount;c++) cols2.push({wch:3});
  ws2['!cols'] = cols2;

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, 'ข้อมูลงาน');
  XLSX.utils.book_append_sheet(wb, ws2, 'Gantt Chart (Text)');

  var safeName = p.name.replace(/[^a-zA-Z0-9ก-๙_\- ]+/g, '_').trim() || 'project';
  var fileBase = 'QAQC_' + safeName + '_' + todayStr();
  XLSX.writeFile(wb, fileBase + '.xlsx');

  /* ── Gantt PNG: render to hidden canvas then download ── */
  if(!validTasks.length) return;
  try {
    var CELL_H = 28, LEFT_W = 260, ASSIGNEE_W = 110, PCT_W = 60, DAY_W = 22, HDR_H = 46, TITLE_H = 36, PAD = 16;
    var totalDays2 = dayDiff(minS, (maxE > todayD ? maxE : todayD)) + 1;
    var cw = LEFT_W + ASSIGNEE_W + PCT_W + DAY_W * totalDays2 + PAD * 2;
    var ch = TITLE_H + HDR_H + validTasks.length * CELL_H + PAD * 2 + 28;
    var cv = document.createElement('canvas');
    cv.width = cw; cv.height = ch;
    var ctx = cv.getContext('2d');

    // background
    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, cw, ch);

    // title
    ctx.fillStyle = '#1E293B'; ctx.font = 'bold 14px IBM Plex Sans, Arial';
    ctx.fillText('Gantt Chart — ' + p.name, PAD, PAD + 20);
    ctx.fillStyle = '#64748B'; ctx.font = '11px IBM Plex Sans, Arial';
    ctx.fillText('Export: ' + fmtDateThai(todayStr()), PAD, PAD + 36);

    var y0 = TITLE_H + PAD;
    var x0 = PAD;

    // header row bg
    ctx.fillStyle = '#F1F5F9';
    ctx.fillRect(x0, y0, cw - PAD*2, HDR_H);

    // month/day headers
    ctx.fillStyle = '#475569'; ctx.font = 'bold 10px IBM Plex Sans, Arial';
    ctx.fillText('งาน', x0 + 6, y0 + 15);
    ctx.fillText('ผู้รับผิดชอบ', x0 + LEFT_W + 4, y0 + 15);
    ctx.fillText('%', x0 + LEFT_W + ASSIGNEE_W + 6, y0 + 15);

    for(var di=0; di<totalDays2; di++){
      var dd2 = addDays(minS, di);
      var dx = x0 + LEFT_W + ASSIGNEE_W + PCT_W + di * DAY_W;
      if(di === 0 || dd2.getDate() === 1){
        ctx.fillStyle = '#334155'; ctx.font = 'bold 9px IBM Plex Sans, Arial';
        ctx.fillText(fmtMonthYearShort(dd2), dx + 1, y0 + 14);
      }
      // day number
      var isToday = toDateStr(dd2) === todayStr();
      ctx.fillStyle = isToday ? '#DC2626' : (dd2.getDay()===0||dd2.getDay()===6 ? '#94A3B8' : '#475569');
      ctx.font = (isToday ? 'bold ' : '') + '9px IBM Plex Sans, Arial';
      ctx.fillText(String(dd2.getDate()), dx + (dd2.getDate() < 10 ? 7 : 4), y0 + 30);
    }

    // task rows
    validTasks.forEach(function(t, ri){
      var ry = y0 + HDR_H + ri * CELL_H;
      // alternating bg
      ctx.fillStyle = ri % 2 === 0 ? '#FFFFFF' : '#F8FAFC';
      ctx.fillRect(x0, ry, cw - PAD*2, CELL_H);

      // task name
      var s = statusInfo(t);
      var dotColor = s.color;
      ctx.fillStyle = dotColor; ctx.beginPath(); ctx.arc(x0 + 8, ry + CELL_H/2, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1E293B'; ctx.font = '11px IBM Plex Sans, Arial';
      var title = t.title.length > 28 ? t.title.slice(0,27)+'…' : t.title;
      ctx.fillText(title, x0 + 18, ry + CELL_H/2 + 4);

      // assignee
      ctx.fillStyle = '#475569'; ctx.font = '10px IBM Plex Sans, Arial';
      var asgn = (t.assignee||'').length > 14 ? (t.assignee||'').slice(0,13)+'…' : (t.assignee||'');
      ctx.fillText(asgn, x0 + LEFT_W + 4, ry + CELL_H/2 + 4);

      // progress
      ctx.fillStyle = '#64748B'; ctx.font = '10px IBM Plex Sans, Arial';
      ctx.fillText(t.progress + '%', x0 + LEFT_W + ASSIGNEE_W + 6, ry + CELL_H/2 + 4);

      // bars
      var ts2 = parseDateStr(t.startDate), te2 = parseDateStr(t.dueDate);
      var totalTaskDays2 = dayDiff(ts2, te2) + 1;
      var completedDays2 = Math.round(totalTaskDays2 * Number(t.progress) / 100);
      var barY = ry + 7, barH = CELL_H - 14;

      for(var di2=0; di2<totalDays2; di2++){
        var dd3 = addDays(minS, di2);
        var ds2 = toDateStr(dd3);
        var bx = x0 + LEFT_W + ASSIGNEE_W + PCT_W + di2 * DAY_W;
        if(ds2 >= t.startDate && ds2 <= t.dueDate){
          var dayIdx2 = dayDiff(ts2, dd3);
          if(dayIdx2 < completedDays2){
            ctx.fillStyle = dotColor; ctx.globalAlpha = 0.85;
          } else {
            ctx.fillStyle = dotColor; ctx.globalAlpha = 0.25;
          }
          ctx.fillRect(bx + 1, barY, DAY_W - 2, barH);
          ctx.globalAlpha = 1;
        } else if(isOverdue(t) && ds2 > t.dueDate && ds2 <= todayStr()){
          ctx.fillStyle = '#DC2626'; ctx.globalAlpha = 0.3;
          ctx.fillRect(bx + 1, barY, DAY_W - 2, barH);
          ctx.globalAlpha = 1;
        }
        // today line
        if(toDateStr(dd3) === todayStr()){
          ctx.strokeStyle = '#DC2626'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.7;
          ctx.beginPath(); ctx.moveTo(bx + DAY_W/2, y0 + HDR_H); ctx.lineTo(bx + DAY_W/2, y0 + HDR_H + validTasks.length * CELL_H); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
      // row bottom border
      ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 0.5; ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.moveTo(x0, ry + CELL_H); ctx.lineTo(x0 + cw - PAD*2, ry + CELL_H); ctx.stroke();
    });

    // legend
    var ly = y0 + HDR_H + validTasks.length * CELL_H + 8;
    ctx.fillStyle = '#94A3B8'; ctx.font = '10px IBM Plex Sans, Arial';
    ctx.fillText('■ ดำเนินการแล้ว (ตามสัดส่วน %)   □ ตามแผน   ▪ เกินกำหนด   | = วันนี้', x0 + 4, ly + 14);

    // outer border
    ctx.strokeStyle = '#CBD5E1'; ctx.lineWidth = 1;
    ctx.strokeRect(x0, y0, cw - PAD*2, HDR_H + validTasks.length * CELL_H);

    // download PNG
    var link = document.createElement('a');
    link.download = fileBase + '_Gantt.png';
    link.href = cv.toDataURL('image/png');
    link.click();
  } catch(err){
    console.warn('Gantt PNG render failed:', err);
  }
}

/* ===================== Event delegation ===================== */
document.addEventListener('input', function(e){
  if(e.target && e.target.id === 'todo-assignee-search'){
    todoFilterAssignee = e.target.value;
    render();
    var el = document.getElementById('todo-assignee-search');
    if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }
});

document.addEventListener('click', function(e){
  if(overlay){ closeModal(); return; }

  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.getAttribute('data-action');
  var id = el.getAttribute('data-id');

  switch(action){
    case 'goto-view':
      currentView = el.getAttribute('data-view');
      if(currentView !== 'projects') currentProjectId = null;
      render();
      break;
    case 'back-to-projects':
      currentProjectId = null;
      render();
      break;
    case 'open-project':
      currentProjectId = id;
      render();
      break;
    case 'open-project-modal':
      openModal(projectModalHtml(null));
      break;
    case 'edit-project':
      openModal(projectModalHtml(id));
      break;
    case 'delete-project':
      handleDeleteProject(id);
      break;
    case 'pick-color':
      var wrap = el.closest('.swatches');
      wrap.setAttribute('data-color', el.getAttribute('data-color'));
      Array.prototype.forEach.call(wrap.querySelectorAll('.swatch'), function(sw){ sw.classList.remove('selected'); });
      el.classList.add('selected');
      break;
    case 'select-category':
      var catId = el.getAttribute('data-cat-id');
      var catGrid = document.getElementById('f-project-category-grid');
      catGrid.setAttribute('data-selected', catId);
      Array.prototype.forEach.call(catGrid.querySelectorAll('.category-card'), function(card){
        var isSel = card.getAttribute('data-cat-id') === catId;
        card.classList.toggle('selected', isSel);
        var checkEl = card.querySelector('.cc-check');
        if(isSel && !checkEl){
          card.querySelector('.cc-title').insertAdjacentHTML('beforeend', ' <span class="cc-check">&#10003;</span>');
        } else if(!isSel && checkEl){
          checkEl.remove();
        }
      });
      var otherWrap = document.getElementById('f-category-other-wrap');
      if(otherWrap) otherWrap.style.display = (catId === 'other') ? 'block' : 'none';
      break;
    case 'select-option':
      var val = el.getAttribute('data-val');
      var grid = el.closest('.priority-grid');
      grid.setAttribute('data-selected', val);
      Array.prototype.forEach.call(grid.querySelectorAll('.priority-btn'), function(btn){
        var isSel = btn.getAttribute('data-val') === val;
        btn.classList.toggle('selected', isSel);
        var tint = btn.getAttribute('data-tint');
        btn.style.background = isSel ? tint : '';
      });
      break;
    case 'save-project':
      handleSaveProject(id || null);
      break;
    case 'open-task-modal':
      openModal(taskModalHtml(id, null));
      break;
    case 'open-edit-task':
      var tk = taskById(id);
      if(tk) openModal(taskModalHtml(tk.projectId, id));
      break;
    case 'save-task':
      handleSaveTask(el.getAttribute('data-pid'), id || null);
      break;
    case 'delete-task':
      handleDeleteTask(id);
      break;
    case 'export-project-excel':
      exportProjectToExcel(id);
      break;
    case 'open-todo-modal':
      openModal(todoModalHtml(id || null));
      break;
    case 'save-todo':
      handleSaveTodo(id || null);
      break;
    case 'delete-todo':
      handleDeleteTodo(id);
      break;
    case 'toggle-todo-notes':
      e.stopPropagation();
      var panel = document.getElementById('tnp-' + id);
      if(panel){
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'table-row' : 'none';
      }
      break;
    case 'add-todo-note':
      e.stopPropagation();
      handleAddTodoNote(id);
      break;
    case 'clear-todo-assignee':
      todoFilterAssignee = '';
      render();
      break;
      var winKey = el.getAttribute('data-key');
      todoFilterWindow = (todoFilterWindow === winKey) ? 'all' : winKey;
      render();
      break;
    case 'toggle-todo-status-filter':
      todoFilterStatus = el.getAttribute('data-key');
      render();
      break;
    case 'open-task-detail':
      currentTaskId = id;
      openModal(taskDetailModalHtml(id));
      break;
    case 'update-progress':
      handleUpdateProgress(id);
      break;
    case 'add-note':
      handleAddNote(id);
      break;
    case 'apply-owner-filter':
      projectFilterOwner = document.getElementById('f-filter-owner').value.trim();
      render();
      break;
    case 'clear-project-filters':
      projectFilterCategory = 'all';
      projectFilterPriority = 'all';
      projectFilterOwner = '';
      render();
      break;
    case 'apply-gantt-range':
      var gs = document.getElementById('gantt-range-start').value;
      var ge = document.getElementById('gantt-range-end').value;
      if(gs && ge && gs <= ge){ ganttRangeStart = gs; ganttRangeEnd = ge; ganttZoomMode = 'custom'; }
      render();
      break;
    case 'fit-gantt-range':
      ganttRangeStart = null;
      ganttRangeEnd = null;
      ganttZoomMode = 'custom';
      render();
      break;
    case 'gantt-zoom-month':
      var nowM = new Date();
      ganttRangeStart = toDateStr(firstDayOfMonth(nowM));
      ganttRangeEnd = toDateStr(lastDayOfMonth(nowM));
      ganttZoomMode = 'month';
      render();
      break;
    case 'gantt-zoom-week':
      var nowW = new Date();
      var monday = mostRecentMonday(nowW);
      ganttRangeStart = toDateStr(monday);
      ganttRangeEnd = toDateStr(addDays(monday, 6));
      ganttZoomMode = 'week';
      render();
      break;
    case 'gantt-zoom-custom':
      ganttZoomMode = 'custom';
      render();
      break;
    case 'gantt-jump-today':
      var nowT = new Date();
      ganttRangeStart = toDateStr(addDays(nowT, -7));
      ganttRangeEnd = toDateStr(addDays(nowT, 30));
      ganttZoomMode = 'custom';
      render();
      break;
    case 'toggle-gantt-group':
      ganttCollapsed[id] = !ganttCollapsed[id];
      render();
      break;
    case 'close-modal':
      closeModal();
      break;
    default:
      break;
  }
}, false);

document.addEventListener('change', function(e){
  if(!e.target) return;
  var action = e.target.getAttribute('data-action');
  if(action === 'filter-gantt'){
    ganttFilterProject = e.target.value;
    render();
    return;
  }
  if(action === 'filter-project-category'){
    projectFilterCategory = e.target.value;
    render();
    return;
  }
  if(action === 'filter-project-priority'){
    projectFilterPriority = e.target.value;
    render();
    return;
  }
  if(action === 'todo-status-select'){
    var todoId = e.target.getAttribute('data-id');
    var td = todoById(todoId);
    if(td){ td.status = e.target.value; td.updatedAt = Date.now(); pushTodo(td); }
    render();
    return;
  }
}, false);

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
  if(e.key === 'Enter' && e.target && e.target.id === 'f-filter-owner'){
    projectFilterOwner = e.target.value.trim();
    render();
  }
}, false);

/* ===================== Init ===================== */
render();
loadAll();

})();
