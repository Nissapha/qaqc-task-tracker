<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA/QC Task Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#F1F5F7;
  --panel:#FFFFFF;
  --ink:#1C2733;
  --ink-soft:#62707F;
  --ink-faint:#94A2AF;
  --line:#DCE4E9;
  --line-soft:#E9EFF2;
  --navy:#163A53;
  --navy-deep:#0E2738;
  --navy-soft:#E4ECF1;
  --teal:#2A9D8F;
  --teal-soft:#E1F1EE;
  --amber:#E8954B;
  --amber-soft:#FBEEE0;
  --coral:#D9614F;
  --coral-soft:#F9E5E1;
  --slate:#94A2AF;
  --slate-soft:#EBEFF2;
  --radius:10px;
  --shadow: 0 1px 2px rgba(14,39,56,0.05), 0 6px 18px rgba(14,39,56,0.07);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif;
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 28px 28px;
  color:var(--ink);
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono', monospace;}

/* ---------- Topbar ---------- */
.topbar{
  background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  color:#fff;
  padding:18px 24px 0 24px;
  position:sticky; top:0; z-index:30;
  box-shadow:0 4px 16px rgba(14,39,56,0.18);
}
.topbar-inner{
  display:flex; align-items:flex-end; justify-content:space-between;
  max-width:1280px; margin:0 auto;
  flex-wrap:wrap; gap:12px;
}
.brand{display:flex; flex-direction:column; gap:2px; padding-bottom:14px;}
.brand-eyebrow{
  font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:0.18em; color:#9FC3D6; text-transform:uppercase;
}
.brand-title{font-size:22px; font-weight:700; letter-spacing:-0.01em;}
.brand-sub{font-size:12.5px; color:#B9D2DE;}
.tabs{display:flex; gap:4px;}
.tab{
  background:transparent; border:none; color:#C8DCE6; cursor:pointer;
  font-family:'IBM Plex Sans'; font-size:14px; font-weight:600;
  padding:10px 16px 12px 16px; border-radius:8px 8px 0 0;
  position:relative; top:1px;
}
.tab:hover{color:#fff;}
.tab.active{background:var(--bg); color:var(--navy);}
.tab .tab-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--coral); margin-left:6px; vertical-align:middle;}

/* ---------- Layout ---------- */
.page{max-width:1280px; margin:0 auto; padding:26px 24px 60px 24px;}
.page-head{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px;}
.page-title{font-size:19px; font-weight:700; color:var(--navy);}
.page-desc{font-size:13px; color:var(--ink-soft); margin-top:2px;}

.btn{
  font-family:'IBM Plex Sans'; font-size:13.5px; font-weight:600; cursor:pointer;
  border-radius:8px; padding:9px 16px; border:1px solid transparent; transition:transform .08s ease, box-shadow .15s ease;
  display:inline-flex; align-items:center; gap:6px;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--navy); color:#fff;}
.btn-primary:hover{background:var(--navy-deep);}
.btn-ghost{background:var(--panel); color:var(--navy); border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--navy);}
.btn-danger{background:var(--coral-soft); color:var(--coral); border:1px solid #F0C7BF;}
.btn-danger:hover{background:#F4D6CF;}
.btn-sm{padding:6px 11px; font-size:12.5px; border-radius:7px;}
.btn[disabled]{opacity:0.45; cursor:not-allowed;}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}

/* ---------- Empty state ---------- */
.empty-state{
  text-align:center; padding:56px 24px; color:var(--ink-soft);
  border:1.5px dashed var(--line); border-radius:var(--radius); background:repeating-linear-gradient(135deg, var(--panel) 0 10px, #FAFCFD 10px 20px);
}
.empty-state .es-icon{font-size:28px; margin-bottom:10px;}
.empty-state .es-title{font-weight:700; color:var(--navy); font-size:15px; margin-bottom:4px;}
.empty-state .es-sub{font-size:13px; max-width:380px; margin:0 auto 16px auto;}

/* ---------- KPI ---------- */
.kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
@media (max-width:880px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card{padding:16px 18px; position:relative; overflow:hidden;}
.kpi-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent, var(--navy));}
.kpi-label{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
.kpi-value{font-family:'IBM Plex Mono'; font-size:28px; font-weight:700; color:var(--ink); margin-top:6px;}
.kpi-foot{font-size:12px; color:var(--ink-faint); margin-top:4px;}

/* ---------- Stamp (circular progress) ---------- */
.stamp-wrap{
  width:56px; height:56px; border-radius:50%; border:2px dashed var(--line);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.stamp{
  width:44px; height:44px; border-radius:50%;
  background:conic-gradient(var(--scolor) calc(var(--spct)*1%), var(--slate-soft) 0);
  display:flex; align-items:center; justify-content:center; position:relative;
}
.stamp::before{content:''; position:absolute; inset:4px; border-radius:50%; background:var(--panel);}
.stamp span{position:relative; font-family:'IBM Plex Mono'; font-weight:700; font-size:11.5px; color:var(--scolor);}

/* ---------- Projects grid ---------- */
.project-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
@media (max-width:980px){.project-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:680px){.project-grid{grid-template-columns:1fr;}}
.project-card{padding:18px; cursor:pointer; transition:box-shadow .15s ease, border-color .15s ease; display:flex; flex-direction:column; gap:12px;}
.project-card:hover{border-color:var(--pcolor); box-shadow:0 2px 4px rgba(14,39,56,0.06), 0 10px 22px rgba(14,39,56,0.1);}
.project-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.project-tag{width:10px; height:10px; border-radius:3px; background:var(--pcolor); flex-shrink:0; margin-top:5px;}
.project-name{font-size:15px; font-weight:700; color:var(--navy); line-height:1.3;}
.project-desc{font-size:12.5px; color:var(--ink-soft); margin-top:3px; line-height:1.4;}
.project-card-bottom{display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line-soft); padding-top:12px;}
.project-stats{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px;}
.project-stats b{color:var(--ink); font-family:'IBM Plex Mono';}
.card-actions{display:flex; gap:6px;}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;}
table.tk{width:100%; border-collapse:collapse; font-size:13px;}
table.tk th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);
  font-weight:600; padding:10px 12px; border-bottom:1.5px solid var(--line); background:#FAFCFD; white-space:nowrap;
}
table.tk td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
table.tk tr.task-row{cursor:pointer;}
table.tk tr.task-row:hover{background:#FAFCFD;}
.task-title{font-weight:600; color:var(--ink);}
.task-meta{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}

.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:4px 9px;
  border-radius:20px; white-space:nowrap;
}
.badge-slate{background:var(--slate-soft); color:#5C6B79;}
.badge-amber{background:var(--amber-soft); color:#A85F22;}
.badge-teal{background:var(--teal-soft); color:#1D7468;}
.badge-coral{background:var(--coral-soft); color:#B8412E;}
.badge-cat{background:var(--navy-soft); color:var(--navy);}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}

.progress-track{width:90px; height:7px; background:var(--slate-soft); border-radius:5px; overflow:hidden;}
.progress-fill{height:100%; border-radius:5px;}

/* ---------- Forms / Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(14,39,56,0.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; padding:20px; z-index:100;
}
.modal-panel{
  background:var(--panel); border-radius:14px; max-width:560px; width:100%; max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(14,39,56,0.35); animation:modalIn .15s ease;
}
@keyframes modalIn{from{opacity:0; transform:translateY(6px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);}}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
.modal-head h3{margin:0; font-size:16px; color:var(--navy); font-weight:700;}
.modal-close{background:none; border:none; cursor:pointer; font-size:18px; color:var(--ink-faint); padding:2px 6px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px 20px 22px; display:flex; justify-content:flex-end; gap:8px;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
.field input[type=text], .field input[type=date], .field select, .field textarea{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13.5px;
  font-family:'IBM Plex Sans'; color:var(--ink); background:#FCFDFE;
}
.field textarea{resize:vertical; min-height:60px; font-family:'IBM Plex Sans';}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--navy); outline-offset:1px; border-color:var(--navy);}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.field-error{color:var(--coral); font-size:12px; margin-top:6px; display:none;}
.field-error.show{display:block;}
.swatches{display:flex; gap:8px;}
.swatch{width:26px; height:26px; border-radius:7px; cursor:pointer; border:2px solid transparent;}
.swatch.selected{border-color:var(--ink);}

/* ---------- Task detail modal ---------- */
.task-detail-meta{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; font-size:13px;}
.tdm-item{background:#FAFCFD; border:1px solid var(--line-soft); border-radius:8px; padding:9px 11px;}
.tdm-item .tdm-label{font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:2px;}
.tdm-item .tdm-value{font-weight:600; color:var(--ink); font-family:'IBM Plex Mono'; font-size:13px;}

.notes-list{display:flex; flex-direction:column; gap:10px; max-height:220px; overflow-y:auto; margin-top:10px; padding-right:4px;}
.note-item{background:#FAFCFD; border-left:3px solid var(--navy-soft); border-radius:6px; padding:8px 11px;}
.note-date{font-size:11px; color:var(--ink-faint); font-family:'IBM Plex Mono'; margin-bottom:3px;}
.note-text{font-size:13px; color:var(--ink); line-height:1.45; white-space:pre-wrap;}
.section-label{font-size:12.5px; font-weight:700; color:var(--navy); margin:18px 0 8px 0; display:flex; align-items:center; gap:6px;}
.add-note-row{display:flex; gap:8px; margin-top:10px; align-items:flex-start;}
.add-note-row textarea{flex:1;}

/* ---------- Gantt ---------- */
.gantt-legend{display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap;}
.legend-item{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}
.legend-dot{width:10px; height:10px; border-radius:3px;}
.gantt-wrap{display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--panel);}
.gantt-labels{width:230px; flex-shrink:0; border-right:1.5px solid var(--line); background:#FAFCFD;}
.gantt-label-head{height:46px; border-bottom:1.5px solid var(--line); display:flex; align-items:center; padding:0 12px; font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em;}
.gantt-label-row{height:42px; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid var(--line-soft); font-size:12.5px;}
.gantt-label-row .glr-title{font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.gantt-label-row .glr-sub{font-size:10.5px; color:var(--ink-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.gantt-group-row{height:30px; background:var(--navy-soft); display:flex; align-items:center; padding:0 12px; font-size:11.5px; font-weight:700; color:var(--navy); border-bottom:1px solid var(--line-soft);}
.gantt-scroll{overflow-x:auto; flex:1;}
.gantt-timeline{position:relative;}
.gantt-tick-row{height:46px; position:relative; border-bottom:1.5px solid var(--line);}
.gantt-tick{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft);}
.gantt-tick-label{position:absolute; top:14px; font-size:10.5px; color:var(--ink-faint); font-family:'IBM Plex Mono'; padding-left:4px; white-space:nowrap;}
.gantt-body-rows{position:relative;}
.gantt-bg-tick{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft); z-index:0;}
.gantt-row-track{height:42px; border-bottom:1px solid var(--line-soft); position:relative;}
.gantt-group-track{height:30px; background:var(--navy-soft); border-bottom:1px solid var(--line-soft); position:relative;}
.gantt-bar{
  position:absolute; top:8px; height:26px; border-radius:6px; cursor:pointer;
  display:flex; align-items:center; padding:0 8px; overflow:hidden;
  font-size:11px; font-weight:700; color:#fff; white-space:nowrap;
  box-shadow:0 1px 2px rgba(0,0,0,0.15);
}
.gantt-today-line{position:absolute; top:0; bottom:0; width:2px; background:var(--coral); z-index:5;}
.gantt-today-label{position:absolute; top:-1px; left:5px; font-size:10px; color:var(--coral); font-weight:700; background:var(--panel); padding:1px 4px; border-radius:4px; z-index:6; white-space:nowrap;}

/* ---------- Gantt bar v2: progress fill + overrun + date flanks ---------- */
.gantt-bar-outer{position:absolute; top:8px; height:26px; border-radius:6px; overflow:hidden; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.12); background:var(--slate-soft); z-index:2;}
.gantt-bar-outer.is-group{top:6px; height:30px; border:2px solid var(--gcolor, var(--navy)); box-shadow:none;}
.gantt-bar-fill{position:absolute; top:0; left:0; bottom:0;}
.gantt-bar-label{position:absolute; top:0; bottom:0; display:flex; align-items:center; font-size:11px; font-weight:700; white-space:nowrap; padding:0 6px; z-index:3; pointer-events:none;}
.gantt-overrun{position:absolute; top:8px; height:26px; border-radius:0 6px 6px 0; display:flex; align-items:center; justify-content:center; font-size:9.5px; font-weight:700; color:#fff; cursor:pointer; z-index:2;
  background:repeating-linear-gradient(45deg, var(--coral) 0 6px, #B8412E 6px 12px); box-shadow:0 1px 2px rgba(0,0,0,.12);}
.gantt-overrun.is-group{top:6px; height:30px;}
.gantt-date-flank{position:absolute; top:0; height:42px; display:flex; align-items:center; font-size:10px; color:var(--ink-faint); font-family:'IBM Plex Mono'; white-space:nowrap; pointer-events:none; z-index:1;}
.gantt-date-flank.is-group{height:30px;}
.gantt-date-flank.flank-start{left:0; justify-content:flex-end; padding-right:6px;}
.gantt-date-flank.flank-end{justify-content:flex-start; padding-left:6px;}
.gantt-date-flank.flank-overdue{color:var(--coral); font-weight:700;}
.legend-dot.striped{background:repeating-linear-gradient(45deg, var(--coral) 0 4px, #B8412E 4px 8px);}

/* ---------- Gantt group rows (collapsible) ---------- */
.gantt-group-row{cursor:pointer; gap:8px;}
.ggr-chevron{display:inline-block; width:12px; flex-shrink:0; transition:transform .15s ease; font-size:10px;}
.ggr-chevron.collapsed{transform:rotate(-90deg);}
.ggr-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.ggr-name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.ggr-pct{font-family:'IBM Plex Mono'; font-size:11px; font-weight:700; flex-shrink:0;}

/* ---------- Gantt toolbar ---------- */
.gantt-toolbar{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
.gantt-toolbar-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.gtb-label{font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:5px;}
.zoom-toggle{display:flex; gap:3px; background:var(--slate-soft); padding:3px; border-radius:9px;}
.zoom-btn{border:none; background:transparent; padding:6px 13px; font-size:12.5px; font-weight:600; color:var(--ink-soft); border-radius:7px; cursor:pointer; font-family:'IBM Plex Sans';}
.zoom-btn.active{background:var(--panel); color:var(--navy); box-shadow:0 1px 3px rgba(14,39,56,0.12);}
.range-badge{font-family:'IBM Plex Mono'; font-size:12.5px; color:var(--ink-soft); margin-left:auto;}
.gantt-toolbar-row input[type=date]{padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:12.5px; font-family:'IBM Plex Sans'; background:var(--panel);}

/* ---------- Workload ---------- */
.wl-row{display:grid; grid-template-columns:160px 1fr 200px; gap:14px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line-soft);}
.wl-row:last-child{border-bottom:none;}
.wl-name{font-weight:700; font-size:13.5px; color:var(--ink);}
.wl-name-sub{font-size:11px; color:var(--ink-faint); font-family:'IBM Plex Mono';}
.wl-bar-track{height:18px; border-radius:6px; background:var(--slate-soft); overflow:hidden; display:flex;}
.wl-bar-seg{height:100%;}
.wl-stats{display:flex; gap:10px; font-size:11.5px; color:var(--ink-soft); justify-content:flex-end; flex-wrap:wrap;}
.wl-stats b{font-family:'IBM Plex Mono'; color:var(--ink);}

.footer-note{text-align:center; font-size:11.5px; color:var(--ink-faint); margin-top:30px; padding-top:16px; border-top:1px dashed var(--line);}
.back-link{display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--navy); font-weight:600; cursor:pointer; margin-bottom:14px; background:none; border:none; padding:0;}
.back-link:hover{text-decoration:underline;}
.filter-bar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
.filter-bar select{padding:8px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; background:var(--panel); font-family:'IBM Plex Sans';}
</style>
</head>

<div id="modal-root"></div>

/* ===================== Storage (Firebase Realtime Database) ===================== */
function notesToObj(notesArr){
  var o = {};
  (notesArr||[]).forEach(function(n){ o[n.id] = n; });
  return o;
}
function notesFromSnapshot(notesVal){
  if(!notesVal) return [];
  return Object.keys(notesVal).map(function(k){ return notesVal[k]; });
}
function checkReady(){
  if(projectsLoaded && tasksLoaded) dataReady = true;
  render();
}
function loadAll(){
  projectsRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    projects = Object.keys(val).map(function(k){ return val[k]; });
    projectsLoaded = true;
    checkReady();
  }, function(err){
    console.error('projects listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    projectsLoaded = true;
    checkReady();
  });
  tasksRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    tasks = Object.keys(val).map(function(k){
      var t = val[k];
      t.notes = notesFromSnapshot(t.notes);
      return t;
    });
    tasksLoaded = true;
    checkReady();
  }, function(err){
    console.error('tasks listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    tasksLoaded = true;
    checkReady();
  });
}
function pushProject(p){
  projectsRef.child(p.id).set(p).catch(function(e){ console.error('save project failed', e); });
}
function removeProject(id){
  projectsRef.child(id).remove().catch(function(e){ console.error('delete project failed', e); });
}
function pushTask(t){
  var copy = Object.assign({}, t);
  copy.notes = notesToObj(t.notes);
  tasksRef.child(t.id).set(copy).catch(function(e){ console.error('save task failed', e); });
}
function removeTask(id){
  tasksRef.child(id).remove().catch(function(e){ console.error('delete task failed', e); });
}

/* ===================== Helpers ===================== */
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function todayStr(){
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseDateStr(s){ return new Date(s + 'T00:00:00'); }
function addDays(d, n){ return new Date(d.getTime() + n*86400000); }
function dayDiff(a,b){ return Math.round((b.getTime() - a.getTime()) / 86400000); }
function fmtDateThai(s){
  if(!s) return '-';
  var d = parseDateStr(s);
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + (d.getFullYear()+543);
}
function fmtDateShort(d){
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate() + ' ' + months[d.getMonth()];
}
function fmtTimestamp(ts){
  var d = new Date(ts);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + (d.getFullYear()+543) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function isOverdue(t){ return t.dueDate && t.dueDate < todayStr() && Number(t.progress) < 100; }
function toDateStr(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function firstDayOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function lastDayOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function mostRecentMonday(d){ var day = d.getDay(); var diff = day===0 ? 6 : day-1; return addDays(d, -diff); }
function fmtMonthYearShort(d){
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var yy = String((d.getFullYear()+543) % 100).padStart(2,'0');
  return months[d.getMonth()] + ' ' + yy;
}
function overdueDaysOf(t){
  if(!isOverdue(t)) return 0;
  return dayDiff(parseDateStr(t.dueDate), parseDateStr(todayStr()));
}
function projectAggregate(pid){
  var all = tasksOfProject(pid).filter(function(t){ return t.startDate && t.dueDate; });
  if(!all.length) return null;
  var minS = null, maxE = null, sum = 0;
  all.forEach(function(t){
    var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
    if(!minS || s < minS) minS = s;
    if(!maxE || e > maxE) maxE = e;
    sum += Number(t.progress);
  });
  return { startDate: toDateStr(minS), dueDate: toDateStr(maxE), progress: Math.round(sum/all.length), taskCount: all.length };
}
function fillColorFor(progress){
  if(Number(progress) === 100) return 'var(--teal)';
  if(Number(progress) === 0) return 'var(--slate)';
  return 'var(--amber)';
}
function buildBarSegments(item, rangeStart, rangeEnd, dayWidth){
  var ts = parseDateStr(item.startDate), te = parseDateStr(item.dueDate);
  var today = parseDateStr(todayStr());
  var overdue = isOverdue(item);
  var overdueDays = overdue ? dayDiff(te, today) : 0;

  var seg = { hasPlan:false, planLeft:0, planWidthPx:0, hasOverrun:false, overrunLeft:0, overrunWidthPx:0, overdue:overdue, overdueDays:overdueDays, endOfBarPx:0 };

  var planVisStart = ts < rangeStart ? rangeStart : ts;
  var planVisEnd = te > rangeEnd ? rangeEnd : te;
  if(te >= rangeStart && ts <= rangeEnd && planVisEnd >= planVisStart){
    seg.hasPlan = true;
    seg.planLeft = dayDiff(rangeStart, planVisStart) * dayWidth;
    var planDays = dayDiff(planVisStart, planVisEnd) + 1;
    seg.planWidthPx = Math.max(dayWidth-2, planDays * dayWidth - 2);
    seg.endOfBarPx = seg.planLeft + seg.planWidthPx;
  }

  if(overdue){
    var overrunStartReal = addDays(te, 1);
    var overrunEndReal = today;
    var ovVisStart = overrunStartReal < rangeStart ? rangeStart : overrunStartReal;
    var ovVisEnd = overrunEndReal > rangeEnd ? rangeEnd : overrunEndReal;
    if(overrunEndReal >= rangeStart && overrunStartReal <= rangeEnd && ovVisEnd >= ovVisStart){
      seg.hasOverrun = true;
      seg.overrunLeft = dayDiff(rangeStart, ovVisStart) * dayWidth;
      var ovDays = dayDiff(ovVisStart, ovVisEnd) + 1;
      seg.overrunWidthPx = ovDays * dayWidth;
      seg.endOfBarPx = Math.max(seg.endOfBarPx, seg.overrunLeft + seg.overrunWidthPx);
    }
  }
  return seg;
}
function renderBarHtml(item, seg, opts){
  opts = opts || {};
  var isGroup = !!opts.isGroup;
  var fillColor = fillColorFor(item.progress);
  var fillPct = Math.max(0, Math.min(100, Number(item.progress)));
  var html = '';
  if(seg.hasPlan){
    var labelInside = fillPct >= 30;
    var label = seg.planWidthPx > 44 ? (item.progress + '%') : '';
    html += '<div class="gantt-bar-outer' + (isGroup?' is-group':'') + '" style="left:' + seg.planLeft + 'px; width:' + seg.planWidthPx + 'px;' + (isGroup?(' --gcolor:'+opts.groupColor+';'):'') + '" data-action="' + (opts.dataAction||'') + '" data-id="' + (opts.dataId||'') + '" title="' + esc(opts.tooltip||'') + '">' +
      '<div class="gantt-bar-fill" style="width:' + fillPct + '%; background:' + fillColor + ';"></div>' +
      (label ? '<div class="gantt-bar-label" style="left:' + (labelInside?6:Math.round(seg.planWidthPx*fillPct/100)+6) + 'px; color:' + (labelInside?'#fff':'var(--ink)') + ';">' + label + '</div>' : '') +
    '</div>';
  }
  if(seg.hasOverrun){
    var ovLabel = seg.overrunWidthPx > 26 ? ('+' + seg.overdueDays) : '';
    html += '<div class="gantt-overrun' + (isGroup?' is-group':'') + '" style="left:' + seg.overrunLeft + 'px; width:' + seg.overrunWidthPx + 'px;" data-action="' + (opts.dataAction||'') + '" data-id="' + (opts.dataId||'') + '" title="' + esc(opts.tooltip||'') + '">' + ovLabel + '</div>';
  }
  return html;
}
function statusInfo(t){
  var p = Number(t.progress);
  if(isOverdue(t)) return {label:'เลยกำหนด', cls:'badge-coral', color:'var(--coral)'};
  if(p === 100) return {label:'เสร็จสมบูรณ์', cls:'badge-teal', color:'var(--teal)'};
  if(p === 0) return {label:'ยังไม่ได้ดำเนินการ', cls:'badge-slate', color:'var(--slate)'};
  return {label:'กำลังดำเนินการ', cls:'badge-amber', color:'var(--amber)'};
}
function projectById(id){ return projects.find(function(p){ return p.id === id; }); }
function taskById(id){ return tasks.find(function(t){ return t.id === id; }); }
function tasksOfProject(pid){ return tasks.filter(function(t){ return t.projectId === pid; }); }
function nextColor(){ return PROJECT_COLORS[projects.length % PROJECT_COLORS.length]; }
function truncate(s, n){ s = String(s||''); return s.length > n ? s.slice(0, n-1) + '…' : s; }
function latestNote(t){
  if(!t.notes || !t.notes.length) return null;
  return t.notes.slice().sort(function(a,b){ return b.date - a.date; })[0];
}
function sortByStartDate(list){
  return list.slice().sort(function(a,b){ return (a.startDate||'9999').localeCompare(b.startDate||'9999'); });
}

    var note = latestNote(t);
    return '<tr class="task-row" data-action="open-task-detail" data-id="' + t.id + '">' +
      '<td><div class="task-title">' + esc(t.title) + '</div>' + (note ? '<div class="task-meta">&#128172; ' + esc(truncate(note.text, 70)) + '</div>' : '') + '</td>' +
      '<td>' + esc(t.assignee) + '</td>' +
      '<td class="mono">' + fmtDateThai(t.startDate) + '</td>' +
      '<td class="mono">' + fmtDateThai(t.dueDate) + '</td>' +
      '<td><div style="display:flex; align-items:center; gap:8px;"><div class="progress-track"><div class="progress-fill" style="width:' + t.progress + '%; background:' + s.color + '"></div></div><span class="mono" style="font-size:12px;">' + t.progress + '%</span></div></td>' +
      '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>' +
      '<td><button class="btn btn-danger btn-sm" data-action="delete-task" data-id="' + t.id + '" data-stop="1">ลบ</button></td>' +
    '</tr>';
  }).join('');

  return head + '<div class="panel"><div class="table-wrap"><table class="tk">' +
    '<thead><tr><th>งาน</th><th>ผู้รับผิดชอบ</th><th>เริ่ม</th><th>กำหนดส่ง</th><th>ความคืบหน้า</th><th>สถานะ</th><th></th></tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
  '</table></div></div>';
}

/* ===================== Gantt (embedded in home page) ===================== */
function renderGanttSection(){
  var todayD = parseDateStr(todayStr());

  var relevantProjects = ganttFilterProject === 'all' ? projects : projects.filter(function(p){ return p.id === ganttFilterProject; });
  var baseTasks = tasks.filter(function(t){
    if(!t.startDate || !t.dueDate) return false;
    if(ganttFilterProject === 'all') return true;
    return t.projectId === ganttFilterProject;
  });

  var rangeStart, rangeEnd;
  if(ganttRangeStart && ganttRangeEnd && ganttRangeStart <= ganttRangeEnd){
    rangeStart = parseDateStr(ganttRangeStart);
    rangeEnd = parseDateStr(ganttRangeEnd);
  } else if(baseTasks.length){
    var minD = null, maxD = null;
    baseTasks.forEach(function(t){
      var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
      if(!minD || s < minD) minD = s;
      if(!maxD || e > maxD) maxD = e;
    });
    rangeStart = addDays(minD, -2);
    rangeEnd = addDays(maxD, 3);
  } else {
    rangeStart = firstDayOfMonth(todayD);
    rangeEnd = lastDayOfMonth(todayD);
  }

  var rangeBadge = fmtMonthYearShort(rangeStart) + ' &ndash; ' + fmtMonthYearShort(rangeEnd);
  var filterOptions = '<option value="all">ทุกโปรเจกต์</option>' + projects.map(function(p){
    return '<option value="' + p.id + '"' + (ganttFilterProject===p.id?' selected':'') + '>' + esc(p.name) + '</option>';
  }).join('');

  var toolbar = '<div class="gantt-toolbar">' +
    '<div class="gantt-toolbar-row">' +
      '<span class="gtb-label">&#10520; TIMELINE</span>' +
      '<div class="zoom-toggle">' +
        '<button class="zoom-btn' + (ganttZoomMode==='month'?' active':'') + '" data-action="gantt-zoom-month">รายเดือน</button>' +
        '<button class="zoom-btn' + (ganttZoomMode==='week'?' active':'') + '" data-action="gantt-zoom-week">รายสัปดาห์</button>' +
        '<button class="zoom-btn' + (ganttZoomMode==='custom'?' active':'') + '" data-action="gantt-zoom-custom">กำหนดเอง</button>' +
      '</div>' +
      '<span class="range-badge">' + rangeBadge + '</span>' +
    '</div>' +
    '<div class="gantt-toolbar-row">' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">เริ่มต้น</label>' +
      '<input type="date" id="gantt-range-start" value="' + (ganttRangeStart||'') + '">' +
      '<span style="color:var(--ink-faint);">&rarr;</span>' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">สิ้นสุด</label>' +
      '<input type="date" id="gantt-range-end" value="' + (ganttRangeEnd||'') + '">' +
      '<button class="btn btn-ghost btn-sm" data-action="apply-gantt-range">แสดงช่วงนี้</button>' +
      '<button class="btn btn-ghost btn-sm" data-action="fit-gantt-range">&#10530; Fit</button>' +
      '<button class="btn btn-ghost btn-sm" data-action="gantt-jump-today">&#128336; วันนี้</button>' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600; margin-left:6px;">โปรเจกต์:</label>' +
      '<select data-action="filter-gantt">' + filterOptions + '</select>' +
    '</div>' +
  '</div>';

  var legend = '<div class="gantt-legend">' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--slate)"></span>ยังไม่ได้เริ่ม</div>' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>กำลังดำเนินการ</div>' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--teal)"></span>เสร็จ</div>' +
    '<div class="legend-item"><span class="legend-dot striped"></span>เกินกำหนด</div>' +
  '</div>';

  if(baseTasks.length === 0){
    return toolbar + '<div class="empty-state">' +
      '<div class="es-icon">&#128197;</div>' +
      '<div class="es-title">ยังไม่มีข้อมูลสำหรับแสดงแผนภูมิ</div>' +
      '<div class="es-sub">เพิ่มงานที่มีวันเริ่มต้นและวันกำหนดส่งในโปรเจกต์ก่อน</div>' +
    '</div>';
  }

  var totalDays = Math.max(1, dayDiff(rangeStart, rangeEnd) + 1);
  var dayWidth = 24;
  var timelineWidth = totalDays * dayWidth;

  var relevantTasks = baseTasks.filter(function(t){
    var ts = parseDateStr(t.startDate), te = parseDateStr(t.dueDate);
    return te >= rangeStart && ts <= rangeEnd;
  });

  if(relevantTasks.length === 0){
    return toolbar + legend + '<div class="empty-state">' +
      '<div class="es-icon">&#128269;</div>' +
      '<div class="es-title">ไม่มีงานในช่วงเวลาที่เลือก</div>' +
      '<div class="es-sub">ลองกด "Fit" เพื่อแสดงทุกโปรเจกต์</div>' +
    '</div>';
  }

  var ticksHtml = '', tickLabelsHtml = '';
  for(var i=0;i<totalDays;i++){
    var d = addDays(rangeStart, i);
    if(i===0 || d.getDay()===1){
      var x = i*dayWidth;
      ticksHtml += '<div class="gantt-tick" style="left:' + x + 'px;"></div>';
      tickLabelsHtml += '<div class="gantt-tick-label" style="left:' + x + 'px;">' + fmtDateShort(d) + '</div>';
    }
  }
  var bgTicks = '';
  for(var j=0;j<totalDays;j++){
    var dj = addDays(rangeStart,j);
    if(dj.getDay()===1) bgTicks += '<div class="gantt-bg-tick" style="left:' + (j*dayWidth) + 'px;"></div>';
  }
  var todayIdx = dayDiff(rangeStart, todayD);
  var todayLineHtml = '';
  if(todayIdx >= 0 && todayIdx < totalDays){
    var tx = todayIdx*dayWidth;
    todayLineHtml = '<div class="gantt-today-line" style="left:' + tx + 'px;"></div><div class="gantt-today-label" style="left:' + (tx+4) + 'px;">วันนี้</div>';
  }

  var projectsWithTasks = relevantProjects.filter(function(p){
    return relevantTasks.some(function(t){ return t.projectId === p.id; });
  });

  var bodyHeight = projectsWithTasks.reduce(function(acc,p){
    var collapsed = !!ganttCollapsed[p.id];
    var n = relevantTasks.filter(function(t){ return t.projectId === p.id; }).length;
    return acc + 30 + (collapsed ? 0 : n*42);
  },0);

  var labelsHtml = '<div class="gantt-label-head">PROJECT / TASK</div>';
  var rowsHtml = '<div class="gantt-body-rows" style="width:' + timelineWidth + 'px; min-height:' + bodyHeight + 'px;">' + bgTicks + todayLineHtml;

  projectsWithTasks.forEach(function(p){
    var pts = sortByStartDate(relevantTasks.filter(function(t){ return t.projectId === p.id; }));
    var collapsed = !!ganttCollapsed[p.id];
    var agg = projectAggregate(p.id);

    labelsHtml += '<div class="gantt-group-row" data-action="toggle-gantt-group" data-id="' + p.id + '">' +
      '<span class="ggr-chevron' + (collapsed?' collapsed':'') + '">&#9660;</span>' +
      '<span class="ggr-dot" style="background:' + p.color + '"></span>' +
      '<span class="ggr-name" title="' + esc(p.name) + '">' + esc(p.name) + '</span>' +
      (agg ? '<span class="ggr-pct">' + agg.progress + '%</span>' : '') +
    '</div>';

    var groupTrackInner = '';
    if(agg){
      var gseg = buildBarSegments(agg, rangeStart, rangeEnd, dayWidth);
      groupTrackInner = renderBarHtml(agg, gseg, { isGroup:true, groupColor:p.color, dataAction:'toggle-gantt-group', dataId:p.id,
        tooltip: p.name + ' — รวม ' + agg.taskCount + ' งาน (' + agg.progress + '%)' });
      if(gseg.hasPlan || gseg.hasOverrun){
        var gStartLeft = 0, gStartWidth = gseg.hasPlan ? gseg.planLeft : gseg.overrunLeft;
        groupTrackInner += '<div class="gantt-date-flank is-group flank-start" style="left:0px; width:' + gStartWidth + 'px;">' + fmtDateShort(parseDateStr(agg.startDate)) + '</div>';
        var gEndLeft = gseg.endOfBarPx;
        groupTrackInner += '<div class="gantt-date-flank is-group flank-end' + (gseg.overdue?' flank-overdue':'') + '" style="left:' + gEndLeft + 'px; width:' + (timelineWidth-gEndLeft) + 'px;">' +
          fmtDateShort(parseDateStr(agg.dueDate)) + (gseg.overdue ? ' (เกิน ' + gseg.overdueDays + ' วัน)' : '') + '</div>';
      }
    }
    rowsHtml += '<div class="gantt-group-track" data-action="toggle-gantt-group" data-id="' + p.id + '">' + groupTrackInner + '</div>';

    if(!collapsed){
      pts.forEach(function(t){
        var note = latestNote(t);
        var seg = buildBarSegments(t, rangeStart, rangeEnd, dayWidth);
        var tooltip = t.title + ' (' + t.progress + '%)' + (note ? ' — ' + truncate(note.text, 60) : '');
        labelsHtml += '<div class="gantt-label-row"><div><div class="glr-title">' + esc(t.title) + '</div><div class="glr-sub">' + esc(t.assignee) + '</div></div></div>';

        var trackInner = renderBarHtml(t, seg, { dataAction:'open-task-detail', dataId:t.id, tooltip:tooltip });
        if(seg.hasPlan || seg.hasOverrun){
          var startLeftWidth = seg.hasPlan ? seg.planLeft : seg.overrunLeft;
          trackInner += '<div class="gantt-date-flank flank-start" style="left:0px; width:' + startLeftWidth + 'px;">' + fmtDateShort(parseDateStr(t.startDate)) + '</div>';
          var endLeft = seg.endOfBarPx;
          trackInner += '<div class="gantt-date-flank flank-end' + (seg.overdue?' flank-overdue':'') + '" style="left:' + endLeft + 'px; width:' + (timelineWidth-endLeft) + 'px;">' +
            fmtDateShort(parseDateStr(t.dueDate)) + (seg.overdue ? ' (เกิน ' + seg.overdueDays + ' วัน)' : '') + '</div>';
        }
        rowsHtml += '<div class="gantt-row-track">' + trackInner + '</div>';
      });
    }
  });
  rowsHtml += '</div>';

  var gantt = '<div class="gantt-wrap">' +
    '<div class="gantt-labels">' + labelsHtml + '</div>' +
    '<div class="gantt-scroll"><div class="gantt-timeline" style="width:' + timelineWidth + 'px;">' +
      '<div class="gantt-tick-row">' + ticksHtml + tickLabelsHtml + (todayIdx>=0 && todayIdx<totalDays ? '<div class="gantt-today-line" style="left:' + (todayIdx*dayWidth) + 'px;"></div>' : '') + '</div>' +
      rowsHtml +
    '</div></div>' +
  '</div>';

  return toolbar + legend + gantt;
}

/* ===================== Overview & Workload ===================== */
function renderOverviewView(){
  var head = '<div class="page-head">' +
      '<div><div class="page-title">ภาพรวมและภาระงาน</div><div class="page-desc">สรุปสถานะงานทั้งหมดและภาระงานของแต่ละคน</div></div>' +
    '</div>';

  var totalProjects = projects.length;
  var totalTasks = tasks.length;
  var doneCount = tasks.filter(function(t){ return Number(t.progress)===100; }).length;
  var overdueCount = tasks.filter(isOverdue).length;
  var inProgressCount = tasks.filter(function(t){ var p=Number(t.progress); return p>0 && p<100 && !isOverdue(t); }).length;
  var notStartedCount = tasks.filter(function(t){ return Number(t.progress)===0 && !isOverdue(t); }).length;
  var completionRate = totalTasks ? Math.round(doneCount/totalTasks*100) : 0;

  if(totalTasks === 0){
    return head + '<div class="empty-state">' +
      '<div class="es-icon">&#128202;</div>' +
      '<div class="es-title">ยังไม่มีข้อมูลงาน</div>' +
      '<div class="es-sub">เริ่มสร้างโปรเจกต์และเพิ่มงานเพื่อดูสรุปภาพรวมและภาระงานของทีม</div>' +
    '</div>';
  }

  var kpis = '<div class="kpi-grid">' +
    '<div class="panel kpi-card" style="--accent:var(--navy)"><div class="kpi-label">โปรเจกต์ทั้งหมด</div><div class="kpi-value">' + totalProjects + '</div><div class="kpi-foot">งานทั้งหมด ' + totalTasks + ' รายการ</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--teal)"><div class="kpi-label">เสร็จสมบูรณ์</div><div class="kpi-value">' + completionRate + '%</div><div class="kpi-foot">' + doneCount + ' จาก ' + totalTasks + ' งาน</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--amber)"><div class="kpi-label">กำลังดำเนินการ</div><div class="kpi-value">' + inProgressCount + '</div><div class="kpi-foot">ยังไม่ได้ดำเนินการ ' + notStartedCount + ' งาน</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--coral)"><div class="kpi-label">เลยกำหนด</div><div class="kpi-value">' + overdueCount + '</div><div class="kpi-foot">ต้องติดตามเร่งด่วน</div></div>' +
  '</div>';

  var segs = [
    {n:notStartedCount, c:'var(--slate)'},
    {n:inProgressCount, c:'var(--amber)'},
    {n:doneCount, c:'var(--teal)'},
    {n:overdueCount, c:'var(--coral)'}
  ];
  var statusBar = '<div class="panel" style="padding:16px 18px; margin-bottom:20px;"><div class="section-label" style="margin-top:0;">สัดส่วนสถานะงานทั้งหมด</div>' +
    '<div class="wl-bar-track" style="height:22px;">' + segs.map(function(s){
      var pct = totalTasks ? (s.n/totalTasks*100) : 0;
      return pct>0 ? '<div class="wl-bar-seg" style="width:' + pct + '%; background:' + s.c + '"></div>' : '';
    }).join('') + '</div></div>';

  // workload by assignee
  var byAssignee = {};
  tasks.forEach(function(t){
    var key = (t.assignee || 'ไม่ระบุ').trim() || 'ไม่ระบุ';
    if(!byAssignee[key]) byAssignee[key] = [];
    byAssignee[key].push(t);
  });
  var assignees = Object.keys(byAssignee).sort(function(a,b){ return byAssignee[b].length - byAssignee[a].length; });
  var maxCount = assignees.length ? byAssignee[assignees[0]].length : 1;

  var wlRows = assignees.map(function(name){
    var list = byAssignee[name];
    var ns = list.filter(function(t){ return Number(t.progress)===0 && !isOverdue(t); }).length;
    var ip = list.filter(function(t){ var p=Number(t.progress); return p>0 && p<100 && !isOverdue(t); }).length;
    var dn = list.filter(function(t){ return Number(t.progress)===100; }).length;
    var od = list.filter(isOverdue).length;
    var total = list.length;
    var widthPct = (total/maxCount*100);
    return '<div class="wl-row">' +
      '<div><div class="wl-name">' + esc(name) + '</div><div class="wl-name-sub">' + total + ' งาน</div></div>' +
      '<div class="wl-bar-track" style="width:' + widthPct + '%;">' +
        (ns ? '<div class="wl-bar-seg" style="width:' + (ns/total*100) + '%; background:var(--slate);"></div>' : '') +
        (ip ? '<div class="wl-bar-seg" style="width:' + (ip/total*100) + '%; background:var(--amber);"></div>' : '') +
        (dn ? '<div class="wl-bar-seg" style="width:' + (dn/total*100) + '%; background:var(--teal);"></div>' : '') +
        (od ? '<div class="wl-bar-seg" style="width:' + (od/total*100) + '%; background:var(--coral);"></div>' : '') +
      '</div>' +
      '<div class="wl-stats">' +
        '<span>ยังไม่เริ่ม <b>' + ns + '</b></span><span>กำลังทำ <b>' + ip + '</b></span><span>เสร็จ <b>' + dn + '</b></span>' + (od ? '<span style="color:var(--coral);">เลยกำหนด <b>' + od + '</b></span>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  var workloadPanel = '<div class="panel" style="padding:18px 18px 6px 18px;"><div class="section-label" style="margin-top:0;">ภาระงานของแต่ละคน</div>' + wlRows + '</div>';

  return head + kpis + statusBar + workloadPanel;
}

  return '' +
  '<div class="modal-head"><h3>' + (t ? 'แก้ไขงาน' : 'เพิ่มงานใหม่') + '</h3><button class="modal-close" data-action="close-modal">&times;</button></div>' +

    '<div class="field"><label>ผู้รับผิดชอบ *</label><input type="text" id="f-task-assignee" value="' + (t?esc(t.assignee):'') + '" placeholder="ชื่อผู้รับผิดชอบ"></div>' +
    '<div class="field-row">' +
      '<div class="field"><label>วันเริ่มต้น *</label><input type="date" id="f-task-start" value="' + (t?t.startDate:'') + '"></div>' +
      '<div class="field"><label>วันกำหนดส่ง *</label><input type="date" id="f-task-due" value="' + (t?t.dueDate:'') + '"></div>' +
    '</div>' +
    '<div class="field"><label>ความคืบหน้า</label><select id="f-task-progress">' +
      [0,25,50,75,100].map(function(v){
        var labelMap = {0:'0% — ยังไม่ได้ดำเนินการ',25:'25% — กำลังดำเนินการ',50:'50% — กำลังดำเนินการ',75:'75% — กำลังดำเนินการ',100:'100% — ดำเนินการเรียบร้อย'};
        var sel = (t ? Number(t.progress) : 0) === v ? ' selected' : '';
        return '<option value="' + v + '"' + sel + '>' + labelMap[v] + '</option>';
      }).join('') +
    '</select></div>' +
    '<div class="field-error" id="f-task-error"></div>' +
  '</div>' +
  '<div class="modal-foot"><button class="btn btn-ghost" data-action="close-modal">ยกเลิก</button>' +
  '<button class="btn btn-primary" data-action="save-task" data-pid="' + projectId + '" data-id="' + (t?t.id:'') + '">' + (t?'บันทึกการแก้ไข':'เพิ่มงาน') + '</button></div>';
}

function taskDetailModalHtml(taskId){
  var t = taskById(taskId);
  if(!t) return '';
  var p = projectById(t.projectId);
  var s = statusInfo(t);
  var notesHtml = (t.notes && t.notes.length) ? t.notes.slice().reverse().map(function(n){
    return '<div class="note-item"><div class="note-date">' + fmtTimestamp(n.date) + '</div><div class="note-text">' + esc(n.text) + '</div></div>';
  }).join('') : '<div style="font-size:12.5px; color:var(--ink-faint); padding:8px 0;">ยังไม่มีบันทึกการติดตาม</div>';

  return '' +
  '<div class="modal-head"><h3>' + esc(t.title) + '</h3><button class="modal-close" data-action="close-modal">&times;</button></div>' +
  '<div class="modal-body">' +
    '<div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;"><span class="badge ' + s.cls + '">' + s.label + '</span>' +
    (p ? '<span style="font-size:12px; color:var(--ink-soft);">โปรเจกต์: ' + esc(p.name) + '</span>' : '') + '</div>' +
    '<div class="task-detail-meta">' +
      '<div class="tdm-item"><div class="tdm-label">ผู้รับผิดชอบ</div><div class="tdm-value">' + esc(t.assignee) + '</div></div>' +
      '<div class="tdm-item"><div class="tdm-label">ความคืบหน้า</div><div class="tdm-value">' + t.progress + '%</div></div>' +
      '<div class="tdm-item"><div class="tdm-label">วันเริ่มต้น</div><div class="tdm-value">' + fmtDateThai(t.startDate) + '</div></div>' +
      '<div class="tdm-item"><div class="tdm-label">วันกำหนดส่ง</div><div class="tdm-value">' + fmtDateThai(t.dueDate) + '</div></div>' +
    '</div>' +
    '<div class="section-label">อัปเดตความคืบหน้า</div>' +
    '<select id="f-detail-progress" style="width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13.5px; font-family:IBM Plex Sans;">' +
      [0,25,50,75,100].map(function(v){
        var labelMap = {0:'0% — ยังไม่ได้ดำเนินการ',25:'25% — กำลังดำเนินการ',50:'50% — กำลังดำเนินการ',75:'75% — กำลังดำเนินการ',100:'100% — ดำเนินการเรียบร้อย'};
        var sel = Number(t.progress) === v ? ' selected' : '';
        return '<option value="' + v + '"' + sel + '>' + labelMap[v] + '</option>';
      }).join('') +
    '</select>' +
    '<div style="margin-top:8px; text-align:right;"><button class="btn btn-primary btn-sm" data-action="update-progress" data-id="' + t.id + '">บันทึกความคืบหน้า</button></div>' +

    '<div class="section-label">บันทึกการติดตามงาน</div>' +
    '<div class="notes-list">' + notesHtml + '</div>' +
    '<div class="add-note-row">' +
      '<textarea id="f-new-note" placeholder="พิมพ์บันทึกการติดตาม เช่น ผลการตรวจสอบ / ปัญหาที่พบ / แผนถัดไป"></textarea>' +
      '<button class="btn btn-primary btn-sm" data-action="add-note" data-id="' + t.id + '">เพิ่มบันทึก</button>' +
    '</div>' +
  '</div>' +
  '<div class="modal-foot">' +
    '<button class="btn btn-danger" data-action="delete-task" data-id="' + t.id + '">ลบงานนี้</button>' +
    '<button class="btn btn-ghost" data-action="open-edit-task" data-id="' + t.id + '">แก้ไขรายละเอียด</button>' +
    '<button class="btn btn-ghost" data-action="close-modal">ปิด</button>' +
  '</div>';
}

/* ===================== Actions ===================== */
function handleSaveProject(editId){
  var name = document.getElementById('f-project-name').value.trim();
  var desc = document.getElementById('f-project-desc').value.trim();
  var owner = document.getElementById('f-project-owner').value.trim();
  var category = document.getElementById('f-project-category').value;
  var categoryOtherEl = document.getElementById('f-project-category-other');
  var categoryOther = categoryOtherEl ? categoryOtherEl.value.trim() : '';
  var priority = document.getElementById('f-project-priority').value;
  var color = document.getElementById('f-project-swatches').getAttribute('data-color');
  var errEl = document.getElementById('f-project-error');
  if(!name){ errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  var proj;
  if(editId){
    proj = projectById(editId);
    if(proj){
      proj.name = name; proj.description = desc; proj.color = color;
      proj.owner = owner; proj.category = category; proj.categoryOther = categoryOther; proj.priority = priority;
    }
  } else {
    proj = { id: uid('proj'), name: name, description: desc, color: color, owner: owner, category: category, categoryOther: categoryOther, priority: priority, createdAt: Date.now() };
    projects.push(proj);
  }
  pushProject(proj);
  closeModal();
  render();
}

function handleSaveTask(projectId, editId){
  var title = document.getElementById('f-task-title').value.trim();
  var assignee = document.getElementById('f-task-assignee').value.trim();
  var start = document.getElementById('f-task-start').value;
  var due = document.getElementById('f-task-due').value;
  var progress = document.getElementById('f-task-progress').value;
  var errEl = document.getElementById('f-task-error');

  if(!title || !assignee || !start || !due){
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ: ชื่องาน ผู้รับผิดชอบ วันเริ่มต้น และวันกำหนดส่ง';
    errEl.classList.add('show');
    return;
  }
  if(due < start){
    errEl.textContent = 'วันกำหนดส่งต้องไม่อยู่ก่อนวันเริ่มต้น';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  var task;
  if(editId){
    task = taskById(editId);
    if(task){ task.title = title; task.assignee = assignee; task.startDate = start; task.dueDate = due; task.progress = Number(progress); task.updatedAt = Date.now(); }
  } else {
    task = { id: uid('task'), projectId: projectId, title: title, assignee: assignee, startDate: start, dueDate: due, progress: Number(progress), notes: [], createdAt: Date.now() };
    tasks.push(task);
  }
  pushTask(task);
  closeModal();
  render();
}

function handleUpdateProgress(taskId){
  var val = document.getElementById('f-detail-progress').value;
  var t = taskById(taskId);
  if(t){ t.progress = Number(val); t.updatedAt = Date.now(); pushTask(t); }
  closeModal();
  render();
}

function handleAddNote(taskId){
  var ta = document.getElementById('f-new-note');
  var text = ta.value.trim();
  if(!text) return;
  var t = taskById(taskId);
  if(t){
    if(!t.notes) t.notes = [];
    t.notes.push({ id: uid('note'), date: Date.now(), text: text });
    pushTask(t);
  }
  openModal(taskDetailModalHtml(taskId));
}

function handleDeleteProject(projectId){
  if(!confirm('ลบโปรเจกต์นี้และงานทั้งหมดในโปรเจกต์? การลบนี้ไม่สามารถย้อนกลับได้')) return;
  var orphanTasks = tasks.filter(function(t){ return t.projectId === projectId; });
  projects = projects.filter(function(p){ return p.id !== projectId; });
  tasks = tasks.filter(function(t){ return t.projectId !== projectId; });
  removeProject(projectId);
  orphanTasks.forEach(function(t){ removeTask(t.id); });
  if(currentProjectId === projectId) currentProjectId = null;
  render();
}

function handleDeleteTask(taskId){
  if(!confirm('ลบงานนี้? การลบนี้ไม่สามารถย้อนกลับได้')) return;
  tasks = tasks.filter(function(t){ return t.id !== taskId; });
  removeTask(taskId);
  closeModal();
  render();
}

/* ===================== Event delegation ===================== */
document.addEventListener('click', function(e){
  var overlay = e.target.classList && e.target.classList.contains('modal-overlay');
  if(overlay){ closeModal(); return; }

  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.getAttribute('data-action');
  var id = el.getAttribute('data-id');

  switch(action){
    case 'goto-view':
      currentView = el.getAttribute('data-view');
      if(currentView !== 'projects') currentProjectId = null;
      render();
      break;
    case 'back-to-projects':
      currentProjectId = null;
      render();
      break;
    case 'open-project':
      currentProjectId = id;
      render();
      break;
    case 'open-project-modal':
      openModal(projectModalHtml(null));
      break;
    case 'edit-project':
      openModal(projectModalHtml(id));
      break;
    case 'delete-project':
      handleDeleteProject(id);
      break;
    case 'pick-color':
      var wrap = el.closest('.swatches');
      wrap.setAttribute('data-color', el.getAttribute('data-color'));
      Array.prototype.forEach.call(wrap.querySelectorAll('.swatch'), function(sw){ sw.classList.remove('selected'); });
      el.classList.add('selected');
      break;
    case 'save-project':
      handleSaveProject(id || null);
      break;
    case 'open-task-modal':
      openModal(taskModalHtml(id, null));
      break;
    case 'open-edit-task':
      var tk = taskById(id);
      if(tk) openModal(taskModalHtml(tk.projectId, id));
      break;
    case 'save-task':
      handleSaveTask(el.getAttribute('data-pid'), id || null);
      break;
    case 'delete-task':
      handleDeleteTask(id);
      break;
    case 'open-task-detail':
      currentTaskId = id;
      openModal(taskDetailModalHtml(id));
      break;
    case 'update-progress':
      handleUpdateProgress(id);
      break;
    case 'add-note':
      handleAddNote(id);
      break;
    case 'apply-owner-filter':
      projectFilterOwner = document.getElementById('f-filter-owner').value.trim();
      render();
      break;
    case 'clear-project-filters':
      projectFilterCategory = 'all';
      projectFilterPriority = 'all';
      projectFilterOwner = '';
      render();
      break;
    case 'apply-gantt-range':
      var gs = document.getElementById('gantt-range-start').value;
      var ge = document.getElementById('gantt-range-end').value;
      if(gs && ge && gs <= ge){ ganttRangeStart = gs; ganttRangeEnd = ge; ganttZoomMode = 'custom'; }
      render();
      break;
    case 'fit-gantt-range':
      ganttRangeStart = null;
      ganttRangeEnd = null;
      ganttZoomMode = 'custom';
      render();
      break;
    case 'gantt-zoom-month':
      var nowM = new Date();
      ganttRangeStart = toDateStr(firstDayOfMonth(nowM));
      ganttRangeEnd = toDateStr(lastDayOfMonth(nowM));
      ganttZoomMode = 'month';
      render();
      break;
    case 'gantt-zoom-week':
      var nowW = new Date();
      var monday = mostRecentMonday(nowW);
      ganttRangeStart = toDateStr(monday);
      ganttRangeEnd = toDateStr(addDays(monday, 6));
      ganttZoomMode = 'week';
      render();
      break;
    case 'gantt-zoom-custom':
      ganttZoomMode = 'custom';
      render();
      break;
    case 'gantt-jump-today':
      var nowT = new Date();
      ganttRangeStart = toDateStr(addDays(nowT, -7));
      ganttRangeEnd = toDateStr(addDays(nowT, 30));
      ganttZoomMode = 'custom';
      render();
      break;
    case 'toggle-gantt-group':
      ganttCollapsed[id] = !ganttCollapsed[id];
      render();
      break;
    case 'close-modal':
      closeModal();
      break;
    default:
      break;
  }
}, false);

document.addEventListener('change', function(e){
  if(!e.target) return;
  var action = e.target.getAttribute('data-action');
  if(action === 'filter-gantt'){
    ganttFilterProject = e.target.value;
    render();
    return;
  }
  if(action === 'filter-project-category'){
    projectFilterCategory = e.target.value;
    render();
    return;
  }
  if(action === 'filter-project-priority'){
    projectFilterPriority = e.target.value;
    render();
    return;
  }
  if(e.target.id === 'f-project-category'){
    var catId = e.target.value;
    var hint = document.getElementById('f-category-desc-hint');
    var c = categoryById(catId);
    if(hint) hint.textContent = c ? c.desc : '';
    var otherWrap = document.getElementById('f-category-other-wrap');
    if(otherWrap) otherWrap.style.display = (catId === 'other') ? 'block' : 'none';
  }
}, false);

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
  if(e.key === 'Enter' && e.target && e.target.id === 'f-filter-owner'){
    projectFilterOwner = e.target.value.trim();
    render();
  }
}, false);

/* ===================== Init ===================== */
render();
loadAll();

})();
</script>
