<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA/QC Daily Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#F1F5F7;
  --panel:#FFFFFF;
  --ink:#1C2733;
  --ink-soft:#62707F;
  --ink-faint:#94A2AF;
  --line:#DCE4E9;
  --line-soft:#E9EFF2;
  --navy:#163A53;
  --navy-deep:#0E2738;
  --navy-soft:#E4ECF1;
  --teal:#2A9D8F;
  --teal-soft:#E1F1EE;
  --amber:#E8954B;
  --amber-soft:#FBEEE0;
  --coral:#D9614F;
  --coral-soft:#F9E5E1;
  --slate:#94A2AF;
  --slate-soft:#EBEFF2;
  --radius:10px;
  --shadow: 0 1px 2px rgba(14,39,56,0.05), 0 6px 18px rgba(14,39,56,0.07);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif;
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 28px 28px;
  color:var(--ink);
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono', monospace;}

/* ---------- Topbar ---------- */
.topbar{
  background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  color:#fff;
  padding:18px 24px 0 24px;
  position:sticky; top:0; z-index:30;
  box-shadow:0 4px 16px rgba(14,39,56,0.18);
}
.topbar-inner{
  display:flex; align-items:flex-end; justify-content:space-between;
  max-width:1280px; margin:0 auto;
  flex-wrap:wrap; gap:12px;
}
.brand{display:flex; flex-direction:column; gap:2px; padding-bottom:14px;}
.brand-eyebrow{
  font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:0.18em; color:#9FC3D6; text-transform:uppercase;
}
.brand-title{font-size:22px; font-weight:700; letter-spacing:-0.01em;}
.brand-sub{font-size:12.5px; color:#B9D2DE;}
.tabs{display:flex; gap:4px;}
.tab{
  background:transparent; border:none; color:#C8DCE6; cursor:pointer;
  font-family:'IBM Plex Sans'; font-size:14px; font-weight:600;
  padding:10px 16px 12px 16px; border-radius:8px 8px 0 0;
  position:relative; top:1px;
}
.tab:hover{color:#fff;}
.tab.active{background:var(--bg); color:var(--navy);}
.tab .tab-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--coral); margin-left:6px; vertical-align:middle;}

/* ---------- Layout ---------- */
.page{max-width:1280px; margin:0 auto; padding:26px 24px 60px 24px;}
.page-head{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px;}
.page-title{font-size:19px; font-weight:700; color:var(--navy);}
.page-desc{font-size:13px; color:var(--ink-soft); margin-top:2px;}

.btn{
  font-family:'IBM Plex Sans'; font-size:13.5px; font-weight:600; cursor:pointer;
  border-radius:8px; padding:9px 16px; border:1px solid transparent; transition:transform .08s ease, box-shadow .15s ease;
  display:inline-flex; align-items:center; gap:6px;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--navy); color:#fff;}
.btn-primary:hover{background:var(--navy-deep);}
.btn-ghost{background:var(--panel); color:var(--navy); border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--navy);}
.btn-danger{background:var(--coral-soft); color:var(--coral); border:1px solid #F0C7BF;}
.btn-danger:hover{background:#F4D6CF;}
.btn-sm{padding:6px 11px; font-size:12.5px; border-radius:7px;}
.btn[disabled]{opacity:0.45; cursor:not-allowed;}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}

/* ---------- Empty state ---------- */
.empty-state{
  text-align:center; padding:56px 24px; color:var(--ink-soft);
  border:1.5px dashed var(--line); border-radius:var(--radius); background:repeating-linear-gradient(135deg, var(--panel) 0 10px, #FAFCFD 10px 20px);
}
.empty-state .es-icon{font-size:28px; margin-bottom:10px;}
.empty-state .es-title{font-weight:700; color:var(--navy); font-size:15px; margin-bottom:4px;}
.empty-state .es-sub{font-size:13px; max-width:380px; margin:0 auto 16px auto;}

/* ---------- KPI ---------- */
.kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
@media (max-width:880px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card{padding:16px 18px; position:relative; overflow:hidden;}
.kpi-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent, var(--navy));}
.kpi-label{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
.kpi-value{font-family:'IBM Plex Mono'; font-size:28px; font-weight:700; color:var(--ink); margin-top:6px;}
.kpi-foot{font-size:12px; color:var(--ink-faint); margin-top:4px;}
/* Dual-number KPI card (projects + to-do shown equally prominent) */
.kpi-dual-row{display:flex; align-items:center; gap:12px; margin-top:6px;}
.kpi-dual-item{display:flex; flex-direction:column; align-items:flex-start;}
.kpi-value-sm{font-family:'IBM Plex Mono'; font-size:28px; font-weight:700; color:var(--ink); margin-top:0;}
.kpi-dual-caption{font-size:11px; color:var(--ink-faint); margin-top:2px;}
.kpi-dual-divider{width:1px; height:32px; background:var(--line); flex-shrink:0;}

/* ---------- Stamp (circular progress) ---------- */
.stamp-wrap{
  width:56px; height:56px; border-radius:50%; border:2px dashed var(--line);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.stamp{
  width:44px; height:44px; border-radius:50%;
  background:conic-gradient(var(--scolor) calc(var(--spct)*1%), var(--slate-soft) 0);
  display:flex; align-items:center; justify-content:center; position:relative;
}
.stamp::before{content:''; position:absolute; inset:4px; border-radius:50%; background:var(--panel);}
.stamp span{position:relative; font-family:'IBM Plex Mono'; font-weight:700; font-size:11.5px; color:var(--scolor);}

/* ---------- Projects grid ---------- */
.project-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
@media (max-width:980px){.project-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:680px){.project-grid{grid-template-columns:1fr;}}
.project-card{padding:18px; cursor:pointer; transition:box-shadow .15s ease, border-color .15s ease; display:flex; flex-direction:column; gap:12px;}
.project-card:hover{border-color:var(--pcolor); box-shadow:0 2px 4px rgba(14,39,56,0.06), 0 10px 22px rgba(14,39,56,0.1);}
.project-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.project-tag{width:10px; height:10px; border-radius:3px; background:var(--pcolor); flex-shrink:0; margin-top:5px;}
.project-name{font-size:15px; font-weight:700; color:var(--navy); line-height:1.3;}
.project-desc{font-size:12.5px; color:var(--ink-soft); margin-top:3px; line-height:1.4;}
.project-card-bottom{display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line-soft); padding-top:12px;}
.project-stats{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px;}
.project-stats b{color:var(--ink); font-family:'IBM Plex Mono';}
.card-actions{display:flex; gap:6px;}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;}
table.tk{width:100%; border-collapse:collapse; font-size:13px;}
table.tk th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);
  font-weight:600; padding:10px 12px; border-bottom:1.5px solid var(--line); background:#FAFCFD; white-space:nowrap;
}
table.tk td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
table.tk tr.task-row{cursor:pointer;}
table.tk tr.task-row:hover{background:#FAFCFD;}
.task-title{font-weight:600; color:var(--ink);}
.task-meta{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}

/* Todo table: fixed layout so both tables share identical column widths */
table.tk-todo{table-layout:fixed;}
table.tk-todo col.col-desc{width:32%;}
table.tk-todo col.col-assignee{width:11%;}
table.tk-todo col.col-due{width:10%;}
table.tk-todo col.col-urg{width:9%;}
table.tk-todo col.col-imp{width:9%;}
table.tk-todo col.col-status{width:12%;}
table.tk-todo col.col-note{width:8%;}
table.tk-todo col.col-del{width:9%;}
table.tk-todo td.col-desc-cell{white-space:normal; word-break:break-word;}
table.tk-todo td{white-space:nowrap; vertical-align:middle;}

.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:4px 9px;
  border-radius:20px; white-space:nowrap;
}
.badge-slate{background:var(--slate-soft); color:#5C6B79;}
.badge-amber{background:var(--amber-soft); color:#A85F22;}
.badge-teal{background:var(--teal-soft); color:#1D7468;}
.badge-coral{background:var(--coral-soft); color:#B8412E;}
.badge-cat{background:var(--navy-soft); color:var(--navy);}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}

.progress-track{width:90px; height:7px; background:var(--slate-soft); border-radius:5px; overflow:hidden;}
.progress-fill{height:100%; border-radius:5px;}

/* ---------- Forms / Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(14,39,56,0.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; padding:20px; z-index:100;
}
.modal-panel{
  background:var(--panel); border-radius:14px; max-width:560px; width:100%; max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(14,39,56,0.35); animation:modalIn .15s ease;
}
@keyframes modalIn{from{opacity:0; transform:translateY(6px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);}}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
.modal-head h3{margin:0; font-size:16px; color:var(--navy); font-weight:700;}
.modal-close{background:none; border:none; cursor:pointer; font-size:18px; color:var(--ink-faint); padding:2px 6px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px 20px 22px; display:flex; justify-content:flex-end; gap:8px;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
.field input[type=text], .field input[type=date], .field select, .field textarea{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13.5px;
  font-family:'IBM Plex Sans'; color:var(--ink); background:#FCFDFE;
}
.field textarea{resize:vertical; min-height:60px; font-family:'IBM Plex Sans';}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--navy); outline-offset:1px; border-color:var(--navy);}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.field-error{color:var(--coral); font-size:12px; margin-top:6px; display:none;}
.field-error.show{display:block;}
.swatches{display:flex; gap:8px; flex-wrap:wrap;}
.swatch{width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; box-shadow:0 1px 2px rgba(0,0,0,0.12);}
.swatch.selected{border-color:var(--ink); box-shadow:0 0 0 2px var(--panel) inset, 0 0 0 2px var(--ink);}

.category-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
@media (max-width:480px){.category-grid{grid-template-columns:1fr;}}
.category-card{display:flex; gap:10px; align-items:flex-start; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px; cursor:pointer; background:var(--panel); transition:border-color .12s ease, background .12s ease;}
.category-card:hover{border-color:var(--navy);}
.category-card.selected{border-color:var(--navy); background:var(--navy-soft);}
.cc-icon{width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;}
.cc-body{flex:1; min-width:0;}
.cc-title{font-weight:700; font-size:12.5px; color:var(--ink); display:flex; align-items:center; gap:6px; line-height:1.3;}
.cc-check{color:var(--navy); font-weight:700; font-size:12px;}
.cc-desc{font-size:11px; color:var(--ink-soft); margin-top:2px; line-height:1.35;}

.priority-grid{display:flex; gap:10px;}
.priority-btn{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; border:1.5px solid var(--line); border-radius:10px; cursor:pointer; font-weight:700; font-size:12.5px; background:var(--panel); color:var(--ink-soft); letter-spacing:0.03em;}
.priority-btn:hover{border-color:var(--ink-faint);}
.priority-btn.selected{border-color:currentColor;}

.todo-filter-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;}
@media (max-width:760px){.todo-filter-grid{grid-template-columns:repeat(2,1fr);}}
.todo-filter-box{background:var(--panel); border:1.5px solid var(--line); border-radius:var(--radius); padding:14px 16px; cursor:pointer; transition:border-color .12s ease, box-shadow .12s ease; text-align:left;}
.todo-filter-box:hover{border-color:var(--navy);}
.todo-filter-box.active{border-color:var(--navy); background:var(--navy-soft); box-shadow:var(--shadow);}
.tfb-icon{font-size:16px; margin-bottom:6px;}
.tfb-count{font-family:'IBM Plex Mono'; font-size:24px; font-weight:700; color:var(--ink);}
.tfb-label{font-size:12px; color:var(--ink-soft); font-weight:600; margin-top:2px;}
.todo-filter-box.active .tfb-count{color:var(--navy);}

.todo-status-select{padding:5px 8px; border:1px solid var(--line); border-radius:7px; font-size:12px; font-family:'IBM Plex Sans'; background:var(--panel); cursor:pointer; font-weight:600;}
/* Todo row highlight by status */
table.tk tr.todo-row-done td{background:rgba(42,157,143,0.13);}
table.tk tr.todo-row-done:hover td{background:rgba(42,157,143,0.21);}
table.tk tr.todo-row-inprogress td{background:rgba(232,149,75,0.13);}
table.tk tr.todo-row-inprogress:hover td{background:rgba(232,149,75,0.21);}
table.tk tr.todo-row-overdue td{background:rgba(217,97,79,0.13);}
table.tk tr.todo-row-overdue:hover td{background:rgba(217,97,79,0.21);}
table.tk tr.todo-row-done td:first-child{border-left:4px solid var(--teal);}
table.tk tr.todo-row-inprogress td:first-child{border-left:4px solid var(--amber);}
table.tk tr.todo-row-overdue td:first-child{border-left:4px solid var(--coral);}
.todo-search-bar{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 14px; margin-bottom:14px;}
/* Clickable workload person name */
.wl-name-clickable{cursor:pointer; color:var(--navy); text-decoration:none;}
.wl-name-clickable:hover{text-decoration:underline;}
.wl-name-arrow{font-weight:400; color:var(--ink-faint); margin-left:1px;}
/* Unfinished-work popup list */
.unfinished-list{display:flex; flex-direction:column; gap:0; max-height:360px; overflow-y:auto;}
.unfinished-item{display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line-soft); cursor:pointer; transition:background .12s;}
.unfinished-item:hover{background:#FAFCFD;}
.unfinished-item:last-child{border-bottom:none;}
.uf-icon{font-size:15px; width:22px; text-align:center; flex-shrink:0;}
.uf-main{flex:1; min-width:0;}
.uf-title{font-size:13.5px; font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.uf-meta{font-size:11px; color:var(--ink-faint); margin-top:2px; display:flex; gap:6px; align-items:center;}
.uf-arrow{color:var(--ink-faint); font-size:16px; flex-shrink:0;}
/* Multi-assignee form rows */
#f-task-assignee-rows{display:flex; flex-direction:column; gap:6px;}
.assignee-row{display:flex; gap:6px; align-items:center;}
.assignee-row .f-assignee-name{flex:1.2; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13.5px; font-family:'IBM Plex Sans';}
.assignee-row .f-assignee-dept{flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13.5px; font-family:'IBM Plex Sans'; color:var(--ink-soft);}
.assignee-remove-btn{flex-shrink:0; padding:6px 10px !important; font-size:16px !important; line-height:1; color:var(--coral) !important;}
/* Assignee chips (table / detail display) */
.assignee-chip-wrap{display:flex; flex-wrap:wrap; gap:4px;}
.assignee-chip{display:inline-flex; align-items:center; gap:4px; background:var(--navy-soft); color:var(--navy); font-size:11.5px; font-weight:600; padding:2px 8px; border-radius:12px; white-space:nowrap;}
.assignee-chip .ac-dept{background:rgba(255,255,255,0.6); color:var(--ink-soft); font-size:10px; font-weight:700; padding:0px 6px; border-radius:8px;}
/* Due remaining badges */
.due-pill{display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; white-space:nowrap;}
.due-pill.due-over{background:var(--coral-soft); color:var(--coral);}
.due-pill.due-today{background:#FCE9C8; color:#B26A00;}
.due-pill.due-soon{background:#FDF0D8; color:#C8821A;}
.due-pill.due-ok{background:var(--slate-soft); color:var(--ink-soft);}
.due-pill.due-done{background:var(--teal-soft); color:var(--teal);}
/* Last-activity indicator */
.last-act{display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--ink-faint);}
.last-act.stale{color:var(--coral); font-weight:700;}
.last-act .dot{width:6px; height:6px; border-radius:50%; background:var(--teal); flex-shrink:0;}
.last-act.stale .dot{background:var(--coral);}
/* Activity log list */
.act-log{display:flex; flex-direction:column; gap:0; max-height:280px; overflow-y:auto;}
.act-item{display:flex; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line-soft);}
.act-item:last-child{border-bottom:none;}
.act-icon{font-size:13px; flex-shrink:0; width:20px; text-align:center;}
.act-main{flex:1; min-width:0;}
.act-text{font-size:13px; color:var(--ink); word-break:break-word;}
.act-meta{font-size:10.5px; color:var(--ink-faint); margin-top:2px; display:flex; gap:8px; align-items:center;}
.act-tag{font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:4px; background:var(--slate-soft); color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
.ov-period-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
.ov-period-caption{font-size:12.5px; color:var(--ink-soft); font-weight:600;}
.ov-period-btn{padding:7px 16px; border:1px solid var(--line); border-radius:8px; background:var(--panel); font-size:13px; font-weight:600; font-family:'IBM Plex Sans'; color:var(--ink-soft); cursor:pointer; transition:all .12s;}
.ov-period-btn:hover{border-color:var(--navy); color:var(--navy);}
.ov-period-btn.active{background:var(--navy); border-color:var(--navy); color:#fff;}
.ov-period-now{font-size:12px; color:var(--ink-faint); margin-left:4px;}
.ov-period-now b{color:var(--navy);}
/* Todo inline notes expand */
.todo-notes-expand{padding:10px 16px 14px 16px; background:#FAFCFD; border-top:1px solid var(--line-soft);}
.todo-notes-list{display:flex; flex-direction:column; gap:8px; margin-bottom:10px; max-height:160px; overflow-y:auto;}
.todo-note-item{background:var(--panel); border-left:3px solid var(--navy-soft); border-radius:6px; padding:7px 10px;}
.todo-note-add-row{display:flex; gap:8px; align-items:flex-start;}
.todo-note-ta{flex:1; padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:13px; font-family:'IBM Plex Sans'; resize:vertical; min-height:40px; background:#FCFDFE;}
.todo-note-ta:focus{outline:2px solid var(--navy); outline-offset:1px; border-color:var(--navy);}
.todo-note-btn{border-radius:7px !important; min-width:42px; justify-content:center;}
table.tk tr.todo-notes-panel td{padding:0; background:transparent;}
.tfb-substats{display:flex; flex-direction:column; gap:3px; margin-top:6px;}
.tfb-stat-row{display:flex; align-items:center; gap:5px; font-size:10.5px;}
.tfb-stat-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
.tfb-stat-label{flex:1; color:var(--ink-faint); white-space:nowrap; overflow:hidden;}
.tfb-stat-num{font-family:'IBM Plex Mono'; font-weight:700; font-size:11px; color:var(--ink); flex-shrink:0;}
.tfb-mini-bar{height:4px; border-radius:3px; background:var(--line-soft); margin-top:7px; overflow:hidden; display:flex;}
.tfb-mini-seg{height:100%;}
.todo-filter-box.active .tfb-stat-label{color:var(--navy); opacity:0.75;}
.status-chip-bar{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.status-chip{padding:7px 14px; border-radius:20px; border:1.5px solid var(--line); font-size:12.5px; font-weight:600; cursor:pointer; background:var(--panel); color:var(--ink-soft);}
.status-chip:hover{border-color:var(--navy);}
.status-chip.active{background:var(--navy); border-color:var(--navy); color:#fff;}

/* ---------- Task detail modal ---------- */
.task-detail-meta{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; font-size:13px;}
.tdm-item{background:#FAFCFD; border:1px solid var(--line-soft); border-radius:8px; padding:9px 11px;}
.tdm-item .tdm-label{font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:2px;}
.tdm-item .tdm-value{font-weight:600; color:var(--ink); font-family:'IBM Plex Mono'; font-size:13px;}

.notes-list{display:flex; flex-direction:column; gap:10px; max-height:220px; overflow-y:auto; margin-top:10px; padding-right:4px;}
.note-item{background:#FAFCFD; border-left:3px solid var(--navy-soft); border-radius:6px; padding:8px 11px;}
.note-date{font-size:11px; color:var(--ink-faint); font-family:'IBM Plex Mono'; margin-bottom:3px;}
.note-text{font-size:13px; color:var(--ink); line-height:1.45; white-space:pre-wrap;}
.section-label{font-size:12.5px; font-weight:700; color:var(--navy); margin:18px 0 8px 0; display:flex; align-items:center; gap:6px;}
.add-note-row{display:flex; gap:8px; margin-top:10px; align-items:flex-start;}
.add-note-row textarea{flex:1;}

/* ---------- Gantt ---------- */
.gantt-legend{display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap;}
.legend-item{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}
.legend-dot{width:10px; height:10px; border-radius:3px;}
.gantt-wrap{display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--panel);}
.gantt-labels{width:230px; flex-shrink:0; border-right:1.5px solid var(--line); background:#FAFCFD;}
.gantt-label-head{height:38px; border-bottom:1.5px solid var(--line); display:flex; align-items:center; padding:0 12px; font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em;}
.gantt-label-row{height:34px; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid var(--line-soft); font-size:12.5px; overflow:hidden;}
.gantt-label-row > div{min-width:0; width:100%; overflow:hidden;}
.gantt-label-row .glr-title{font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%;}
.gantt-label-row .glr-sub{font-size:10.5px; color:var(--ink-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;}
.gantt-group-row{height:26px; background:var(--navy-soft); display:flex; align-items:center; padding:0 12px; font-size:11.5px; font-weight:700; color:var(--navy); border-bottom:1px solid var(--line-soft);}
.gantt-scroll{flex:1; min-width:0;}
.gantt-timeline{position:relative; width:100%;}
.gantt-tick-row{height:38px; position:relative; border-bottom:1.5px solid var(--line);}
.gantt-tick{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft);}
.gantt-tick-label{position:absolute; top:11px; font-size:10.5px; color:var(--ink-faint); font-family:'IBM Plex Mono'; padding-left:4px; white-space:nowrap;}
.gantt-body-rows{position:relative;}
.gantt-bg-tick{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft); z-index:0;}
.gantt-row-track{height:34px; border-bottom:1px solid var(--line-soft); position:relative;}
.gantt-group-track{height:26px; background:var(--navy-soft); border-bottom:1px solid var(--line-soft); position:relative;}
.gantt-bar{
  position:absolute; top:8px; height:26px; border-radius:6px; cursor:pointer;
  display:flex; align-items:center; padding:0 8px; overflow:hidden;
  font-size:11px; font-weight:700; color:#fff; white-space:nowrap;
  box-shadow:0 1px 2px rgba(0,0,0,0.15);
}
.gantt-today-line{position:absolute; top:0; bottom:0; width:2px; background:var(--coral); z-index:5;}
.gantt-today-label{position:absolute; top:18px; left:5px; font-size:10px; color:var(--coral); font-weight:700; background:var(--panel); padding:1px 4px; border-radius:4px; z-index:6; white-space:nowrap;}

/* ---------- Gantt bar v2: progress fill + overrun + date flanks ---------- */
.gantt-bar-outer{position:absolute; top:8px; height:18px; border-radius:5px; overflow:hidden; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.12); background:var(--slate-soft); z-index:2;}
.gantt-bar-outer.is-group{top:4px; height:18px; border:none; box-shadow:0 1px 2px rgba(0,0,0,.15);}
.gantt-bar-fill{position:absolute; top:0; left:0; bottom:0;}
.gantt-overrun{position:absolute; top:8px; height:18px; border-radius:0 5px 5px 0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; cursor:pointer; z-index:2;
  background:repeating-linear-gradient(45deg, var(--coral) 0 5px, #B8412E 5px 10px); box-shadow:0 1px 2px rgba(0,0,0,.12);}
.gantt-overrun.is-group{top:4px; height:18px;}
.gantt-date-flank{position:absolute; top:0; height:34px; display:flex; align-items:center; font-size:9.5px; color:var(--ink-faint); font-family:'IBM Plex Mono'; white-space:nowrap; pointer-events:none; z-index:1; overflow:hidden;}
.gantt-date-flank.is-group{height:26px;}
.gantt-date-flank.flank-start{left:0; justify-content:flex-end; padding-right:6px; overflow:visible;}
.gantt-date-flank.flank-end{justify-content:flex-start; padding-left:6px; overflow:visible;}
.gantt-date-flank.flank-overdue{color:var(--coral); font-weight:700;}
.legend-dot.striped{background:repeating-linear-gradient(45deg, var(--coral) 0 4px, #B8412E 4px 8px);}

/* ---------- Gantt group rows (collapsible) ---------- */
.gantt-group-row{cursor:pointer; gap:8px;}
.ggr-chevron{display:inline-block; width:12px; flex-shrink:0; transition:transform .15s ease; font-size:10px;}
.ggr-chevron.collapsed{transform:rotate(-90deg);}
.ggr-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.ggr-name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.ggr-pct{font-family:'IBM Plex Mono'; font-size:11px; font-weight:700; flex-shrink:0;}

/* ---------- Gantt toolbar ---------- */
.gantt-toolbar{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
.gantt-toolbar-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.gtb-label{font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:5px;}
.zoom-toggle{display:flex; gap:3px; background:var(--slate-soft); padding:3px; border-radius:9px;}
.zoom-btn{border:none; background:transparent; padding:6px 13px; font-size:12.5px; font-weight:600; color:var(--ink-soft); border-radius:7px; cursor:pointer; font-family:'IBM Plex Sans';}
.zoom-btn.active{background:var(--panel); color:var(--navy); box-shadow:0 1px 3px rgba(14,39,56,0.12);}
.range-badge{font-family:'IBM Plex Mono'; font-size:12.5px; color:var(--ink-soft); margin-left:auto;}
.gantt-toolbar-row input[type=date]{padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:12.5px; font-family:'IBM Plex Sans'; background:var(--panel);}

/* ---------- Workload ---------- */
.wl-row{display:grid; grid-template-columns:52px 150px 1fr 200px; gap:14px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line-soft);}
.wl-row:last-child{border-bottom:none;}
.wl-ring{display:flex; align-items:center; justify-content:center;}
.wl-name{font-weight:700; font-size:13.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wl-name-sub{font-size:11px; color:var(--ink-faint); font-family:'IBM Plex Mono';}
.wl-bar-track{height:20px; border-radius:6px; background:var(--slate-soft); overflow:hidden; display:flex;}
.wl-bar-seg{height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden;}
.wl-seg-label{font-size:10.5px; font-weight:700; color:#fff; font-family:'IBM Plex Mono'; white-space:nowrap;}
.wl-stats{display:flex; gap:10px; font-size:11.5px; color:var(--ink-soft); justify-content:flex-end; flex-wrap:wrap;}
.wl-stats b{font-family:'IBM Plex Mono'; color:var(--ink);}

.footer-note{text-align:center; font-size:11.5px; color:var(--ink-faint); margin-top:30px; padding-top:16px; border-top:1px dashed var(--line);}
.back-link{display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--navy); font-weight:600; cursor:pointer; margin-bottom:14px; background:none; border:none; padding:0;}
.back-link:hover{text-decoration:underline;}
.filter-bar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
.filter-bar select{padding:8px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; background:var(--panel); font-family:'IBM Plex Sans';}

/* ============ RESPONSIVE — Tablet & Mobile ============ */
@media (max-width:900px){
  .topbar{padding:14px 16px 0 16px;}
  .page{padding:20px 16px 50px 16px;}
  .brand-title{font-size:19px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr); gap:12px;}
  .project-grid{grid-template-columns:repeat(2,1fr);}
  .wl-row{grid-template-columns:44px 1fr; gap:10px 12px; align-items:start;}
  .wl-row > .wl-bar-track{grid-column:1 / -1;}
  .wl-row > .wl-stats{grid-column:1 / -1;}
}
@media (max-width:600px){
  .topbar{padding:12px 12px 0 12px;}
  .topbar-inner{flex-direction:column; align-items:stretch; gap:8px;}
  .brand{padding-bottom:8px; align-items:center; text-align:center;}
  .brand-title{font-size:17px;}
  .brand-sub{font-size:11.5px;}
  .tabs{width:100%; gap:2px;}
  .tab{flex:1; text-align:center; font-size:12.5px; padding:9px 6px 11px 6px; border-radius:8px 8px 0 0;}
  .tab .tab-dot{margin-left:3px;}
  .page{padding:16px 12px 44px 12px;}
  .page-head{flex-direction:column; align-items:stretch; gap:10px;}
  .page-head .btn{width:100%; justify-content:center;}
  .page-title{font-size:17px;}
  .kpi-grid{grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .kpi-card{padding:12px !important;}
  .kpi-value, .kpi-value-sm{font-size:24px !important;}
  .kpi-label{font-size:11px !important;}
  .kpi-foot{font-size:10.5px !important;}
  .project-grid{grid-template-columns:1fr;}
  .todo-filter-grid{grid-template-columns:1fr 1fr; gap:8px;}
  .filter-bar{flex-direction:column; align-items:stretch;}
  .filter-bar select, .filter-bar input, .filter-bar .btn{width:100%;}
  .ov-period-bar{gap:6px;}
  .ov-period-btn{flex:1; padding:8px 6px; font-size:12px;}
  .ov-period-caption{width:100%;}
  .ov-period-now{width:100%; margin-left:0;}
  /* Workload stacks vertically */
  .wl-row{grid-template-columns:1fr; gap:6px; padding:12px 0;}
  /* Modal full-screen-ish on phones */
  .modal-overlay{padding:0; align-items:flex-end;}
  .modal-panel{max-width:100%; width:100%; max-height:94vh; border-radius:16px 16px 0 0;}
  .modal-head{padding:16px 16px;}
  .modal-body{padding:16px;}
  .modal-foot{padding:12px 16px 18px 16px; flex-direction:column-reverse;}
  .modal-foot .btn{width:100%; justify-content:center;}
  .field-row{grid-template-columns:1fr;}
  .category-grid{grid-template-columns:1fr;}
  /* Tables scroll horizontally with comfortable min width */
  .table-wrap{-webkit-overflow-scrolling:touch;}
  table.tk{min-width:640px;}
  table.tk-todo{min-width:680px;}
  /* Filter box sub-stats stay compact */
  .tfb-count{font-size:22px !important;}
  .todo-search-bar{padding:7px 11px;}
}
@media (max-width:380px){
  .kpi-grid{grid-template-columns:1fr;}
  .todo-filter-grid{grid-template-columns:1fr;}
}
/* Make horizontal scrollers feel intentional on touch */
@media (hover:none){
  .table-wrap{scrollbar-width:thin;}
}

<script>
(function(){
"use strict";

/* ===================== Firebase ===================== */
var firebaseConfig = {
  apiKey: "AIzaSyD9LvSLXfb0KlVVsooBq5hHnwDjvyjC-nU",
  authDomain: "qa-qc-tracker.firebaseapp.com",
  databaseURL: "https://qa-qc-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "qa-qc-tracker",
  storageBucket: "qa-qc-tracker.firebasestorage.app",
  messagingSenderId: "319888001304",
  appId: "1:319888001304:web:77b3cf8eed25d90a15766d",
  measurementId: "G-8B3Y8B79VD"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
// Separate data path from the existing QC inspection-records app to avoid collisions
var projectsRef = db.ref('qaTaskTracker/projects');
var tasksRef = db.ref('qaTaskTracker/tasks');
var todosRef = db.ref('qaTaskTracker/todos');


/* ===================== State ===================== */
var projects = [];
var tasks = [];
var todos = [];
var currentView = 'projects';
var currentProjectId = null;
var currentTaskId = null;
var wlUnfinishedByPerson = {}; // populated each render: { personName: [{kind:'project'|'todo', id, title, ...}] }
var todoFilterWindow = 'all'; // 'all' | 'today' | 'week' | 'month' | 'overdue'
var todoFilterStatus = 'all';
var todoFilterAssignee = '';
var ganttFilterProject = 'all';
var overviewPeriod = 'all'; // 'all' | 'month' | 'year' — filters overview by Due Date
var ganttRangeStart = null; // 'YYYY-MM-DD' or null = auto-fit
var ganttRangeEnd = null;
var ganttZoomMode = 'custom'; // 'month' | 'week' | 'custom'
var ganttCollapsed = {}; // projectId -> true if collapsed
var projectFilterCategory = 'all';
var projectFilterPriority = 'all';
var projectFilterOwner = '';
var dataReady = false;
var firebaseError = null;
var projectsLoaded = false, tasksLoaded = false, todosLoaded = false;

var PROJECT_COLORS = ['#4F46E5','#0284C7','#16A34A','#D97706','#DC2626','#9333EA','#2563EB','#EA580C','#64748B','#DB2777','#0D9488','#92400E'];

var CATEGORY_GROUPS = [
  {id:'quality_improvement', label:'Quality Improvement', desc:'โครงการปรับปรุงคุณภาพสินค้าและกระบวนการ', icon:'&#8599;', iconBg:'#EEF2FF', iconColor:'#4F46E5'},
  {id:'qa_system', label:'QA System', desc:'โครงการพัฒนาระบบคุณภาพและมาตรฐาน', icon:'&#128421;', iconBg:'#E0F2FE', iconColor:'#0284C7'},
  {id:'supplier_quality', label:'Supplier Quality Dev.', desc:'โครงการพัฒนาคุณภาพ Supplier', icon:'&#128666;', iconBg:'#DCFCE7', iconColor:'#16A34A'},
  {id:'customer_quality', label:'Customer Quality', desc:'โครงการจัดการปัญหาคุณภาพลูกค้า', icon:'&#128101;', iconBg:'#FEF3C7', iconColor:'#D97706'},
  {id:'inspection_measurement', label:'Inspection &amp; Measurement', desc:'โครงการพัฒนาระบบตรวจสอบและเครื่องมือวัด', icon:'&#128209;', iconBg:'#DBEAFE', iconColor:'#2563EB'},
  {id:'new_product_validation', label:'New Product Validation', desc:'โครงการรองรับสินค้าใหม่', icon:'&#129514;', iconBg:'#F3E8FF', iconColor:'#9333EA'},
  {id:'other', label:'อื่นๆ', desc:'งานอื่นๆ', icon:'&#128193;', iconBg:'#F1F5F9', iconColor:'#64748B'}
];
var PRIORITY_LEVELS = [
  {id:'high', label:'สูง', cls:'badge-coral', flagColor:'#DC2626', tint:'var(--coral-soft)'},
  {id:'medium', label:'ปานกลาง', cls:'badge-amber', flagColor:'#D97706', tint:'var(--amber-soft)'},
  {id:'low', label:'ต่ำ', cls:'badge-slate', flagColor:'#16A34A', tint:'var(--teal-soft)'}
];
function categoryById(id){ return CATEGORY_GROUPS.find(function(c){ return c.id === id; }) || null; }
function priorityById(id){ return PRIORITY_LEVELS.find(function(p){ return p.id === id; }) || PRIORITY_LEVELS[1]; }
function projectCategoryLabel(p){
  if(!p.category) return null;
  if(p.category === 'other') return p.categoryOther ? p.categoryOther : 'อื่นๆ';
  var c = categoryById(p.category);
  return c ? c.label : null;
}

var TODO_STATUSES = [
  {id:'not_started', label:'ยังไม่ได้เริ่ม', cls:'badge-slate', color:'var(--slate)'},
  {id:'in_progress', label:'กำลังดำเนินการ', cls:'badge-amber', color:'var(--amber)'},
  {id:'done', label:'เสร็จ', cls:'badge-teal', color:'var(--teal)'}
];
function todoStatusById(id){ return TODO_STATUSES.find(function(s){ return s.id === id; }) || TODO_STATUSES[0]; }
function todoById(id){ return todos.find(function(t){ return t.id === id; }); }
function isTodoOverdue(t){ return t.dueDate && t.dueDate < todayStr() && t.status !== 'done'; }
function todoStatusInfo(t){
  if(isTodoOverdue(t)) return {label:'เกินกำหนด', cls:'badge-coral', color:'var(--coral)'};
  return todoStatusById(t.status);
}
function sortByDueDateTodo(list){
  return list.slice().sort(function(a,b){ return (a.dueDate||'9999').localeCompare(b.dueDate||'9999'); });
}
function buildOptionGrid(gridId, options, selectedId, iconHtml){
  var btns = options.map(function(opt){
    var sel = opt.id === selectedId;
    var tint = opt.tint || 'var(--slate-soft)';
    var color = opt.flagColor || opt.color || 'var(--ink)';
    return '<div class="priority-btn' + (sel?' selected':'') + '" data-action="select-option" data-val="' + opt.id + '" data-tint="' + tint + '" style="color:' + color + '; ' + (sel ? ('background:'+tint+';') : '') + '">' +
      (iconHtml ? iconHtml + ' ' : '') + opt.label.toUpperCase() +
    '</div>';
  }).join('');
  return '<div class="priority-grid" id="' + gridId + '" data-selected="' + selectedId + '">' + btns + '</div>';
}

/* ===================== Storage (Firebase Realtime Database) ===================== */
function notesToObj(notesArr){
  var o = {};
  (notesArr||[]).forEach(function(n){ o[n.id] = n; });
  return o;
}
function notesFromSnapshot(notesVal){
  if(!notesVal) return [];
  return Object.keys(notesVal).map(function(k){ return notesVal[k]; });
}
function checkReady(){
  if(projectsLoaded && tasksLoaded && todosLoaded) dataReady = true;
  render();
}
function loadAll(){
  projectsRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    projects = Object.keys(val).map(function(k){ return val[k]; });
    projectsLoaded = true;
    checkReady();
  }, function(err){
    console.error('projects listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    projectsLoaded = true;
    checkReady();
  });
  tasksRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    tasks = Object.keys(val).map(function(k){
      var t = val[k];
      t.notes = notesFromSnapshot(t.notes);
      return t;
    });
    tasksLoaded = true;
    checkReady();
  }, function(err){
    console.error('tasks listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    tasksLoaded = true;
    checkReady();
  });
  todosRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    todos = Object.keys(val).map(function(k){
      var t = val[k];
      t.notes = notesFromSnapshot(t.notes);
      return t;
    });
    todosLoaded = true;
    checkReady();
  }, function(err){
    console.error('todos listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    todosLoaded = true;
    checkReady();
  });
}
function pushProject(p){
  projectsRef.child(p.id).set(p).catch(function(e){ console.error('save project failed', e); });
}
function removeProject(id){
  projectsRef.child(id).remove().catch(function(e){ console.error('delete project failed', e); });
}
function pushTask(t){
  var copy = Object.assign({}, t);
  copy.notes = notesToObj(t.notes);
  tasksRef.child(t.id).set(copy).catch(function(e){ console.error('save task failed', e); });
}
function removeTask(id){
  tasksRef.child(id).remove().catch(function(e){ console.error('delete task failed', e); });
}
function pushTodo(t){
  var copy = Object.assign({}, t);
  copy.notes = notesToObj(t.notes || []);
  todosRef.child(t.id).set(copy).catch(function(e){ console.error('save todo failed', e); });
}
function removeTodo(id){
  todosRef.child(id).remove().catch(function(e){ console.error('delete todo failed', e); });
}

/* ===================== Helpers ===================== */
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function todayStr(){
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseDateStr(s){ return new Date(s + 'T00:00:00'); }
function addDays(d, n){ return new Date(d.getTime() + n*86400000); }
function dayDiff(a,b){ return Math.round((b.getTime() - a.getTime()) / 86400000); }
function fmtDateThai(s){
  if(!s) return '-';
  var d = parseDateStr(s);
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + (d.getFullYear()+543);
}
function fmtDateShort(d){
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate() + ' ' + months[d.getMonth()];
}
function fmtTimestamp(ts){
  var d = new Date(ts);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + (d.getFullYear()+543) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function isOverdue(t){ return t.dueDate && t.dueDate < todayStr() && Number(t.progress) < 100; }
function toDateStr(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function firstDayOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function lastDayOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function mostRecentMonday(d){ var day = d.getDay(); var diff = day===0 ? 6 : day-1; return addDays(d, -diff); }
function fmtMonthYearShort(d){
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var yy = String((d.getFullYear()+543) % 100).padStart(2,'0');
  return months[d.getMonth()] + ' ' + yy;
}
function overdueDaysOf(t){
  if(!isOverdue(t)) return 0;
  return dayDiff(parseDateStr(t.dueDate), parseDateStr(todayStr()));
}
function projectAggregate(pid){
  var all = tasksOfProject(pid).filter(function(t){ return t.startDate && t.dueDate; });
  if(!all.length) return null;
  var minS = null, maxE = null, sum = 0;
  all.forEach(function(t){
    var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
    if(!minS || s < minS) minS = s;
    if(!maxE || e > maxE) maxE = e;
    sum += Number(t.progress);
  });
  return { startDate: toDateStr(minS), dueDate: toDateStr(maxE), progress: Math.round(sum/all.length), taskCount: all.length };
}
function fillColorFor(progress){
  if(Number(progress) === 100) return 'var(--teal)';
  if(Number(progress) === 0) return 'var(--slate)';
  return 'var(--amber)';
}
function buildDonutSvg(segments, opts){
  opts = opts || {};
  var size = opts.size || 140;
  var thickness = opts.thickness || 18;
  var r = (size/2) - (thickness/2);
  var cx = size/2, cy = size/2;
  var circumference = 2 * Math.PI * r;
  var total = segments.reduce(function(s,seg){ return s + (Number(seg.value)||0); }, 0);
  var circles = '';
  if(total <= 0){
    circles = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--slate-soft)" stroke-width="' + thickness + '"/>';
  } else {
    var offset = 0;
    segments.forEach(function(seg){
      var v = Number(seg.value) || 0;
      if(v <= 0) return;
      var frac = v / total;
      var len = frac * circumference;
      var gap = Math.max(0, circumference - len);
      circles += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="' + thickness +
        '" stroke-dasharray="' + len + ' ' + gap + '" stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>';
      offset += len;
    });
  }
  var centerLabel = opts.centerLabel || '';
  var centerSub = opts.centerSub || '';
  var labelSize = opts.labelSize || Math.round(size*0.16);
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" style="flex-shrink:0;">' + circles +
    (centerLabel ? '<text x="' + cx + '" y="' + (centerSub?cy-3:cy+5) + '" text-anchor="middle" font-family="IBM Plex Mono" font-size="' + labelSize + '" font-weight="700" fill="var(--ink)">' + centerLabel + '</text>' : '') +
    (centerSub ? '<text x="' + cx + '" y="' + (cy+15) + '" text-anchor="middle" font-family="IBM Plex Sans" font-size="' + Math.round(size*0.078) + '" fill="var(--ink-faint)">' + centerSub + '</text>' : '') +
  '</svg>';
}
function buildBarSegments(item, rangeStart, rangeEnd, totalDays){
  var ts = parseDateStr(item.startDate), te = parseDateStr(item.dueDate);
  var today = parseDateStr(todayStr());
  var overdue = isOverdue(item);
  var overdueDays = overdue ? dayDiff(te, today) : 0;
  function pct(days){ return Math.max(0, (days/totalDays)*100); }

  var seg = { hasPlan:false, planLeft:0, planWidthPx:0, hasOverrun:false, overrunLeft:0, overrunWidthPx:0, overdue:overdue, overdueDays:overdueDays, endOfBarPx:0 };

  var planVisStart = ts < rangeStart ? rangeStart : ts;
  var planVisEnd = te > rangeEnd ? rangeEnd : te;
  if(te >= rangeStart && ts <= rangeEnd && planVisEnd >= planVisStart){
    seg.hasPlan = true;
    seg.planLeft = pct(dayDiff(rangeStart, planVisStart));
    var planDays = dayDiff(planVisStart, planVisEnd) + 1;
    seg.planWidthPx = Math.max(0.5, pct(planDays));
    seg.endOfBarPx = seg.planLeft + seg.planWidthPx;
  }

  if(overdue){
    var overrunStartReal = addDays(te, 1);
    var overrunEndReal = today;
    var ovVisStart = overrunStartReal < rangeStart ? rangeStart : overrunStartReal;
    var ovVisEnd = overrunEndReal > rangeEnd ? rangeEnd : overrunEndReal;
    if(overrunEndReal >= rangeStart && overrunStartReal <= rangeEnd && ovVisEnd >= ovVisStart){
      seg.hasOverrun = true;
      seg.overrunLeft = pct(dayDiff(rangeStart, ovVisStart));
      var ovDays = dayDiff(ovVisStart, ovVisEnd) + 1;
      seg.overrunWidthPx = Math.max(0.4, pct(ovDays));
      seg.endOfBarPx = Math.max(seg.endOfBarPx, seg.overrunLeft + seg.overrunWidthPx);
    }
  }
  return seg;
}
function renderBarHtml(item, seg, opts){
  opts = opts || {};
  var isGroup = !!opts.isGroup;
  var fillColor = opts.fillColorOverride || fillColorFor(item.progress);
  var fillPct = Math.max(0, Math.min(100, Number(item.progress)));
  var trackBg = isGroup && opts.groupColor ? ('background:var(--slate-soft); background:color-mix(in srgb, ' + opts.groupColor + ' 16%, white);') : '';
  var html = '';
  if(seg.hasPlan){
    html += '<div class="gantt-bar-outer' + (isGroup?' is-group':'') + '" style="left:' + seg.planLeft + '%; width:' + seg.planWidthPx + '%; ' + trackBg + '" data-action="' + (opts.dataAction||'') + '" data-id="' + (opts.dataId||'') + '" title="' + esc(opts.tooltip||'') + '">' +
      '<div class="gantt-bar-fill" style="width:' + fillPct + '%; background:' + fillColor + ';"></div>' +
    '</div>';
  }
  if(seg.hasOverrun){
    var ovLabel = seg.overrunWidthPx > 2.2 ? ('+' + seg.overdueDays) : '';
    html += '<div class="gantt-overrun' + (isGroup?' is-group':'') + '" style="left:' + seg.overrunLeft + '%; width:' + seg.overrunWidthPx + '%;" data-action="' + (opts.dataAction||'') + '" data-id="' + (opts.dataId||'') + '" title="' + esc(opts.tooltip||'') + '">' + ovLabel + '</div>';
  }
  return html;
}
function statusInfo(t){
  var p = Number(t.progress);
  if(isOverdue(t)) return {label:'เลยกำหนด', cls:'badge-coral', color:'var(--coral)'};
  if(p === 100) return {label:'เสร็จสมบูรณ์', cls:'badge-teal', color:'var(--teal)'};
  if(p === 0) return {label:'ยังไม่ได้ดำเนินการ', cls:'badge-slate', color:'var(--slate)'};
  return {label:'กำลังดำเนินการ', cls:'badge-amber', color:'var(--amber)'};
}
function projectById(id){ return projects.find(function(p){ return p.id === id; }); }
function taskById(id){ return tasks.find(function(t){ return t.id === id; }); }

/* ===================== Task assignees (name + department, supports multiple people) ===================== */
// Returns a normalized array [{name, dept}], migrating legacy string `assignee` automatically.
function taskAssigneesArr(t){
  if(Array.isArray(t.assignees) && t.assignees.length){
    return t.assignees.map(function(a){ return { name: a.name || '', dept: a.dept || '' }; });
  }
  if(t.assignee){
    return [{ name: t.assignee, dept: '' }];
  }
  return [];
}
// Human-readable summary, e.g. "คนA (QA), คนB (Production)"
function taskAssigneeDisplay(t){
  var arr = taskAssigneesArr(t);
  if(!arr.length) return '';
  return arr.map(function(a){ return a.dept ? (a.name + ' (' + a.dept + ')') : a.name; }).join(', ');
}
// Short summary for tight spaces (Gantt label): names only, comma-separated
function taskAssigneeNamesShort(t){
  var arr = taskAssigneesArr(t);
  return arr.map(function(a){ return a.name; }).join(', ');
}
// Searchable text blob (names + departments) used by filters/search
function taskAssigneeSearchText(t){
  var arr = taskAssigneesArr(t);
  return arr.map(function(a){ return a.name + ' ' + a.dept; }).join(' ').toLowerCase();
}
function tasksOfProject(pid){ return tasks.filter(function(t){ return t.projectId === pid; }); }
function nextColor(){ return PROJECT_COLORS[projects.length % PROJECT_COLORS.length]; }
function truncate(s, n){ s = String(s||''); return s.length > n ? s.slice(0, n-1) + '…' : s; }
function latestNote(t){
  if(!t.notes || !t.notes.length) return null;
  return t.notes.slice().sort(function(a,b){ return b.date - a.date; })[0];
}

/* ===================== Activity log helpers ===================== */
// Push an activity entry into an item's notes array. type: 'comment' | 'progress' | 'status' | 'created'
function addActivity(item, type, text){
  if(!item.notes) item.notes = [];
  item.notes.push({ id: uid('act'), date: Date.now(), text: text, type: type || 'comment' });
}
// Timestamp (ms) of the most recent activity of any kind; falls back to updatedAt/createdAt
function lastActivityTime(item){
  var newest = 0;
  if(item.notes && item.notes.length){
    item.notes.forEach(function(n){ if(n.date > newest) newest = n.date; });
  }
  if(item.updatedAt && item.updatedAt > newest) newest = item.updatedAt;
  if(!newest && item.createdAt) newest = item.createdAt;
  return newest || 0;
}
// Whole days since a timestamp (0 = today)
function daysSince(ms){
  if(!ms) return null;
  var d0 = new Date(); d0.setHours(0,0,0,0);
  var d1 = new Date(ms); d1.setHours(0,0,0,0);
  return Math.round((d0 - d1) / 86400000);
}
// Human label for last activity, plus a flag if it's been "stale" too long
function lastActivityInfo(item){
  var ms = lastActivityTime(item);
  if(!ms) return { label:'ยังไม่เคยอัปเดต', days:null, stale:true };
  var d = daysSince(ms);
  var label = d === 0 ? 'อัปเดตวันนี้' : (d === 1 ? 'อัปเดตเมื่อวาน' : 'อัปเดต ' + d + ' วันก่อน');
  return { label:label, days:d, stale:(d !== null && d >= 7) };
}
// Days remaining / overdue for an item with a dueDate. Returns {label, cls, days}
function dueRemainingInfo(t){
  if(!t.dueDate) return null;
  var d0 = new Date(); d0.setHours(0,0,0,0);
  var dd = parseDateStr(t.dueDate); dd.setHours(0,0,0,0);
  var diff = Math.round((dd - d0) / 86400000);
  var isDone = (typeof t.progress !== 'undefined') ? (Number(t.progress) === 100) : (t.status === 'done');
  if(isDone) return { label:'เสร็จแล้ว', cls:'due-done', days:diff };
  if(diff < 0) return { label:'เกินกำหนด ' + Math.abs(diff) + ' วัน', cls:'due-over', days:diff };
  if(diff === 0) return { label:'ครบกำหนดวันนี้', cls:'due-today', days:0 };
  if(diff === 1) return { label:'เหลือ 1 วัน', cls:'due-soon', days:1 };
  if(diff <= 3) return { label:'เหลือ ' + diff + ' วัน', cls:'due-soon', days:diff };
  return { label:'เหลือ ' + diff + ' วัน', cls:'due-ok', days:diff };
}
function activityTypeMeta(type){
  if(type === 'progress') return { icon:'&#128200;', color:'var(--amber)', tag:'ความคืบหน้า' };
  if(type === 'status')   return { icon:'&#128260;', color:'var(--navy)', tag:'สถานะ' };
  if(type === 'created')  return { icon:'&#10024;', color:'var(--teal)', tag:'สร้างงาน' };
  return { icon:'&#128172;', color:'var(--slate)', tag:'บันทึก' };
}
function sortByStartDate(list){
  return list.slice().sort(function(a,b){ return (a.startDate||'9999').localeCompare(b.startDate||'9999'); });
}
