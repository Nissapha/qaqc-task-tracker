<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA/QC Daily Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#F1F5F7;
  --panel:#FFFFFF;
  --ink:#1C2733;
  --ink-soft:#62707F;
  --ink-faint:#94A2AF;
  --line:#DCE4E9;
  --line-soft:#E9EFF2;
  --navy:#163A53;
  --navy-deep:#0E2738;
  --navy-soft:#E4ECF1;
  --teal:#2A9D8F;
  --teal-soft:#E1F1EE;
  --amber:#E8954B;
  --amber-soft:#FBEEE0;
  --coral:#D9614F;
  --coral-soft:#F9E5E1;
  --slate:#94A2AF;
  --slate-soft:#EBEFF2;
  --radius:10px;
  --shadow: 0 1px 2px rgba(14,39,56,0.05), 0 6px 18px rgba(14,39,56,0.07);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif;
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 28px 28px;
  color:var(--ink);
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono', monospace;}

/* ---------- Topbar ---------- */
.topbar{
  background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  color:#fff;
  padding:18px 24px 0 24px;
  position:sticky; top:0; z-index:30;
  box-shadow:0 4px 16px rgba(14,39,56,0.18);
}
.topbar-inner{
  display:flex; align-items:flex-end; justify-content:space-between;
  max-width:1280px; margin:0 auto;
  flex-wrap:wrap; gap:12px;
}
.brand{display:flex; flex-direction:column; gap:2px; padding-bottom:14px;}
.brand-eyebrow{
  font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:0.18em; color:#9FC3D6; text-transform:uppercase;
}
.brand-title{font-size:22px; font-weight:700; letter-spacing:-0.01em;}
.brand-sub{font-size:12.5px; color:#B9D2DE;}
.tabs{display:flex; gap:4px;}
.tab{
  background:transparent; border:none; color:#C8DCE6; cursor:pointer;
  font-family:'IBM Plex Sans'; font-size:14px; font-weight:600;
  padding:10px 16px 12px 16px; border-radius:8px 8px 0 0;
  position:relative; top:1px;
}
.tab:hover{color:#fff;}
.tab.active{background:var(--bg); color:var(--navy);}
.tab .tab-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--coral); margin-left:6px; vertical-align:middle;}

/* ---------- Layout ---------- */
.page{max-width:1280px; margin:0 auto; padding:26px 24px 60px 24px;}
.page-head{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px;}
.page-title{font-size:19px; font-weight:700; color:var(--navy);}
.page-desc{font-size:13px; color:var(--ink-soft); margin-top:2px;}

.btn{
  font-family:'IBM Plex Sans'; font-size:13.5px; font-weight:600; cursor:pointer;
  border-radius:8px; padding:9px 16px; border:1px solid transparent; transition:transform .08s ease, box-shadow .15s ease;
  display:inline-flex; align-items:center; gap:6px;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--navy); color:#fff;}
.btn-primary:hover{background:var(--navy-deep);}
.btn-ghost{background:var(--panel); color:var(--navy); border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--navy);}
.btn-danger{background:var(--coral-soft); color:var(--coral); border:1px solid #F0C7BF;}
.btn-danger:hover{background:#F4D6CF;}
.btn-sm{padding:6px 11px; font-size:12.5px; border-radius:7px;}
.btn[disabled]{opacity:0.45; cursor:not-allowed;}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}

/* ---------- Empty state ---------- */
.empty-state{
  text-align:center; padding:56px 24px; color:var(--ink-soft);
  border:1.5px dashed var(--line); border-radius:var(--radius); background:repeating-linear-gradient(135deg, var(--panel) 0 10px, #FAFCFD 10px 20px);
}
.empty-state .es-icon{font-size:28px; margin-bottom:10px;}
.empty-state .es-title{font-weight:700; color:var(--navy); font-size:15px; margin-bottom:4px;}
.empty-state .es-sub{font-size:13px; max-width:380px; margin:0 auto 16px auto;}

/* ---------- KPI ---------- */
.kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
@media (max-width:880px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card{padding:16px 18px; position:relative; overflow:hidden;}
.kpi-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent, var(--navy));}
.kpi-label{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
.kpi-value{font-family:'IBM Plex Mono'; font-size:28px; font-weight:700; color:var(--ink); margin-top:6px;}
.kpi-foot{font-size:12px; color:var(--ink-faint); margin-top:4px;}

/* ---------- Stamp (circular progress) ---------- */
.stamp-wrap{
  width:56px; height:56px; border-radius:50%; border:2px dashed var(--line);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.stamp{
  width:44px; height:44px; border-radius:50%;
  background:conic-gradient(var(--scolor) calc(var(--spct)*1%), var(--slate-soft) 0);
  display:flex; align-items:center; justify-content:center; position:relative;
}
.stamp::before{content:''; position:absolute; inset:4px; border-radius:50%; background:var(--panel);}
.stamp span{position:relative; font-family:'IBM Plex Mono'; font-weight:700; font-size:11.5px; color:var(--scolor);}

/* ---------- Projects grid ---------- */
.project-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
@media (max-width:980px){.project-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:680px){.project-grid{grid-template-columns:1fr;}}
.project-card{padding:18px; cursor:pointer; transition:box-shadow .15s ease, border-color .15s ease; display:flex; flex-direction:column; gap:12px;}
.project-card:hover{border-color:var(--pcolor); box-shadow:0 2px 4px rgba(14,39,56,0.06), 0 10px 22px rgba(14,39,56,0.1);}
.project-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.project-tag{width:10px; height:10px; border-radius:3px; background:var(--pcolor); flex-shrink:0; margin-top:5px;}
.project-name{font-size:15px; font-weight:700; color:var(--navy); line-height:1.3;}
.project-desc{font-size:12.5px; color:var(--ink-soft); margin-top:3px; line-height:1.4;}
.project-card-bottom{display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line-soft); padding-top:12px;}
.project-stats{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px;}
.project-stats b{color:var(--ink); font-family:'IBM Plex Mono';}
.card-actions{display:flex; gap:6px;}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;}
table.tk{width:100%; border-collapse:collapse; font-size:13px;}
table.tk th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);
  font-weight:600; padding:10px 12px; border-bottom:1.5px solid var(--line); background:#FAFCFD; white-space:nowrap;
}
table.tk td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
table.tk tr.task-row{cursor:pointer;}
table.tk tr.task-row:hover{background:#FAFCFD;}
.task-title{font-weight:600; color:var(--ink);}
.task-meta{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}

/* Todo table: fixed layout so both tables share identical column widths */
table.tk-todo{table-layout:fixed;}
table.tk-todo col.col-desc{width:32%;}
table.tk-todo col.col-assignee{width:11%;}
table.tk-todo col.col-due{width:10%;}
table.tk-todo col.col-urg{width:9%;}
table.tk-todo col.col-imp{width:9%;}
table.tk-todo col.col-status{width:12%;}
table.tk-todo col.col-note{width:8%;}
table.tk-todo col.col-del{width:9%;}
table.tk-todo td.col-desc-cell{white-space:normal; word-break:break-word;}
table.tk-todo td{white-space:nowrap; vertical-align:middle;}

.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:4px 9px;
  border-radius:20px; white-space:nowrap;
}
.badge-slate{background:var(--slate-soft); color:#5C6B79;}
.badge-amber{background:var(--amber-soft); color:#A85F22;}
.badge-teal{background:var(--teal-soft); color:#1D7468;}
.badge-coral{background:var(--coral-soft); color:#B8412E;}
.badge-cat{background:var(--navy-soft); color:var(--navy);}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}

.progress-track{width:90px; height:7px; background:var(--slate-soft); border-radius:5px; overflow:hidden;}
.progress-fill{height:100%; border-radius:5px;}

/* ---------- Forms / Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(14,39,56,0.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; padding:20px; z-index:100;
}
.modal-panel{
  background:var(--panel); border-radius:14px; max-width:560px; width:100%; max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(14,39,56,0.35); animation:modalIn .15s ease;
}
@keyframes modalIn{from{opacity:0; transform:translateY(6px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);}}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
.modal-head h3{margin:0; font-size:16px; color:var(--navy); font-weight:700;}
.modal-close{background:none; border:none; cursor:pointer; font-size:18px; color:var(--ink-faint); padding:2px 6px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px 20px 22px; display:flex; justify-content:flex-end; gap:8px;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
.field input[type=text], .field input[type=date], .field select, .field textarea{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13.5px;
  font-family:'IBM Plex Sans'; color:var(--ink); background:#FCFDFE;
}
.field textarea{resize:vertical; min-height:60px; font-family:'IBM Plex Sans';}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--navy); outline-offset:1px; border-color:var(--navy);}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.field-error{color:var(--coral); font-size:12px; margin-top:6px; display:none;}
.field-error.show{display:block;}
.swatches{display:flex; gap:8px; flex-wrap:wrap;}
.swatch{width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; box-shadow:0 1px 2px rgba(0,0,0,0.12);}
.swatch.selected{border-color:var(--ink); box-shadow:0 0 0 2px var(--panel) inset, 0 0 0 2px var(--ink);}

.category-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
@media (max-width:480px){.category-grid{grid-template-columns:1fr;}}
.category-card{display:flex; gap:10px; align-items:flex-start; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px; cursor:pointer; background:var(--panel); transition:border-color .12s ease, background .12s ease;}
.category-card:hover{border-color:var(--navy);}
.category-card.selected{border-color:var(--navy); background:var(--navy-soft);}
.cc-icon{width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;}
.cc-body{flex:1; min-width:0;}
.cc-title{font-weight:700; font-size:12.5px; color:var(--ink); display:flex; align-items:center; gap:6px; line-height:1.3;}
.cc-check{color:var(--navy); font-weight:700; font-size:12px;}
.cc-desc{font-size:11px; color:var(--ink-soft); margin-top:2px; line-height:1.35;}

.priority-grid{display:flex; gap:10px;}
.priority-btn{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; border:1.5px solid var(--line); border-radius:10px; cursor:pointer; font-weight:700; font-size:12.5px; background:var(--panel); color:var(--ink-soft); letter-spacing:0.03em;}
.priority-btn:hover{border-color:var(--ink-faint);}
.priority-btn.selected{border-color:currentColor;}

.todo-filter-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;}
@media (max-width:760px){.todo-filter-grid{grid-template-columns:repeat(2,1fr);}}
.todo-filter-box{background:var(--panel); border:1.5px solid var(--line); border-radius:var(--radius); padding:14px 16px; cursor:pointer; transition:border-color .12s ease, box-shadow .12s ease; text-align:left;}
.todo-filter-box:hover{border-color:var(--navy);}
.todo-filter-box.active{border-color:var(--navy); background:var(--navy-soft); box-shadow:var(--shadow);}
.tfb-icon{font-size:16px; margin-bottom:6px;}
.tfb-count{font-family:'IBM Plex Mono'; font-size:24px; font-weight:700; color:var(--ink);}
.tfb-label{font-size:12px; color:var(--ink-soft); font-weight:600; margin-top:2px;}
.todo-filter-box.active .tfb-count{color:var(--navy);}

.todo-status-select{padding:5px 8px; border:1px solid var(--line); border-radius:7px; font-size:12px; font-family:'IBM Plex Sans'; background:var(--panel); cursor:pointer; font-weight:600;}
/* Todo row highlight by status */
table.tk tr.todo-row-done td{background:rgba(42,157,143,0.13);}
table.tk tr.todo-row-done:hover td{background:rgba(42,157,143,0.21);}
table.tk tr.todo-row-inprogress td{background:rgba(232,149,75,0.13);}
table.tk tr.todo-row-inprogress:hover td{background:rgba(232,149,75,0.21);}
table.tk tr.todo-row-overdue td{background:rgba(217,97,79,0.13);}
table.tk tr.todo-row-overdue:hover td{background:rgba(217,97,79,0.21);}
table.tk tr.todo-row-done td:first-child{border-left:4px solid var(--teal);}
table.tk tr.todo-row-inprogress td:first-child{border-left:4px solid var(--amber);}
table.tk tr.todo-row-overdue td:first-child{border-left:4px solid var(--coral);}
.todo-search-bar{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 14px; margin-bottom:14px;}
/* Todo inline notes expand */
.todo-notes-expand{padding:10px 16px 14px 16px; background:#FAFCFD; border-top:1px solid var(--line-soft);}
.todo-notes-list{display:flex; flex-direction:column; gap:8px; margin-bottom:10px; max-height:160px; overflow-y:auto;}
.todo-note-item{background:var(--panel); border-left:3px solid var(--navy-soft); border-radius:6px; padding:7px 10px;}
.todo-note-add-row{display:flex; gap:8px; align-items:flex-start;}
.todo-note-ta{flex:1; padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:13px; font-family:'IBM Plex Sans'; resize:vertical; min-height:40px; background:#FCFDFE;}
.todo-note-ta:focus{outline:2px solid var(--navy); outline-offset:1px; border-color:var(--navy);}
.todo-note-btn{border-radius:7px !important; min-width:42px; justify-content:center;}
table.tk tr.todo-notes-panel td{padding:0; background:transparent;}
.tfb-substats{display:flex; flex-direction:column; gap:3px; margin-top:6px;}
.tfb-stat-row{display:flex; align-items:center; gap:5px; font-size:10.5px;}
.tfb-stat-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
.tfb-stat-label{flex:1; color:var(--ink-faint); white-space:nowrap; overflow:hidden;}
.tfb-stat-num{font-family:'IBM Plex Mono'; font-weight:700; font-size:11px; color:var(--ink); flex-shrink:0;}
.tfb-mini-bar{height:4px; border-radius:3px; background:var(--line-soft); margin-top:7px; overflow:hidden; display:flex;}
.tfb-mini-seg{height:100%;}
.todo-filter-box.active .tfb-stat-label{color:var(--navy); opacity:0.75;}
.status-chip-bar{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.status-chip{padding:7px 14px; border-radius:20px; border:1.5px solid var(--line); font-size:12.5px; font-weight:600; cursor:pointer; background:var(--panel); color:var(--ink-soft);}
.status-chip:hover{border-color:var(--navy);}
.status-chip.active{background:var(--navy); border-color:var(--navy); color:#fff;}

/* ---------- Task detail modal ---------- */
.task-detail-meta{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; font-size:13px;}
.tdm-item{background:#FAFCFD; border:1px solid var(--line-soft); border-radius:8px; padding:9px 11px;}
.tdm-item .tdm-label{font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:2px;}
.tdm-item .tdm-value{font-weight:600; color:var(--ink); font-family:'IBM Plex Mono'; font-size:13px;}

.notes-list{display:flex; flex-direction:column; gap:10px; max-height:220px; overflow-y:auto; margin-top:10px; padding-right:4px;}
.note-item{background:#FAFCFD; border-left:3px solid var(--navy-soft); border-radius:6px; padding:8px 11px;}
.note-date{font-size:11px; color:var(--ink-faint); font-family:'IBM Plex Mono'; margin-bottom:3px;}
.note-text{font-size:13px; color:var(--ink); line-height:1.45; white-space:pre-wrap;}
.section-label{font-size:12.5px; font-weight:700; color:var(--navy); margin:18px 0 8px 0; display:flex; align-items:center; gap:6px;}
.add-note-row{display:flex; gap:8px; margin-top:10px; align-items:flex-start;}
.add-note-row textarea{flex:1;}

/* ---------- Gantt ---------- */
.gantt-legend{display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap;}
.legend-item{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}
.legend-dot{width:10px; height:10px; border-radius:3px;}
.gantt-wrap{display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--panel);}
.gantt-labels{width:230px; flex-shrink:0; border-right:1.5px solid var(--line); background:#FAFCFD;}
.gantt-label-head{height:38px; border-bottom:1.5px solid var(--line); display:flex; align-items:center; padding:0 12px; font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em;}
.gantt-label-row{height:34px; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid var(--line-soft); font-size:12.5px;}
.gantt-label-row .glr-title{font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.gantt-label-row .glr-sub{font-size:10.5px; color:var(--ink-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.gantt-group-row{height:26px; background:var(--navy-soft); display:flex; align-items:center; padding:0 12px; font-size:11.5px; font-weight:700; color:var(--navy); border-bottom:1px solid var(--line-soft);}
.gantt-scroll{flex:1; min-width:0;}
.gantt-timeline{position:relative; width:100%;}
.gantt-tick-row{height:38px; position:relative; border-bottom:1.5px solid var(--line);}
.gantt-tick{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft);}
.gantt-tick-label{position:absolute; top:11px; font-size:10.5px; color:var(--ink-faint); font-family:'IBM Plex Mono'; padding-left:4px; white-space:nowrap;}
.gantt-body-rows{position:relative;}
.gantt-bg-tick{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft); z-index:0;}
.gantt-row-track{height:34px; border-bottom:1px solid var(--line-soft); position:relative;}
.gantt-group-track{height:26px; background:var(--navy-soft); border-bottom:1px solid var(--line-soft); position:relative;}
.gantt-bar{
  position:absolute; top:8px; height:26px; border-radius:6px; cursor:pointer;
  display:flex; align-items:center; padding:0 8px; overflow:hidden;
  font-size:11px; font-weight:700; color:#fff; white-space:nowrap;
  box-shadow:0 1px 2px rgba(0,0,0,0.15);
}
.gantt-today-line{position:absolute; top:0; bottom:0; width:2px; background:var(--coral); z-index:5;}
.gantt-today-label{position:absolute; top:-1px; left:5px; font-size:10px; color:var(--coral); font-weight:700; background:var(--panel); padding:1px 4px; border-radius:4px; z-index:6; white-space:nowrap;}

/* ---------- Gantt bar v2: progress fill + overrun + date flanks ---------- */
.gantt-bar-outer{position:absolute; top:8px; height:18px; border-radius:5px; overflow:hidden; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.12); background:var(--slate-soft); z-index:2;}
.gantt-bar-outer.is-group{top:4px; height:18px; border:none; box-shadow:0 1px 2px rgba(0,0,0,.15);}
.gantt-bar-fill{position:absolute; top:0; left:0; bottom:0;}
.gantt-overrun{position:absolute; top:8px; height:18px; border-radius:0 5px 5px 0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; cursor:pointer; z-index:2;
  background:repeating-linear-gradient(45deg, var(--coral) 0 5px, #B8412E 5px 10px); box-shadow:0 1px 2px rgba(0,0,0,.12);}
.gantt-overrun.is-group{top:4px; height:18px;}
.gantt-date-flank{position:absolute; top:0; height:34px; display:flex; align-items:center; font-size:9.5px; color:var(--ink-faint); font-family:'IBM Plex Mono'; white-space:nowrap; pointer-events:none; z-index:1; overflow:hidden;}
.gantt-date-flank.is-group{height:26px;}
.gantt-date-flank.flank-start{left:0; justify-content:flex-end; padding-right:6px;}
.gantt-date-flank.flank-end{justify-content:flex-start; padding-left:6px;}
.gantt-date-flank.flank-overdue{color:var(--coral); font-weight:700;}
.legend-dot.striped{background:repeating-linear-gradient(45deg, var(--coral) 0 4px, #B8412E 4px 8px);}

/* ---------- Gantt group rows (collapsible) ---------- */
.gantt-group-row{cursor:pointer; gap:8px;}
.ggr-chevron{display:inline-block; width:12px; flex-shrink:0; transition:transform .15s ease; font-size:10px;}
.ggr-chevron.collapsed{transform:rotate(-90deg);}
.ggr-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.ggr-name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.ggr-pct{font-family:'IBM Plex Mono'; font-size:11px; font-weight:700; flex-shrink:0;}

/* ---------- Gantt toolbar ---------- */
.gantt-toolbar{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
.gantt-toolbar-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.gtb-label{font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:5px;}
.zoom-toggle{display:flex; gap:3px; background:var(--slate-soft); padding:3px; border-radius:9px;}
.zoom-btn{border:none; background:transparent; padding:6px 13px; font-size:12.5px; font-weight:600; color:var(--ink-soft); border-radius:7px; cursor:pointer; font-family:'IBM Plex Sans';}
.zoom-btn.active{background:var(--panel); color:var(--navy); box-shadow:0 1px 3px rgba(14,39,56,0.12);}
.range-badge{font-family:'IBM Plex Mono'; font-size:12.5px; color:var(--ink-soft); margin-left:auto;}
.gantt-toolbar-row input[type=date]{padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:12.5px; font-family:'IBM Plex Sans'; background:var(--panel);}

/* ---------- Workload ---------- */
.wl-row{display:grid; grid-template-columns:52px 150px 1fr 200px; gap:14px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line-soft);}
.wl-row:last-child{border-bottom:none;}
.wl-ring{display:flex; align-items:center; justify-content:center;}
.wl-name{font-weight:700; font-size:13.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wl-name-sub{font-size:11px; color:var(--ink-faint); font-family:'IBM Plex Mono';}
.wl-bar-track{height:20px; border-radius:6px; background:var(--slate-soft); overflow:hidden; display:flex;}
.wl-bar-seg{height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden;}
.wl-seg-label{font-size:10.5px; font-weight:700; color:#fff; font-family:'IBM Plex Mono'; white-space:nowrap;}
.wl-stats{display:flex; gap:10px; font-size:11.5px; color:var(--ink-soft); justify-content:flex-end; flex-wrap:wrap;}
.wl-stats b{font-family:'IBM Plex Mono'; color:var(--ink);}

.footer-note{text-align:center; font-size:11.5px; color:var(--ink-faint); margin-top:30px; padding-top:16px; border-top:1px dashed var(--line);}
.back-link{display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--navy); font-weight:600; cursor:pointer; margin-bottom:14px; background:none; border:none; padding:0;}
.back-link:hover{text-decoration:underline;}
.filter-bar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
.filter-bar select{padding:8px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; background:var(--panel); font-family:'IBM Plex Sans';}

/* ===================== State ===================== */

var PROJECT_COLORS = ['#4F46E5','#0284C7','#16A34A','#D97706','#DC2626','#9333EA','#2563EB','#EA580C','#64748B','#DB2777','#0D9488','#92400E'];

var CATEGORY_GROUPS = [
  {id:'quality_improvement', label:'Quality Improvement', desc:'โครงการปรับปรุงคุณภาพสินค้าและกระบวนการ', icon:'&#8599;', iconBg:'#EEF2FF', iconColor:'#4F46E5'},
  {id:'qa_system', label:'QA System', desc:'โครงการพัฒนาระบบคุณภาพและมาตรฐาน', icon:'&#128421;', iconBg:'#E0F2FE', iconColor:'#0284C7'},

];
function todoStatusById(id){ return TODO_STATUSES.find(function(s){ return s.id === id; }) || TODO_STATUSES[0]; }
function todoById(id){ return todos.find(function(t){ return t.id === id; }); }
function isTodoOverdue(t){ return t.dueDate && t.dueDate < todayStr() && t.status !== 'done'; }
function todoStatusInfo(t){
  if(isTodoOverdue(t)) return {label:'เกินกำหนด', cls:'badge-coral', color:'var(--coral)'};
  return todoStatusById(t.status);
}
function sortByDueDateTodo(list){
  return list.slice().sort(function(a,b){ return (a.dueDate||'9999').localeCompare(b.dueDate||'9999'); });
}
function buildOptionGrid(gridId, options, selectedId, iconHtml){
  var btns = options.map(function(opt){
    var sel = opt.id === selectedId;
    var tint = opt.tint || 'var(--slate-soft)';

    return '<div class="priority-btn' + (sel?' selected':'') + '" data-action="select-option" data-val="' + opt.id + '" data-tint="' + tint + '" style="color:' + color + '; ' + (sel ? ('background:'+tint+';') : '') + '">' +
      (iconHtml ? iconHtml + ' ' : '') + opt.label.toUpperCase() +
    '</div>';
  }).join('');
  return '<div class="priority-grid" id="' + gridId + '" data-selected="' + selectedId + '">' + btns + '</div>';
}

/* ===================== Storage (Firebase Realtime Database) ===================== */
function notesToObj(notesArr){
  var o = {};
  (notesArr||[]).forEach(function(n){ o[n.id] = n; });
  return o;
}
function notesFromSnapshot(notesVal){
  if(!notesVal) return [];
  return Object.keys(notesVal).map(function(k){ return notesVal[k]; });
}
function checkReady(){
  if(projectsLoaded && tasksLoaded && todosLoaded) dataReady = true;
  render();
}
function loadAll(){
  projectsRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    projects = Object.keys(val).map(function(k){ return val[k]; });
    projectsLoaded = true;
    checkReady();
  }, function(err){
    console.error('projects listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    projectsLoaded = true;
    checkReady();
  });
  tasksRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    tasks = Object.keys(val).map(function(k){
      var t = val[k];
      t.notes = notesFromSnapshot(t.notes);
      return t;
    });
    tasksLoaded = true;
    checkReady();
  }, function(err){
    console.error('tasks listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    tasksLoaded = true;
    checkReady();
  });
  todosRef.on('value', function(snapshot){
    var val = snapshot.val() || {};
    todos = Object.keys(val).map(function(k){
      var t = val[k];
      t.notes = notesFromSnapshot(t.notes);
      return t;
    });
    todosLoaded = true;
    checkReady();
  }, function(err){
    console.error('todos listener error', err);
    firebaseError = err && err.message ? err.message : String(err);
    todosLoaded = true;
    checkReady();
  });
}
function pushProject(p){
  projectsRef.child(p.id).set(p).catch(function(e){ console.error('save project failed', e); });
}
function removeProject(id){
  projectsRef.child(id).remove().catch(function(e){ console.error('delete project failed', e); });
}
function pushTask(t){
  var copy = Object.assign({}, t);
  copy.notes = notesToObj(t.notes);
  tasksRef.child(t.id).set(copy).catch(function(e){ console.error('save task failed', e); });
}
function removeTask(id){
  tasksRef.child(id).remove().catch(function(e){ console.error('delete task failed', e); });
}
function pushTodo(t){
  var copy = Object.assign({}, t);
  copy.notes = notesToObj(t.notes || []);
  todosRef.child(t.id).set(copy).catch(function(e){ console.error('save todo failed', e); });
}
function removeTodo(id){
  todosRef.child(id).remove().catch(function(e){ console.error('delete todo failed', e); });
}

/* ===================== Helpers ===================== */
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function todayStr(){
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseDateStr(s){ return new Date(s + 'T00:00:00'); }
function addDays(d, n){ return new Date(d.getTime() + n*86400000); }
function dayDiff(a,b){ return Math.round((b.getTime() - a.getTime()) / 86400000); }
function fmtDateThai(s){
  if(!s) return '-';
  var d = parseDateStr(s);
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + (d.getFullYear()+543);
}
function fmtDateShort(d){
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate() + ' ' + months[d.getMonth()];
}
function fmtTimestamp(ts){
  var d = new Date(ts);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + (d.getFullYear()+543) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function isOverdue(t){ return t.dueDate && t.dueDate < todayStr() && Number(t.progress) < 100; }
function toDateStr(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function firstDayOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function lastDayOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function mostRecentMonday(d){ var day = d.getDay(); var diff = day===0 ? 6 : day-1; return addDays(d, -diff); }
function fmtMonthYearShort(d){
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var yy = String((d.getFullYear()+543) % 100).padStart(2,'0');
  return months[d.getMonth()] + ' ' + yy;
}
function overdueDaysOf(t){
  if(!isOverdue(t)) return 0;
  return dayDiff(parseDateStr(t.dueDate), parseDateStr(todayStr()));
}
function projectAggregate(pid){
  var all = tasksOfProject(pid).filter(function(t){ return t.startDate && t.dueDate; });
  if(!all.length) return null;
  var minS = null, maxE = null, sum = 0;
  all.forEach(function(t){
    var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
    if(!minS || s < minS) minS = s;
    if(!maxE || e > maxE) maxE = e;
    sum += Number(t.progress);
  });
  return { startDate: toDateStr(minS), dueDate: toDateStr(maxE), progress: Math.round(sum/all.length), taskCount: all.length };
}
function fillColorFor(progress){
  if(Number(progress) === 100) return 'var(--teal)';
  if(Number(progress) === 0) return 'var(--slate)';
  return 'var(--amber)';
}
function buildDonutSvg(segments, opts){
  opts = opts || {};
  var size = opts.size || 140;
  var thickness = opts.thickness || 18;
  var r = (size/2) - (thickness/2);
  var cx = size/2, cy = size/2;
  var circumference = 2 * Math.PI * r;
  var total = segments.reduce(function(s,seg){ return s + (Number(seg.value)||0); }, 0);
  var circles = '';
  if(total <= 0){
    circles = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--slate-soft)" stroke-width="' + thickness + '"/>';
  } else {
    var offset = 0;
    segments.forEach(function(seg){
      var v = Number(seg.value) || 0;
      if(v <= 0) return;
      var frac = v / total;
      var len = frac * circumference;
      var gap = Math.max(0, circumference - len);
      circles += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="' + thickness +
        '" stroke-dasharray="' + len + ' ' + gap + '" stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>';
      offset += len;
    });
  }
  var centerLabel = opts.centerLabel || '';
  var centerSub = opts.centerSub || '';
  var labelSize = opts.labelSize || Math.round(size*0.16);
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" style="flex-shrink:0;">' + circles +
    (centerLabel ? '<text x="' + cx + '" y="' + (centerSub?cy-3:cy+5) + '" text-anchor="middle" font-family="IBM Plex Mono" font-size="' + labelSize + '" font-weight="700" fill="var(--ink)">' + centerLabel + '</text>' : '') +
    (centerSub ? '<text x="' + cx + '" y="' + (cy+15) + '" text-anchor="middle" font-family="IBM Plex Sans" font-size="' + Math.round(size*0.078) + '" fill="var(--ink-faint)">' + centerSub + '</text>' : '') +
  '</svg>';
}
function buildBarSegments(item, rangeStart, rangeEnd, totalDays){
  var ts = parseDateStr(item.startDate), te = parseDateStr(item.dueDate);
  var today = parseDateStr(todayStr());
  var overdue = isOverdue(item);
  var overdueDays = overdue ? dayDiff(te, today) : 0;
  function pct(days){ return Math.max(0, (days/totalDays)*100); }

  var seg = { hasPlan:false, planLeft:0, planWidthPx:0, hasOverrun:false, overrunLeft:0, overrunWidthPx:0, overdue:overdue, overdueDays:overdueDays, endOfBarPx:0 };

  var planVisStart = ts < rangeStart ? rangeStart : ts;
  var planVisEnd = te > rangeEnd ? rangeEnd : te;
  if(te >= rangeStart && ts <= rangeEnd && planVisEnd >= planVisStart){
    seg.hasPlan = true;
    seg.planLeft = pct(dayDiff(rangeStart, planVisStart));
    var planDays = dayDiff(planVisStart, planVisEnd) + 1;
    seg.planWidthPx = Math.max(0.5, pct(planDays));
    seg.endOfBarPx = seg.planLeft + seg.planWidthPx;
  }

  if(overdue){
    var overrunStartReal = addDays(te, 1);
    var overrunEndReal = today;
    var ovVisStart = overrunStartReal < rangeStart ? rangeStart : overrunStartReal;
    var ovVisEnd = overrunEndReal > rangeEnd ? rangeEnd : overrunEndReal;
    if(overrunEndReal >= rangeStart && overrunStartReal <= rangeEnd && ovVisEnd >= ovVisStart){
      seg.hasOverrun = true;
      seg.overrunLeft = pct(dayDiff(rangeStart, ovVisStart));
      var ovDays = dayDiff(ovVisStart, ovVisEnd) + 1;
      seg.overrunWidthPx = Math.max(0.4, pct(ovDays));
      seg.endOfBarPx = Math.max(seg.endOfBarPx, seg.overrunLeft + seg.overrunWidthPx);
    }
  }
  return seg;
}
function renderBarHtml(item, seg, opts){
  opts = opts || {};
  var isGroup = !!opts.isGroup;
  var fillColor = opts.fillColorOverride || fillColorFor(item.progress);
  var fillPct = Math.max(0, Math.min(100, Number(item.progress)));
  var trackBg = isGroup && opts.groupColor ? ('background:var(--slate-soft); background:color-mix(in srgb, ' + opts.groupColor + ' 16%, white);') : '';
  var html = '';
  if(seg.hasPlan){
    html += '<div class="gantt-bar-outer' + (isGroup?' is-group':'') + '" style="left:' + seg.planLeft + '%; width:' + seg.planWidthPx + '%; ' + trackBg + '" data-action="' + (opts.dataAction||'') + '" data-id="' + (opts.dataId||'') + '" title="' + esc(opts.tooltip||'') + '">' +
      '<div class="gantt-bar-fill" style="width:' + fillPct + '%; background:' + fillColor + ';"></div>' +
    '</div>';
  }
  if(seg.hasOverrun){
    var ovLabel = seg.overrunWidthPx > 2.2 ? ('+' + seg.overdueDays) : '';
    html += '<div class="gantt-overrun' + (isGroup?' is-group':'') + '" style="left:' + seg.overrunLeft + '%; width:' + seg.overrunWidthPx + '%;" data-action="' + (opts.dataAction||'') + '" data-id="' + (opts.dataId||'') + '" title="' + esc(opts.tooltip||'') + '">' + ovLabel + '</div>';
  }
  return html;
}
function statusInfo(t){
  var p = Number(t.progress);
  if(isOverdue(t)) return {label:'เลยกำหนด', cls:'badge-coral', color:'var(--coral)'};
  if(p === 100) return {label:'เสร็จสมบูรณ์', cls:'badge-teal', color:'var(--teal)'};
  if(p === 0) return {label:'ยังไม่ได้ดำเนินการ', cls:'badge-slate', color:'var(--slate)'};
  return {label:'กำลังดำเนินการ', cls:'badge-amber', color:'var(--amber)'};
}
function projectById(id){ return projects.find(function(p){ return p.id === id; }); }
function taskById(id){ return tasks.find(function(t){ return t.id === id; }); }
function tasksOfProject(pid){ return tasks.filter(function(t){ return t.projectId === pid; }); }
function nextColor(){ return PROJECT_COLORS[projects.length % PROJECT_COLORS.length]; }
function truncate(s, n){ s = String(s||''); return s.length > n ? s.slice(0, n-1) + '…' : s; }
function latestNote(t){
  if(!t.notes || !t.notes.length) return null;
  return t.notes.slice().sort(function(a,b){ return b.date - a.date; })[0];
}
function sortByStartDate(list){
  return list.slice().sort(function(a,b){ return (a.startDate||'9999').localeCompare(b.startDate||'9999'); });
}

/* ===================== Render root ===================== */
function render(){
  var app = document.getElementById('app');
  if(!dataReady){
    app.innerHTML = '<div style="padding:60px; text-align:center; color:#62707F; font-family:IBM Plex Sans;">กำลังเชื่อมต่อฐานข้อมูล...</div>';
    return;
  }
  var errorBanner = firebaseError ? ('<div class="page" style="padding-bottom:0;"><div class="panel" style="border-color:#F0C7BF; background:#FDF3F1; padding:14px 18px; margin-bottom:0; color:#B8412E; font-size:13px;">' +
    '⚠️ เชื่อมต่อฐานข้อมูลไม่สำเร็จ: ' + esc(firebaseError) + ' — ตรวจสอบ Firebase Realtime Database Rules (อาจหมดอายุโหมดทดสอบ) หรือการเชื่อมต่ออินเทอร์เน็ต' +
  '</div></div>') : '';
  app.innerHTML = errorBanner + renderTopbar() + '<div class="page">' + renderContent() + renderFooter() + '</div>';
}
function renderFooter(){
  return '<div class="footer-note">ข้อมูลซิงค์แบบเรียลไทม์ผ่าน Firebase Realtime Database — ทุกคนที่เปิดหน้านี้จะเห็นและแก้ไขข้อมูลเดียวกัน</div>';
}
function renderTopbar(){
  function tab(view, label){
    var active = currentView === view ? ' active' : '';
    return '<button class="tab' + active + '" data-action="goto-view" data-view="' + view + '">' + label + '</button>';
  }
  return '' +
  '<div class="topbar"><div class="topbar-inner">' +
    '<div class="brand">' +
      '<div class="brand-eyebrow">THERMEDEZ &middot; QUALITY DIVISION</div>' +
      '<div class="brand-title">QA/QC Daily Tracker</div>' +
      '<div class="brand-sub">ระบบติดตามงานภายในทีม QA/QC</div>' +
    '</div>' +
    '<div class="tabs">' +
      tab('projects','Project') +
      tab('todos','To-Do List') +
      tab('overview','ภาพรวม &amp; ภาระงาน') +
    '</div>' +
  '</div></div>';
}
function renderContent(){
  if(currentView === 'projects'){
    return currentProjectId ? renderProjectDetail() : renderProjectsList();
  }
  if(currentView === 'todos') return renderTodosView();
  if(currentView === 'overview') return renderOverviewView();
  return '';
}

/* ===================== Projects list (Home) ===================== */
function renderProjectsList(){
  var head = '<div class="page-head">' +
      '<div><div class="page-title">Project</div><div class="page-desc">ภาพรวมระยะเวลาโครงการ และโปรเจกต์ตรวจสอบคุณภาพทั้งหมด</div></div>' +
      '<button class="btn btn-primary" data-action="open-project-modal">+ เพิ่มโปรเจกต์ใหม่</button>' +
    '</div>';

  if(projects.length === 0){
    return head + '<div class="empty-state">' +
      '<div class="es-icon">&#128203;</div>' +
      '<div class="es-title">ยังไม่มีโปรเจกต์</div>' +
      '<div class="es-sub">สร้างโปรเจกต์แรกเพื่อเริ่มติดตามงาน QA/QC เช่น ชื่อรุ่นสินค้า หรือชื่อลูกค้า</div>' +
      '<button class="btn btn-primary" data-action="open-project-modal">+ เพิ่มโปรเจกต์ใหม่</button>' +
    '</div>';
  }

  var catFilterOptions = '<option value="all">ทุกกลุ่มงาน</option>' + CATEGORY_GROUPS.map(function(c){
    return '<option value="' + c.id + '"' + (projectFilterCategory===c.id?' selected':'') + '>' + esc(c.label) + '</option>';
  }).join('');
  var prioFilterOptions = '<option value="all">ทุกระดับความสำคัญ</option>' + PRIORITY_LEVELS.map(function(pr){
    return '<option value="' + pr.id + '"' + (projectFilterPriority===pr.id?' selected':'') + '>' + esc(pr.label) + '</option>';
  }).join('');
  var filterBar = '<div class="filter-bar">' +
    '<select data-action="filter-project-category">' + catFilterOptions + '</select>' +
    '<select data-action="filter-project-priority">' + prioFilterOptions + '</select>' +
    '<input type="text" id="f-filter-owner" value="' + esc(projectFilterOwner) + '" placeholder="ค้นหาเจ้าของโปรเจกต์ (กด Enter)" style="padding:8px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; min-width:200px; font-family:IBM Plex Sans;">' +
    '<button class="btn btn-ghost btn-sm" data-action="apply-owner-filter">ค้นหา</button>' +
    (projectFilterCategory!=='all'||projectFilterPriority!=='all'||projectFilterOwner ? '<button class="btn btn-ghost btn-sm" data-action="clear-project-filters">ล้างตัวกรอง</button>' : '') +
  '</div>';

  var filtered = projects.filter(function(p){
    if(projectFilterCategory !== 'all' && p.category !== projectFilterCategory) return false;
    if(projectFilterPriority !== 'all' && p.priority !== projectFilterPriority) return false;
    if(projectFilterOwner && (!p.owner || p.owner.toLowerCase().indexOf(projectFilterOwner.toLowerCase()) === -1)) return false;
    return true;
  });

  // Helper: is project fully done (all tasks 100% or no tasks but createdAt exists)
  function isProjectDone(p){
    var pt = tasksOfProject(p.id);
    if(pt.length === 0) return false;
    return pt.every(function(t){ return Number(t.progress) === 100; });
  }
  // Sort helper: by earliest task startDate, fallback createdAt
  function projectStartDate(p){
    var pt = tasksOfProject(p.id).filter(function(t){ return t.startDate; });
    if(!pt.length) return p.createdAt ? String(p.createdAt) : '9999';
    return pt.slice().sort(function(a,b){ return a.startDate.localeCompare(b.startDate); })[0].startDate;
  }

  var activeProjects = filtered.filter(function(p){ return !isProjectDone(p); })
    .slice().sort(function(a,b){ return projectStartDate(a).localeCompare(projectStartDate(b)); });
  var doneProjects = filtered.filter(function(p){ return isProjectDone(p); })
    .slice().sort(function(a,b){ return projectStartDate(a).localeCompare(projectStartDate(b)); });

  function buildProjectCard(p){
    var pt = tasksOfProject(p.id);
    var total = pt.length;
    var done = pt.filter(function(t){ return Number(t.progress) === 100; }).length;
    var overdue = pt.filter(isOverdue).length;
    var pct = total ? Math.round(pt.reduce(function(s,t){ return s + Number(t.progress); },0) / total) : 0;
    var scolor = pct === 100 ? 'var(--teal)' : (pct === 0 ? 'var(--slate)' : 'var(--amber)');
    var catLabel = projectCategoryLabel(p);
    var prio = p.priority ? priorityById(p.priority) : null;
    return '<div class="panel project-card" style="--pcolor:' + p.color + '" data-action="open-project" data-id="' + p.id + '">' +
      '<div class="project-card-top">' +
        '<div style="display:flex; gap:8px;"><span class="project-tag" style="--pcolor:' + p.color + '"></span>' +
          '<div><div class="project-name">' + esc(p.name) + '</div>' +
          (p.description ? '<div class="project-desc">' + esc(p.description) + '</div>' : '') + '</div>' +
        '</div>' +
        '<div class="stamp-wrap"><div class="stamp" style="--spct:' + pct + '; --scolor:' + scolor + '"><span>' + pct + '%</span></div></div>' +
      '</div>' +
      '<div style="display:flex; gap:6px; flex-wrap:wrap;">' +
        (prio ? '<span class="badge ' + prio.cls + '">' + prio.label + '</span>' : '') +
        (catLabel ? '<span class="badge badge-cat">' + esc(catLabel) + '</span>' : '') +
      '</div>' +
      (p.owner ? '<div style="font-size:11.5px; color:var(--ink-faint);">เจ้าของโปรเจกต์: ' + esc(p.owner) + '</div>' : '') +
      '<div class="project-card-bottom">' +
        '<div class="project-stats">' +
          '<div>งานทั้งหมด <b>' + total + '</b> &middot; เสร็จแล้ว <b>' + done + '</b>' + (overdue ? ' &middot; <span style="color:var(--coral); font-weight:700;">เลยกำหนด ' + overdue + '</span>' : '') + '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="btn btn-ghost btn-sm" data-action="edit-project" data-id="' + p.id + '">แก้ไข</button>' +
          '<button class="btn btn-danger btn-sm" data-action="delete-project" data-id="' + p.id + '">ลบ</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  var gridHtml;
  if(filtered.length === 0){
    gridHtml = '<div class="empty-state">' +
      '<div class="es-icon">&#128269;</div>' +
      '<div class="es-title">ไม่พบโปรเจกต์ที่ตรงกับตัวกรอง</div>' +
      '<div class="es-sub">ลองเปลี่ยนหรือล้างตัวกรองดู</div>' +
    '</div>';
  } else {
    var activeGrid = activeProjects.length > 0
      ? '<div class="project-grid">' + activeProjects.map(buildProjectCard).join('') + '</div>'
      : '';
    var doneGrid = doneProjects.length > 0
      ? '<div style="margin-top:24px;">' +
          '<div class="section-label" style="color:var(--teal); margin-bottom:12px;">&#10003; โปรเจกต์ที่เสร็จสมบูรณ์แล้ว &middot; ' + doneProjects.length + ' โปรเจกต์</div>' +
          '<div class="project-grid" style="opacity:0.82;">' + doneProjects.map(buildProjectCard).join('') + '</div>' +
        '</div>'
      : '';
    gridHtml = activeGrid + doneGrid;
  }

  var ganttPanel = '<div class="panel" style="padding:16px 18px; margin-top:24px;">' +
    '<div class="section-label" style="margin-top:0; font-size:14px;">แผนภูมิแกนต์ — ภาพรวมระยะเวลาโครงการ</div>' +
    renderGanttSection('all') +
  '</div>';

  return head + filterBar + gridHtml + ganttPanel;
}

/* ===================== Gantt (embedded in home page) ===================== */
function renderGanttSection(mode){
  mode = mode || 'all';
  var scopedProjectId = mode === 'all' ? null : mode;
  var todayD = parseDateStr(todayStr());

  var effectiveFilter = scopedProjectId || ganttFilterProject;
  var relevantProjects = effectiveFilter === 'all' ? projects : projects.filter(function(p){ return p.id === effectiveFilter; });

  // Hide fully-done projects from the all-projects Gantt view
  if(effectiveFilter === 'all'){
    relevantProjects = relevantProjects.filter(function(p){
      var pt = tasks.filter(function(t){ return t.projectId === p.id; });
      if(pt.length === 0) return true; // no tasks yet — still show
      return !pt.every(function(t){ return Number(t.progress) === 100; });
    });
  }

  var activeProjectIds = relevantProjects.reduce(function(acc, p){ acc[p.id] = true; return acc; }, {});
  var baseTasks = tasks.filter(function(t){
    if(!t.startDate || !t.dueDate) return false;
    if(effectiveFilter === 'all') return !!activeProjectIds[t.projectId];
    return t.projectId === effectiveFilter;
  });

  var rangeStart, rangeEnd;
  if(ganttRangeStart && ganttRangeEnd && ganttRangeStart <= ganttRangeEnd){
    rangeStart = parseDateStr(ganttRangeStart);
    rangeEnd = parseDateStr(ganttRangeEnd);
  } else if(baseTasks.length){
    var minD = null, maxD = null;
    baseTasks.forEach(function(t){
      var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
      if(!minD || s < minD) minD = s;
      if(!maxD || e > maxD) maxD = e;
    });
    rangeStart = addDays(minD, -2);
    rangeEnd = addDays(maxD, 3);
  } else {
    rangeStart = firstDayOfMonth(todayD);
    rangeEnd = lastDayOfMonth(todayD);
  }

  var rangeBadge = fmtMonthYearShort(rangeStart) + ' &ndash; ' + fmtMonthYearShort(rangeEnd);
  var projectSelectHtml = '';
  if(!scopedProjectId){
    var filterOptions = '<option value="all">ทุกโปรเจกต์</option>' + projects.map(function(p){
      return '<option value="' + p.id + '"' + (ganttFilterProject===p.id?' selected':'') + '>' + esc(p.name) + '</option>';
    }).join('');
    projectSelectHtml = '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600; margin-left:6px;">โปรเจกต์:</label>' +
      '<select data-action="filter-gantt">' + filterOptions + '</select>';
  }

  var toolbar = '<div class="gantt-toolbar">' +
    '<div class="gantt-toolbar-row">' +
      '<span class="gtb-label">&#10520; TIMELINE</span>' +
      '<div class="zoom-toggle">' +
        '<button class="zoom-btn' + (ganttZoomMode==='month'?' active':'') + '" data-action="gantt-zoom-month">รายเดือน</button>' +
        '<button class="zoom-btn' + (ganttZoomMode==='week'?' active':'') + '" data-action="gantt-zoom-week">รายสัปดาห์</button>' +
        '<button class="zoom-btn' + (ganttZoomMode==='custom'?' active':'') + '" data-action="gantt-zoom-custom">กำหนดเอง</button>' +
      '</div>' +
      '<span class="range-badge">' + rangeBadge + '</span>' +
    '</div>' +
    '<div class="gantt-toolbar-row">' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">เริ่มต้น</label>' +
      '<input type="date" id="gantt-range-start" value="' + (ganttRangeStart||'') + '">' +
      '<span style="color:var(--ink-faint);">&rarr;</span>' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">สิ้นสุด</label>' +
      '<input type="date" id="gantt-range-end" value="' + (ganttRangeEnd||'') + '">' +
      '<button class="btn btn-ghost btn-sm" data-action="apply-gantt-range">แสดงช่วงนี้</button>' +
      '<button class="btn btn-ghost btn-sm" data-action="fit-gantt-range">&#10530; Fit</button>' +
      '<button class="btn btn-ghost btn-sm" data-action="gantt-jump-today">&#128336; วันนี้</button>' +
      projectSelectHtml +
    '</div>' +
  '</div>';

  var legend = '<div class="gantt-legend">' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--slate)"></span>ยังไม่ได้เริ่ม</div>' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>กำลังดำเนินการ</div>' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--teal)"></span>เสร็จ</div>' +
    '<div class="legend-item"><span class="legend-dot striped"></span>เกินกำหนด</div>' +
  '</div>';

  if(baseTasks.length === 0){
    return toolbar + '<div class="empty-state">' +
      '<div class="es-icon">&#128197;</div>' +
      '<div class="es-title">ยังไม่มีข้อมูลสำหรับแสดงแผนภูมิ</div>' +
      '<div class="es-sub">เพิ่มงานที่มีวันเริ่มต้นและวันกำหนดส่งในโปรเจกต์ก่อน</div>' +
    '</div>';
  }

  var totalDays = Math.max(1, dayDiff(rangeStart, rangeEnd) + 1);

  var relevantTasks = baseTasks.filter(function(t){
    var ts = parseDateStr(t.startDate), te = parseDateStr(t.dueDate);
    return te >= rangeStart && ts <= rangeEnd;
  });

  if(relevantTasks.length === 0){
    return toolbar + legend + '<div class="empty-state">' +
      '<div class="es-icon">&#128269;</div>' +
      '<div class="es-title">ไม่มีงานในช่วงเวลาที่เลือก</div>' +
      '<div class="es-sub">ลองกด "Fit" เพื่อแสดงทุกโปรเจกต์</div>' +
    '</div>';
  }

  function pct(days){ return (days/totalDays)*100; }

  var ticksHtml = '', tickLabelsHtml = '';
  for(var i=0;i<totalDays;i++){
    var d = addDays(rangeStart, i);
    if(i===0 || d.getDay()===1){
      var x = pct(i);
      ticksHtml += '<div class="gantt-tick" style="left:' + x + '%;"></div>';
      tickLabelsHtml += '<div class="gantt-tick-label" style="left:' + x + '%;">' + fmtDateShort(d) + '</div>';
    }
  }
  var bgTicks = '';
  for(var j=0;j<totalDays;j++){
    var dj = addDays(rangeStart,j);
    if(dj.getDay()===1) bgTicks += '<div class="gantt-bg-tick" style="left:' + pct(j) + '%;"></div>';
  }
  var todayIdx = dayDiff(rangeStart, todayD);
  var todayLineHtml = '';
  if(todayIdx >= 0 && todayIdx < totalDays){
    var tx = pct(todayIdx);
    todayLineHtml = '<div class="gantt-today-line" style="left:' + tx + '%;"></div><div class="gantt-today-label" style="left:calc(' + tx + '% + 4px);">วันนี้</div>';
  }

  var projectsWithTasks = relevantProjects.filter(function(p){
    return relevantTasks.some(function(t){ return t.projectId === p.id; });
  });

  var showGroups = !scopedProjectId && projectsWithTasks.length > 0;

  var bodyHeight = showGroups ? projectsWithTasks.reduce(function(acc,p){
    var collapsed = !!ganttCollapsed[p.id];
    var n = relevantTasks.filter(function(t){ return t.projectId === p.id; }).length;
    return acc + 26 + (collapsed ? 0 : n*34);
  },0) : relevantTasks.length*34;

  var labelsHtml = '<div class="gantt-label-head">PROJECT / TASK</div>';
  var rowsHtml = '<div class="gantt-body-rows" style="min-height:' + bodyHeight + 'px;">' + bgTicks + todayLineHtml;

  function renderTaskRow(t){
    var note = latestNote(t);
    var seg = buildBarSegments(t, rangeStart, rangeEnd, totalDays);
    var tooltip = t.title + ' (' + t.progress + '%)' + (note ? ' — ' + truncate(note.text, 60) : '');
    labelsHtml += '<div class="gantt-label-row"><div><div class="glr-title">' + esc(t.title) + '</div><div class="glr-sub">' + esc(t.assignee) + '</div></div></div>';

    var trackInner = renderBarHtml(t, seg, { dataAction:'open-task-detail', dataId:t.id, tooltip:tooltip });
    if(seg.hasPlan || seg.hasOverrun){
      var startLeftWidth = seg.hasPlan ? seg.planLeft : seg.overrunLeft;
      trackInner += '<div class="gantt-date-flank flank-start" style="left:0%; width:' + startLeftWidth + '%;">' + fmtDateShort(parseDateStr(t.startDate)) + '</div>';
      var endLeft = seg.endOfBarPx;
      trackInner += '<div class="gantt-date-flank flank-end' + (seg.overdue?' flank-overdue':'') + '" style="left:' + endLeft + '%; width:' + (100-endLeft) + '%;">' +
        t.progress + '% &middot; ' + fmtDateShort(parseDateStr(t.dueDate)) + (seg.overdue ? ' (เกิน ' + seg.overdueDays + ' วัน)' : '') + '</div>';
    }
    rowsHtml += '<div class="gantt-row-track">' + trackInner + '</div>';
  }

  if(showGroups){
    projectsWithTasks.forEach(function(p){
      var pts = sortByStartDate(relevantTasks.filter(function(t){ return t.projectId === p.id; }));
      var collapsed = !!ganttCollapsed[p.id];
      var agg = projectAggregate(p.id);

      labelsHtml += '<div class="gantt-group-row" data-action="toggle-gantt-group" data-id="' + p.id + '">' +
        '<span class="ggr-chevron' + (collapsed?' collapsed':'') + '">&#9660;</span>' +
        '<span class="ggr-dot" style="background:' + p.color + '"></span>' +
        '<span class="ggr-name" title="' + esc(p.name) + '">' + esc(p.name) + '</span>' +
        (agg ? '<span class="ggr-pct">' + agg.progress + '%</span>' : '') +
      '</div>';

      var groupTrackInner = '';
      if(agg){
        var gseg = buildBarSegments(agg, rangeStart, rangeEnd, totalDays);
        groupTrackInner = renderBarHtml(agg, gseg, { isGroup:true, groupColor:p.color, fillColorOverride:p.color, dataAction:'toggle-gantt-group', dataId:p.id,
          tooltip: p.name + ' — รวม ' + agg.taskCount + ' งาน (' + agg.progress + '%)' });
        if(gseg.hasPlan || gseg.hasOverrun){
          var gStartWidth = gseg.hasPlan ? gseg.planLeft : gseg.overrunLeft;
          groupTrackInner += '<div class="gantt-date-flank is-group flank-start" style="left:0%; width:' + gStartWidth + '%;">' + fmtDateShort(parseDateStr(agg.startDate)) + '</div>';
          var gEndLeft = gseg.endOfBarPx;
          groupTrackInner += '<div class="gantt-date-flank is-group flank-end' + (gseg.overdue?' flank-overdue':'') + '" style="left:' + gEndLeft + '%; width:' + (100-gEndLeft) + '%;">' +
            agg.progress + '% &middot; ' + fmtDateShort(parseDateStr(agg.dueDate)) + (gseg.overdue ? ' (เกิน ' + gseg.overdueDays + ' วัน)' : '') + '</div>';
        }
      }
      rowsHtml += '<div class="gantt-group-track" data-action="toggle-gantt-group" data-id="' + p.id + '">' + groupTrackInner + '</div>';

      if(!collapsed){ pts.forEach(renderTaskRow); }
    });
  } else {
    sortByStartDate(relevantTasks).forEach(renderTaskRow);
  }
  rowsHtml += '</div>';

  var gantt = '<div class="gantt-wrap">' +
    '<div class="gantt-labels">' + labelsHtml + '</div>' +
    '<div class="gantt-scroll"><div class="gantt-timeline">' +
      '<div class="gantt-tick-row">' + ticksHtml + tickLabelsHtml + (todayIdx>=0 && todayIdx<totalDays ? '<div class="gantt-today-line" style="left:' + pct(todayIdx) + '%;"></div>' : '') + '</div>' +
      rowsHtml +
    '</div></div>' +
  '</div>';

  return toolbar + legend + gantt;
}

/* ===================== To-Do List ===================== */
function renderTodosView(){
  var head = '<div class="page-head">' +
      '<div><div class="page-title">To-Do List</div><div class="page-desc">รายการงาน (Job) ที่ต้องติดตาม นอกเหนือจากงานในโปรเจกต์</div></div>' +
      '<button class="btn btn-primary" data-action="open-todo-modal">+ เพิ่มงาน</button>' +
    '</div>';

  if(todos.length === 0){
    return head + '<div class="empty-state">' +
      '<div class="es-icon">&#128221;</div>' +
      '<div class="es-title">ยังไม่มีงานใน To-Do List</div>' +
      '<div class="es-sub">เพิ่มงานที่ต้องติดตาม พร้อมกำหนดผู้รับผิดชอบ วันกำหนดส่ง ความเร่งด่วน และความสำคัญ</div>' +
      '<button class="btn btn-primary" data-action="open-todo-modal">+ เพิ่มงาน</button>' +
    '</div>';
  }

  var now = new Date();
  var todayS = todayStr();
  var weekStartS = toDateStr(mostRecentMonday(now));
  var weekEndS = toDateStr(addDays(mostRecentMonday(now), 6));
  var monthStartS = toDateStr(firstDayOfMonth(now));
  var monthEndS = toDateStr(lastDayOfMonth(now));

  var todayCount = todos.filter(function(t){ return t.dueDate === todayS; }).length;
  var weekCount = todos.filter(function(t){ return t.dueDate >= weekStartS && t.dueDate <= weekEndS; }).length;
  var monthCount = todos.filter(function(t){ return t.dueDate >= monthStartS && t.dueDate <= monthEndS; }).length;
  var overdueCount = todos.filter(isTodoOverdue).length;

  function getWindowTodos(key){
    if(key === 'today') return todos.filter(function(t){ return t.dueDate === todayS; });
    if(key === 'week') return todos.filter(function(t){ return t.dueDate >= weekStartS && t.dueDate <= weekEndS; });
    if(key === 'month') return todos.filter(function(t){ return t.dueDate >= monthStartS && t.dueDate <= monthEndS; });
    if(key === 'overdue') return todos.filter(isTodoOverdue);
    return todos;
  }
  function filterBox(key, label, count, icon){
    var active = todoFilterWindow === key;
    var wTodos = getWindowTodos(key);
    var wTotal = wTodos.length;
    var wNs = wTodos.filter(function(t){ return t.status==='not_started' && !isTodoOverdue(t); }).length;
    var wIp = wTodos.filter(function(t){ return t.status==='in_progress' && !isTodoOverdue(t); }).length;
    var wDn = wTodos.filter(function(t){ return t.status==='done'; }).length;
    var wOd = wTodos.filter(isTodoOverdue).length;
    var miniBar = wTotal > 0 ? (
      '<div class="tfb-mini-bar">' +
        (wNs ? '<div class="tfb-mini-seg" style="width:' + (wNs/wTotal*100) + '%; background:var(--slate);"></div>' : '') +
        (wIp ? '<div class="tfb-mini-seg" style="width:' + (wIp/wTotal*100) + '%; background:var(--amber);"></div>' : '') +
        (wDn ? '<div class="tfb-mini-seg" style="width:' + (wDn/wTotal*100) + '%; background:var(--teal);"></div>' : '') +
        (wOd ? '<div class="tfb-mini-seg" style="width:' + (wOd/wTotal*100) + '%; background:var(--coral);"></div>' : '') +
      '</div>'
    ) : '';
    var subStats = wTotal > 0 ? (
      '<div class="tfb-substats">' +
        (wNs ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--slate);"></span><span class="tfb-stat-label">ยังไม่เริ่ม</span><span class="tfb-stat-num">' + wNs + '</span></div>' : '') +
        (wIp ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--amber);"></span><span class="tfb-stat-label">กำลังทำ</span><span class="tfb-stat-num">' + wIp + '</span></div>' : '') +
        (wDn ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--teal);"></span><span class="tfb-stat-label">เสร็จ</span><span class="tfb-stat-num">' + wDn + '</span></div>' : '') +
        (wOd ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--coral);"></span><span class="tfb-stat-label">เกินกำหนด</span><span class="tfb-stat-num">' + wOd + '</span></div>' : '') +
      '</div>'
    ) : '';
    return '<div class="todo-filter-box' + (active?' active':'') + '" data-action="toggle-todo-window" data-key="' + key + '">' +
      '<div class="tfb-icon">' + icon + '</div>' +
      '<div class="tfb-count">' + count + '</div>' +
      '<div class="tfb-label">' + label + '</div>' +
      subStats +
      miniBar +
    '</div>';
  }
  var filterBoxes = '<div class="todo-filter-grid">' +
    filterBox('today', 'วันนี้', todayCount, '&#128197;') +
    filterBox('week', 'สัปดาห์นี้', weekCount, '&#128197;') +
    filterBox('month', 'เดือนนี้', monthCount, '&#128197;') +
    filterBox('overdue', 'เกินกำหนด', overdueCount, '&#9200;') +
  '</div>';

  function statusChip(key, label){
    var active = todoFilterStatus === key;
    return '<div class="status-chip' + (active?' active':'') + '" data-action="toggle-todo-status-filter" data-key="' + key + '">' + label + '</div>';
  }
  var statusChips = '<div class="status-chip-bar">' +
    statusChip('all', 'ทั้งหมด') +
    TODO_STATUSES.map(function(s){ return statusChip(s.id, s.label); }).join('') +
  '</div>';

  var searchBar = '<div class="todo-search-bar">' +
    '<span style="font-size:14px; color:var(--ink-faint);">&#128269;</span>' +
    '<input type="text" id="todo-assignee-search" value="' + esc(todoFilterAssignee) + '" placeholder="ค้นหาผู้รับผิดชอบ..." style="flex:1; border:none; outline:none; font-size:13px; font-family:\'IBM Plex Sans\'; background:transparent; color:var(--ink);">' +
    (todoFilterAssignee ? '<button class="btn btn-ghost btn-sm" data-action="clear-todo-assignee" style="padding:3px 8px; font-size:11px;">✕ ล้าง</button>' : '') +
  '</div>';

  var filtered = todos.filter(function(t){
    if(todoFilterStatus !== 'all' && t.status !== todoFilterStatus) return false;
    if(todoFilterWindow === 'today' && t.dueDate !== todayS) return false;
    if(todoFilterWindow === 'week' && !(t.dueDate >= weekStartS && t.dueDate <= weekEndS)) return false;
    if(todoFilterWindow === 'month' && !(t.dueDate >= monthStartS && t.dueDate <= monthEndS)) return false;
    if(todoFilterWindow === 'overdue' && !isTodoOverdue(t)) return false;
    if(todoFilterAssignee && (!t.assignee || t.assignee.toLowerCase().indexOf(todoFilterAssignee.toLowerCase()) === -1)) return false;
    return true;
  });
  var sorted = sortByDueDateTodo(filtered);

  if(sorted.length === 0){
    return head + filterBoxes + statusChips + '<div class="empty-state">' +
      '<div class="es-icon">&#128269;</div>' +
      '<div class="es-title">ไม่พบงานตามตัวกรองที่เลือก</div>' +
      '<div class="es-sub">ลองเปลี่ยนหรือล้างตัวกรองดู</div>' +
    '</div>';
  }

  function buildTodoRow(t, isDoneSection){
    var s = todoStatusInfo(t);
    var urg = priorityById(t.urgency);
    var imp = priorityById(t.importance);
    var statusOptions = TODO_STATUSES.map(function(st){
      return '<option value="' + st.id + '"' + (t.status===st.id?' selected':'') + '>' + st.label + '</option>';
    }).join('');
    var rowCls = isTodoOverdue(t) ? 'todo-row-overdue' : (t.status === 'done' ? 'todo-row-done' : (t.status === 'in_progress' ? 'todo-row-inprogress' : ''));

    // Notes display: latest note preview in main row
    var notes = t.notes || [];
    var latestN = notes.length ? notes.slice().sort(function(a,b){ return b.date - a.date; })[0] : null;
    var noteCount = notes.length;
    var noteBtn = '<button class="btn btn-ghost btn-sm todo-note-btn" data-action="toggle-todo-notes" data-id="' + t.id + '" style="padding:4px 9px; font-size:11.5px; gap:4px;">' +
      '&#128172; ' + (noteCount > 0 ? noteCount : '+') +
    '</button>';

    // Inline notes panel (hidden by default, toggled via JS class)
    var notesListHtml = noteCount > 0 ? notes.slice().sort(function(a,b){ return b.date - a.date; }).map(function(n){
      return '<div class="todo-note-item">' +
        '<div class="note-date">' + fmtTimestamp(n.date) + '</div>' +
        '<div class="note-text">' + esc(n.text) + '</div>' +
      '</div>';
    }).join('') : '';
    var notesPanelHtml = '<tr class="todo-notes-panel" id="tnp-' + t.id + '" style="display:none;">' +
      '<td colspan="8" style="padding:0; border-bottom:none;">' +
        '<div class="todo-notes-expand">' +
          (noteCount > 0 ? '<div class="todo-notes-list">' + notesListHtml + '</div>' : '') +
          '<div class="todo-note-add-row">' +
            '<textarea class="todo-note-ta" id="ta-' + t.id + '" placeholder="พิมพ์บันทึก..." rows="2"></textarea>' +
            '<button class="btn btn-primary btn-sm" data-action="add-todo-note" data-id="' + t.id + '">เพิ่มบันทึก</button>' +
          '</div>' +
        '</div>' +
      '</td>' +
    '</tr>';

    var descCell = '<div class="task-title">' + esc(t.description) + '</div>' +
      (latestN ? '<div class="task-meta" style="color:var(--ink-faint); margin-top:3px;">&#128172; ' + esc(truncate(latestN.text, 60)) + '</div>' : '');

    var mainRow = '<tr class="task-row ' + rowCls + '" data-action="open-todo-modal" data-id="' + t.id + '">' +
      '<td class="col-desc-cell">' + descCell + '</td>' +
      '<td>' + esc(t.assignee) + '</td>' +
      '<td class="mono">' + fmtDateThai(t.dueDate) + '</td>' +
      '<td><span class="badge ' + urg.cls + '">' + urg.label + '</span></td>' +
      '<td><span class="badge ' + imp.cls + '">' + imp.label + '</span></td>' +
      '<td>' + (isTodoOverdue(t) ? '<span class="badge badge-coral">เกินกำหนด</span>' : '<select class="todo-status-select" data-action="todo-status-select" data-id="' + t.id + '">' + statusOptions + '</select>') + '</td>' +
      '<td>' + noteBtn + '</td>' +
      '<td><button class="btn btn-danger btn-sm" data-action="delete-todo" data-id="' + t.id + '" data-stop="1">ลบ</button></td>' +
    '</tr>';

    return mainRow + notesPanelHtml;
  }

  var activeItems = sorted.filter(function(t){ return t.status !== 'done'; });
  var doneItems = sorted.filter(function(t){ return t.status === 'done'; });

  var colgroup = '<colgroup>' +
    '<col class="col-desc"><col class="col-assignee"><col class="col-due">' +
    '<col class="col-urg"><col class="col-imp"><col class="col-status">' +
    '<col class="col-note"><col class="col-del">' +
  '</colgroup>';
  var thead = '<thead><tr><th>รายละเอียดงาน</th><th>ผู้รับผิดชอบ</th><th>Due Date</th><th>ความเร่งด่วน</th><th>ความสำคัญ</th><th>สถานะ</th><th>บันทึก</th><th></th></tr></thead>';

  var activeTable = activeItems.length > 0
    ? '<div class="panel"><div class="table-wrap"><table class="tk tk-todo">' + colgroup + thead + '<tbody>' + activeItems.map(function(t){ return buildTodoRow(t, false); }).join('') + '</tbody></table></div></div>'
    : '<div class="empty-state" style="padding:28px 24px;">' +
        '<div class="es-icon">&#9989;</div>' +
        '<div class="es-title">ไม่มีงานที่ค้างอยู่</div>' +
        '<div class="es-sub">งานทั้งหมดในตัวกรองนี้เสร็จสมบูรณ์แล้ว</div>' +
      '</div>';

  var doneSection = '';
  if(doneItems.length > 0){
    doneSection = '<div style="margin-top:20px;">' +
      '<div class="section-label" style="color:var(--teal);">&#10003; งานที่เสร็จแล้ว &middot; ' + doneItems.length + ' รายการ</div>' +
      '<div class="panel" style="opacity:0.88;">' +
        '<div class="table-wrap"><table class="tk tk-todo">' + colgroup + thead + '<tbody>' + doneItems.map(function(t){ return buildTodoRow(t, true); }).join('') + '</tbody></table></div>' +
      '</div>' +
    '</div>';
  }

  return head + filterBoxes + statusChips + searchBar + activeTable + doneSection;
}

    '<div class="field"><label>รายละเอียดงาน *</label><textarea id="f-todo-desc" placeholder="รายละเอียดงานที่ต้องทำ...">' + (t?esc(t.description):'') + '</textarea></div>' +

      '<div class="field"><label>ผู้รับผิดชอบ *</label><input type="text" id="f-todo-assignee" value="' + (t?esc(t.assignee):'') + '" placeholder="ชื่อผู้รับผิดชอบ"></div>' +

  '</div>' +

    '<button class="btn btn-primary" data-action="save-todo" data-id="' + (t?t.id:'') + '">' + (t?'บันทึกการแก้ไข':'+ เพิ่มงาน') + '</button>' +
  '</div>';
}

function renderOverviewView(){
  var head = '<div class="page-head">' +
      '<div><div class="page-title">ภาพรวมและภาระงาน</div><div class="page-desc">สรุปสถานะงานทั้งหมด (โปรเจกต์ + To-Do) และภาระงานของแต่ละคน</div></div>' +
    '</div>';

  var totalProjects = projects.length;

  // --- Merged stats: project tasks ---
  var tskDone = tasks.filter(function(t){ return Number(t.progress)===100; }).length;
  var tskOverdue = tasks.filter(isOverdue).length;
  var tskInProgress = tasks.filter(function(t){ var p=Number(t.progress); return p>0 && p<100 && !isOverdue(t); }).length;
  var tskNotStarted = tasks.filter(function(t){ return Number(t.progress)===0 && !isOverdue(t); }).length;

  // --- Merged stats: todos ---
  var tdDone = todos.filter(function(t){ return t.status==='done'; }).length;
  var tdOverdue = todos.filter(isTodoOverdue).length;
  var tdInProgress = todos.filter(function(t){ return t.status==='in_progress' && !isTodoOverdue(t); }).length;
  var tdNotStarted = todos.filter(function(t){ return t.status==='not_started' && !isTodoOverdue(t); }).length;

  // --- Grand totals ---
  var grandTotal = tasks.length + todos.length;
  var grandDone = tskDone + tdDone;
  var grandOverdue = tskOverdue + tdOverdue;
  var grandInProgress = tskInProgress + tdInProgress;
  var grandNotStarted = tskNotStarted + tdNotStarted;
  var completionRate = grandTotal ? Math.round(grandDone/grandTotal*100) : 0;

  if(grandTotal === 0){
    return head + '<div class="empty-state">' +
      '<div class="es-icon">&#128202;</div>' +
      '<div class="es-title">ยังไม่มีข้อมูลงาน</div>' +
      '<div class="es-sub">เริ่มสร้างโปรเจกต์ เพิ่มงาน หรือเพิ่มรายการ To-Do เพื่อดูสรุปภาพรวมและภาระงานของทีม</div>' +
    '</div>';
  }

  // KPIs
  var kpis = '<div class="kpi-grid">' +
    '<div class="panel kpi-card" style="--accent:var(--navy)"><div class="kpi-label">โปรเจกต์ทั้งหมด</div><div class="kpi-value">' + totalProjects + '</div><div class="kpi-foot">To-Do ' + todos.length + ' &middot; งานโปรเจกต์ ' + tasks.length + '</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--teal)"><div class="kpi-label">เสร็จสมบูรณ์</div><div class="kpi-value">' + completionRate + '%</div><div class="kpi-foot">' + grandDone + ' จาก ' + grandTotal + ' งานทั้งหมด</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--amber)"><div class="kpi-label">กำลังดำเนินการ</div><div class="kpi-value">' + grandInProgress + '</div><div class="kpi-foot">ยังไม่ได้เริ่ม ' + grandNotStarted + ' งาน</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--coral)"><div class="kpi-label">เลยกำหนด</div><div class="kpi-value">' + grandOverdue + '</div><div class="kpi-foot">ต้องติดตามเร่งด่วน</div></div>' +
  '</div>';

  // Unified donut — split into 2 rings: inner = project tasks, outer area = todos shown via legend breakdown
  var segs = [
    {key:'ns', n:grandNotStarted, c:'var(--slate)', label:'ยังไม่ได้เริ่ม'},
    {key:'ip', n:grandInProgress, c:'var(--amber)', label:'กำลังดำเนินการ'},
    {key:'dn', n:grandDone, c:'var(--teal)', label:'เสร็จสมบูรณ์'},
    {key:'od', n:grandOverdue, c:'var(--coral)', label:'เลยกำหนด'}
  ];
  var donutSegs = segs.map(function(s){ return {value:s.n, color:s.c}; });
  var donutSvg = buildDonutSvg(donutSegs, {size:152, thickness:22, centerLabel:completionRate+'%', centerSub:'เสร็จสมบูรณ์'});

  function makeSourceRow(label, ns, ip, dn, od, total, icon){
    return '<div style="margin-bottom:10px;">' +
      '<div style="font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;">' + icon + ' ' + label + ' <span class="mono" style="color:var(--ink);">' + total + '</span></div>' +
      '<div style="display:flex; gap:14px; flex-wrap:wrap;">' +
        '<span style="font-size:12px; color:var(--ink-soft);">ยังไม่เริ่ม <span class="mono" style="color:var(--slate); font-weight:700;">' + ns + '</span></span>' +
        '<span style="font-size:12px; color:var(--ink-soft);">กำลังทำ <span class="mono" style="color:var(--amber); font-weight:700;">' + ip + '</span></span>' +
        '<span style="font-size:12px; color:var(--ink-soft);">เสร็จ <span class="mono" style="color:var(--teal); font-weight:700;">' + dn + '</span></span>' +
        (od ? '<span style="font-size:12px; color:var(--coral); font-weight:700;">เลยกำหนด ' + od + '</span>' : '') +
      '</div>' +
    '</div>';
  }
  var legendRows = segs.map(function(s){
    var pct = grandTotal ? Math.round(s.n/grandTotal*100) : 0;
    return '<div style="display:flex; align-items:center; gap:9px; padding:5px 0; border-bottom:1px solid var(--line-soft);">' +
      '<span style="width:11px; height:11px; border-radius:3px; background:' + s.c + '; flex-shrink:0;"></span>' +
      '<span style="flex:1; font-size:13px; color:var(--ink);">' + s.label + '</span>' +
      '<span class="mono" style="font-size:13px; font-weight:700; color:var(--ink);">' + s.n + '</span>' +
      '<span class="mono" style="font-size:11.5px; color:var(--ink-faint); min-width:36px; text-align:right;">' + pct + '%</span>' +
    '</div>';
  }).join('');
  var sourceSummary = makeSourceRow('งานโปรเจกต์', tskNotStarted, tskInProgress, tskDone, tskOverdue, tasks.length, '&#128203;') +
    (todos.length > 0 ? makeSourceRow('To-Do List', tdNotStarted, tdInProgress, tdDone, tdOverdue, todos.length, '&#128221;') : '');
  var statusDonutPanel = '<div class="panel" style="padding:18px 20px; margin-bottom:20px; display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap;">' +
    '<div style="display:flex; flex-direction:column; align-items:center; gap:6px;">' +
      donutSvg +
      '<div style="font-size:11px; color:var(--ink-faint);">รวม ' + grandTotal + ' งาน</div>' +
    '</div>' +
    '<div style="flex:1; min-width:220px;">' +
      '<div class="section-label" style="margin-top:0; margin-bottom:10px;">สัดส่วนสถานะ (ภาพรวม)</div>' +
      legendRows +
      '<div style="margin-top:14px; padding-top:12px; border-top:1.5px dashed var(--line);">' +
        sourceSummary +
      '</div>' +
    '</div>' +
  '</div>';

  // --- Unified workload by person (merge tasks + todos) ---
  function segLabel(pctOfBar, text){ return pctOfBar >= 13 ? ('<span class="wl-seg-label">' + text + '</span>') : ''; }

  var byPerson = {};
  tasks.forEach(function(t){
    var key = (t.assignee || 'ไม่ระบุ').trim() || 'ไม่ระบุ';
    if(!byPerson[key]) byPerson[key] = {taskItems:[], todoItems:[]};
    byPerson[key].taskItems.push(t);
  });
  todos.forEach(function(td){
    var key = (td.assignee || 'ไม่ระบุ').trim() || 'ไม่ระบุ';
    if(!byPerson[key]) byPerson[key] = {taskItems:[], todoItems:[]};
    byPerson[key].todoItems.push(td);
  });
  var persons = Object.keys(byPerson).sort(function(a,b){
    var ta = byPerson[a].taskItems.length + byPerson[a].todoItems.length;
    var tb = byPerson[b].taskItems.length + byPerson[b].todoItems.length;
    return tb - ta;
  });
  var maxPersonCount = persons.length ? (byPerson[persons[0]].taskItems.length + byPerson[persons[0]].todoItems.length) : 1;

  var wlRows = persons.map(function(name){
    var pd = byPerson[name];
    // task stats
    var tns = pd.taskItems.filter(function(t){ return Number(t.progress)===0 && !isOverdue(t); }).length;
    var tip = pd.taskItems.filter(function(t){ var p=Number(t.progress); return p>0 && p<100 && !isOverdue(t); }).length;
    var tdn = pd.taskItems.filter(function(t){ return Number(t.progress)===100; }).length;
    var tod = pd.taskItems.filter(isOverdue).length;
    // todo stats
    var dns = pd.todoItems.filter(function(t){ return t.status==='not_started' && !isTodoOverdue(t); }).length;
    var dip = pd.todoItems.filter(function(t){ return t.status==='in_progress' && !isTodoOverdue(t); }).length;
    var ddn = pd.todoItems.filter(function(t){ return t.status==='done'; }).length;
    var dod = pd.todoItems.filter(isTodoOverdue).length;
    // totals
    var ns = tns + dns, ip = tip + dip, dn = tdn + ddn, od = tod + dod;
    var total = pd.taskItems.length + pd.todoItems.length;
    var widthPct = (total / maxPersonCount * 100);
    var donePct = total ? Math.round(dn/total*100) : 0;
    var ring = buildDonutSvg([{value:dn,color:'var(--teal)'},{value:total-dn,color:'var(--slate-soft)'}], {size:46, thickness:6, centerLabel:donePct+'%', labelSize:11});
    var taskBadge = pd.taskItems.length ? ('<span style="font-size:10px; background:var(--navy-soft); color:var(--navy); border-radius:4px; padding:1px 5px; font-weight:700; margin-left:4px;">P:' + pd.taskItems.length + '</span>') : '';
    var todoBadge = pd.todoItems.length ? ('<span style="font-size:10px; background:var(--teal-soft); color:#1D7468; border-radius:4px; padding:1px 5px; font-weight:700; margin-left:2px;">T:' + pd.todoItems.length + '</span>') : '';
    return '<div class="wl-row">' +
      '<div class="wl-ring">' + ring + '</div>' +
      '<div><div class="wl-name">' + esc(name) + taskBadge + todoBadge + '</div><div class="wl-name-sub">' + total + ' งานรวม</div></div>' +
      '<div class="wl-bar-track" style="width:' + widthPct + '%;">' +
        (ns ? '<div class="wl-bar-seg" style="width:' + (ns/total*100) + '%; background:var(--slate);">' + segLabel(ns/total*100, ns) + '</div>' : '') +
        (ip ? '<div class="wl-bar-seg" style="width:' + (ip/total*100) + '%; background:var(--amber);">' + segLabel(ip/total*100, ip) + '</div>' : '') +
        (dn ? '<div class="wl-bar-seg" style="width:' + (dn/total*100) + '%; background:var(--teal);">' + segLabel(dn/total*100, dn) + '</div>' : '') +
        (od ? '<div class="wl-bar-seg" style="width:' + (od/total*100) + '%; background:var(--coral);">' + segLabel(od/total*100, od) + '</div>' : '') +
      '</div>' +
      '<div class="wl-stats">' +
        '<span>ยังไม่เริ่ม <b>' + ns + '</b></span><span>กำลังทำ <b>' + ip + '</b></span><span>เสร็จ <b>' + dn + '</b></span>' + (od ? '<span style="color:var(--coral);">เลยกำหนด <b>' + od + '</b></span>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  var wlLegend = '<div style="display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-soft);">' +
    '<span><b style="color:var(--navy);">P:n</b> = งานโปรเจกต์ &nbsp; <b style="color:#1D7468;">T:n</b> = To-Do List</span>' +
  '</div>';
  var workloadPanel = persons.length > 0 ? (
    '<div class="panel" style="padding:18px 18px 6px 18px; margin-top:0;">' +
      '<div class="section-label" style="margin-top:0;">ภาระงานของแต่ละคน (โปรเจกต์ + To-Do รวม)</div>' +
      wlLegend + wlRows +
    '</div>'
  ) : '';

  return head + kpis + statusDonutPanel + workloadPanel;
}
