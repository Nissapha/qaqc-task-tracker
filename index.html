  } else {
    var activeGrid = activeProjects.length > 0
      ? '<div class="project-grid">' + activeProjects.map(buildProjectCard).join('') + '</div>'
      : '';
    var doneGrid = doneProjects.length > 0
      ? '<div style="margin-top:24px;">' +
          '<div class="section-label" style="color:var(--teal); margin-bottom:12px;">&#10003; โปรเจกต์ที่เสร็จสมบูรณ์แล้ว &middot; ' + doneProjects.length + ' โปรเจกต์</div>' +
          '<div class="project-grid" style="opacity:0.82;">' + doneProjects.map(buildProjectCard).join('') + '</div>' +
        '</div>'
      : '';
    gridHtml = activeGrid + doneGrid;
  }

  var ganttPanel = '<div class="panel" style="padding:16px 18px; margin-top:24px;">' +
    '<div class="section-label" style="margin-top:0; font-size:14px;">แผนภูมิแกนต์ — ภาพรวมระยะเวลาโครงการ</div>' +
    renderGanttSection('all') +
  '</div>';

  return head + filterBar + gridHtml + ganttPanel;
}

/* ===================== Project detail ===================== */
function renderProjectDetail(){
  var p = projectById(currentProjectId);
  if(!p){ currentProjectId = null; return renderProjectsList(); }
  var pt = sortByStartDate(tasksOfProject(p.id));
  var catLabel = projectCategoryLabel(p);
  var prio = p.priority ? priorityById(p.priority) : null;

  var head = '<button class="back-link" data-action="back-to-projects">&larr; กลับไปหน้า Project</button>' +
    '<div class="page-head">' +
      '<div><div class="page-title" style="display:flex; align-items:center; gap:8px;"><span class="project-tag" style="--pcolor:' + p.color + '"></span>' + esc(p.name) + '</div>' +
      (p.description ? '<div class="page-desc">' + esc(p.description) + '</div>' : '') +
      '<div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;">' +
        (prio ? '<span class="badge ' + prio.cls + '">' + prio.label + '</span>' : '') +
        (catLabel ? '<span class="badge badge-cat">' + esc(catLabel) + '</span>' : '') +
        (p.owner ? '<span class="badge badge-slate">เจ้าของ: ' + esc(p.owner) + '</span>' : '') +
      '</div></div>' +
      '<div style="display:flex; gap:8px; flex-wrap:wrap;">' +
        '<button class="btn btn-ghost" data-action="export-project-excel" data-id="' + p.id + '">&#128190; Export Excel</button>' +
        '<button class="btn btn-ghost" data-action="export-project-gantt" data-id="' + p.id + '">&#128202; Export Gantt (รูปภาพ)</button>' +
        '<button class="btn btn-primary" data-action="open-task-modal" data-id="' + p.id + '">+ เพิ่มงาน</button>' +
      '</div>' +
    '</div>';

  if(pt.length === 0){
    return head + '<div class="empty-state">' +
      '<div class="es-icon">&#9989;</div>' +
      '<div class="es-title">ยังไม่มีงานในโปรเจกต์นี้</div>' +
      '<div class="es-sub">เพิ่มงานตรวจสอบคุณภาพ พร้อมกำหนดผู้รับผิดชอบและวันที่</div>' +
      '<button class="btn btn-primary" data-action="open-task-modal" data-id="' + p.id + '">+ เพิ่มงาน</button>' +
    '</div>';
  }

  var buildTaskRow = function(t){
    var s = statusInfo(t);
    var actInfo = lastActivityInfo(t);
    var dueInfo = dueRemainingInfo(t);
    var lastN = latestNote(t);
    var rowCls = isOverdue(t) ? 'todo-row-overdue' : (Number(t.progress) === 100 ? 'todo-row-done' : (Number(t.progress) > 0 ? 'todo-row-inprogress' : ''));
    var assigneeChips = taskAssigneesArr(t).map(function(a){
      return '<span class="assignee-chip">' + esc(a.name) + (a.dept ? '<span class="ac-dept">' + esc(a.dept) + '</span>' : '') + '</span>';
    }).join('');
    return '<tr class="task-row ' + rowCls + '" data-action="open-task-detail" data-id="' + t.id + '">' +
      '<td class="col-desc-cell"><div class="task-title">' + esc(t.title) + '</div>' +
        (lastN ? '<div class="task-meta">&#128172; ' + esc(truncate(lastN.text, 70)) + '</div>' : '') +
        '<div class="last-act' + (actInfo.stale ? ' stale' : '') + '" style="margin-top:4px;"><span class="dot"></span>' + actInfo.label + '</div>' +
      '</td>' +
      '<td><div class="assignee-chip-wrap">' + assigneeChips + '</div></td>' +
      '<td class="mono">' + fmtDateThai(t.startDate) + '</td>' +
      '<td><div class="mono">' + fmtDateThai(t.dueDate) + '</div>' + (dueInfo ? '<div style="margin-top:3px;"><span class="due-pill ' + dueInfo.cls + '">' + dueInfo.label + '</span></div>' : '') + '</td>' +
      '<td><div style="display:flex; align-items:center; gap:8px;"><div class="progress-track"><div class="progress-fill" style="width:' + t.progress + '%; background:' + s.color + '"></div></div><span class="mono" style="font-size:12px;">' + t.progress + '%</span></div></td>' +
      '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>' +
      '<td><button class="btn btn-danger btn-sm" data-action="delete-task" data-id="' + t.id + '" data-stop="1">ลบ</button></td>' +
    '</tr>';
  };

  // Active first (sorted by due date), done at the bottom
  var activeTasks = pt.filter(function(t){ return Number(t.progress) !== 100; })
    .slice().sort(function(a,b){ return (a.dueDate||'9999').localeCompare(b.dueDate||'9999'); });
  var doneTasks = pt.filter(function(t){ return Number(t.progress) === 100; })
    .slice().sort(function(a,b){ return (a.dueDate||'9999').localeCompare(b.dueDate||'9999'); });

  var theadHtml = '<thead><tr><th>งาน</th><th>ผู้รับผิดชอบ</th><th>เริ่ม</th><th>กำหนดส่ง</th><th>ความคืบหน้า</th><th>สถานะ</th><th></th></tr></thead>';

  var activeTableHtml = activeTasks.length > 0
    ? '<div class="panel"><div class="table-wrap"><table class="tk">' + theadHtml + '<tbody>' + activeTasks.map(buildTaskRow).join('') + '</tbody></table></div></div>'
    : '<div class="empty-state" style="padding:24px;"><div class="es-icon">&#9989;</div><div class="es-title">งานทั้งหมดเสร็จสมบูรณ์แล้ว</div></div>';

  var doneTableHtml = doneTasks.length > 0
    ? '<div style="margin-top:18px;"><div class="section-label" style="color:var(--teal);">&#10003; งานที่เสร็จแล้ว &middot; ' + doneTasks.length + ' รายการ</div>' +
        '<div class="panel" style="opacity:0.88;"><div class="table-wrap"><table class="tk">' + theadHtml + '<tbody>' + doneTasks.map(buildTaskRow).join('') + '</tbody></table></div></div></div>'
    : '';

  var ganttPanel = '<div class="panel" style="padding:16px 18px; margin-top:20px;">' +
    '<div class="section-label" style="margin-top:0; font-size:14px;">แผนภูมิแกนต์ — ' + esc(p.name) + '</div>' +
    renderGanttSection(p.id) +
  '</div>';

  return head + activeTableHtml + doneTableHtml + ganttPanel;
}

/* ===================== Gantt (embedded in home page) ===================== */
function renderGanttSection(mode){
  mode = mode || 'all';
  var scopedProjectId = mode === 'all' ? null : mode;
  var todayD = parseDateStr(todayStr());

  var effectiveFilter = scopedProjectId || ganttFilterProject;
  var relevantProjects = effectiveFilter === 'all' ? projects : projects.filter(function(p){ return p.id === effectiveFilter; });

  // Hide fully-done projects from the all-projects Gantt view
  if(effectiveFilter === 'all'){
    relevantProjects = relevantProjects.filter(function(p){
      var pt = tasks.filter(function(t){ return t.projectId === p.id; });
      if(pt.length === 0) return true; // no tasks yet — still show
      return !pt.every(function(t){ return Number(t.progress) === 100; });
    });
  }

  var activeProjectIds = relevantProjects.reduce(function(acc, p){ acc[p.id] = true; return acc; }, {});
  var baseTasks = tasks.filter(function(t){
    if(!t.startDate || !t.dueDate) return false;
    if(effectiveFilter === 'all') return !!activeProjectIds[t.projectId];
    return t.projectId === effectiveFilter;
  });

  var rangeStart, rangeEnd;
  if(ganttRangeStart && ganttRangeEnd && ganttRangeStart <= ganttRangeEnd){
    rangeStart = parseDateStr(ganttRangeStart);
    rangeEnd = parseDateStr(ganttRangeEnd);
  } else if(baseTasks.length){
    var minD = null, maxD = null;
    baseTasks.forEach(function(t){
      var s = parseDateStr(t.startDate), e = parseDateStr(t.dueDate);
      if(!minD || s < minD) minD = s;
      if(!maxD || e > maxD) maxD = e;
    });
    // include today in the visible span if it extends past the last due date (for overrun bars)
    if(todayD > maxD) maxD = todayD;
    var spanDays = dayDiff(minD, maxD) + 1;
    // Right buffer for after-bar "% · date" label; left buffer for the start-date label.
    var rightBuffer = Math.max(6, Math.ceil(spanDays * 0.20));
    var leftBuffer = Math.max(4, Math.ceil(spanDays * 0.08));
    rangeStart = addDays(minD, -leftBuffer);
    rangeEnd = addDays(maxD, rightBuffer);
  } else {
    rangeStart = firstDayOfMonth(todayD);
    rangeEnd = lastDayOfMonth(todayD);
  }

  var rangeBadge = fmtMonthYearShort(rangeStart) + ' &ndash; ' + fmtMonthYearShort(rangeEnd);
  var projectSelectHtml = '';
  if(!scopedProjectId){
    var filterOptions = '<option value="all">ทุกโปรเจกต์</option>' + projects.map(function(p){
      return '<option value="' + p.id + '"' + (ganttFilterProject===p.id?' selected':'') + '>' + esc(p.name) + '</option>';
    }).join('');
    projectSelectHtml = '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600; margin-left:6px;">โปรเจกต์:</label>' +
      '<select data-action="filter-gantt">' + filterOptions + '</select>';
  }

  var toolbar = '<div class="gantt-toolbar">' +
    '<div class="gantt-toolbar-row">' +
      '<span class="gtb-label">&#10520; TIMELINE</span>' +
      '<div class="zoom-toggle">' +
        '<button class="zoom-btn' + (ganttZoomMode==='month'?' active':'') + '" data-action="gantt-zoom-month">รายเดือน</button>' +
        '<button class="zoom-btn' + (ganttZoomMode==='week'?' active':'') + '" data-action="gantt-zoom-week">รายสัปดาห์</button>' +
        '<button class="zoom-btn' + (ganttZoomMode==='custom'?' active':'') + '" data-action="gantt-zoom-custom">กำหนดเอง</button>' +
      '</div>' +
      '<span class="range-badge">' + rangeBadge + '</span>' +
    '</div>' +
    '<div class="gantt-toolbar-row">' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">เริ่มต้น</label>' +
      '<input type="date" id="gantt-range-start" value="' + (ganttRangeStart||'') + '">' +
      '<span style="color:var(--ink-faint);">&rarr;</span>' +
      '<label style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">สิ้นสุด</label>' +
      '<input type="date" id="gantt-range-end" value="' + (ganttRangeEnd||'') + '">' +
      '<button class="btn btn-ghost btn-sm" data-action="apply-gantt-range">แสดงช่วงนี้</button>' +
      '<button class="btn btn-ghost btn-sm" data-action="fit-gantt-range">&#10530; Fit</button>' +
      '<button class="btn btn-ghost btn-sm" data-action="gantt-jump-today">&#128336; วันนี้</button>' +
      projectSelectHtml +
    '</div>' +
  '</div>';

  var legend = '<div class="gantt-legend">' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--slate)"></span>ยังไม่ได้เริ่ม</div>' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>กำลังดำเนินการ</div>' +
    '<div class="legend-item"><span class="legend-dot" style="background:var(--teal)"></span>เสร็จ</div>' +
    '<div class="legend-item"><span class="legend-dot striped"></span>เกินกำหนด</div>' +
  '</div>';

  if(baseTasks.length === 0){
    return toolbar + '<div class="empty-state">' +
      '<div class="es-icon">&#128197;</div>' +
      '<div class="es-title">ยังไม่มีข้อมูลสำหรับแสดงแผนภูมิ</div>' +
      '<div class="es-sub">เพิ่มงานที่มีวันเริ่มต้นและวันกำหนดส่งในโปรเจกต์ก่อน</div>' +
    '</div>';
  }

  var totalDays = Math.max(1, dayDiff(rangeStart, rangeEnd) + 1);

  var relevantTasks = baseTasks.filter(function(t){
    var ts = parseDateStr(t.startDate), te = parseDateStr(t.dueDate);
    return te >= rangeStart && ts <= rangeEnd;
  });

  if(relevantTasks.length === 0){
    return toolbar + legend + '<div class="empty-state">' +
      '<div class="es-icon">&#128269;</div>' +
      '<div class="es-title">ไม่มีงานในช่วงเวลาที่เลือก</div>' +
      '<div class="es-sub">ลองกด "Fit" เพื่อแสดงทุกโปรเจกต์</div>' +
    '</div>';
  }

  function pct(days){ return (days/totalDays)*100; }

  var ticksHtml = '', tickLabelsHtml = '';
  for(var i=0;i<totalDays;i++){
    var d = addDays(rangeStart, i);
    if(i===0 || d.getDay()===1){
      var x = pct(i);
      ticksHtml += '<div class="gantt-tick" style="left:' + x + '%;"></div>';
      tickLabelsHtml += '<div class="gantt-tick-label" style="left:' + x + '%;">' + fmtDateShort(d) + '</div>';
    }
  }
  var bgTicks = '';
  for(var j=0;j<totalDays;j++){
    var dj = addDays(rangeStart,j);
    if(dj.getDay()===1) bgTicks += '<div class="gantt-bg-tick" style="left:' + pct(j) + '%;"></div>';
  }
  var todayIdx = dayDiff(rangeStart, todayD);
  var todayLineHtml = '';
  var todayTickLabelHtml = '';
  if(todayIdx >= 0 && todayIdx < totalDays){
    var tx = pct(todayIdx);
    // body area: vertical line only (no label, so it won't overlap row content)
    todayLineHtml = '<div class="gantt-today-line" style="left:' + tx + '%;"></div>';
    // header tick row: the "วันนี้" label lives here, above the bars
    todayTickLabelHtml = '<div class="gantt-today-line" style="left:' + tx + '%;"></div><div class="gantt-today-label" style="left:calc(' + tx + '% + 4px);">วันนี้</div>';
  }

  var projectsWithTasks = relevantProjects.filter(function(p){
    return relevantTasks.some(function(t){ return t.projectId === p.id; });
  });

  var showGroups = !scopedProjectId && projectsWithTasks.length > 0;

  var bodyHeight = showGroups ? projectsWithTasks.reduce(function(acc,p){
    var collapsed = !!ganttCollapsed[p.id];
    var n = relevantTasks.filter(function(t){ return t.projectId === p.id; }).length;
    return acc + 26 + (collapsed ? 0 : n*34);
  },0) : relevantTasks.length*34;

  var labelsHtml = '<div class="gantt-label-head">PROJECT / TASK</div>';
  var rowsHtml = '<div class="gantt-body-rows" style="min-height:' + bodyHeight + 'px;">' + bgTicks + todayLineHtml;

  function renderTaskRow(t){
    var note = latestNote(t);
    var seg = buildBarSegments(t, rangeStart, rangeEnd, totalDays);
    var tooltip = t.title + ' (' + t.progress + '%)' + (note ? ' — ' + truncate(note.text, 60) : '');
    labelsHtml += '<div class="gantt-label-row" title="' + esc(t.title) + ' — ' + esc(taskAssigneeDisplay(t)) + '"><div><div class="glr-title">' + esc(t.title) + '</div><div class="glr-sub">' + esc(taskAssigneeNamesShort(t)) + '</div></div></div>';

    var trackInner = renderBarHtml(t, seg, { dataAction:'open-task-detail', dataId:t.id, tooltip:tooltip });
    if(seg.hasPlan || seg.hasOverrun){
      var startLeftWidth = seg.hasPlan ? seg.planLeft : seg.overrunLeft;
      trackInner += '<div class="gantt-date-flank flank-start" style="left:0%; width:' + startLeftWidth + '%;">' + fmtDateShort(parseDateStr(t.startDate)) + '</div>';
      var endLeft = seg.endOfBarPx;
      trackInner += '<div class="gantt-date-flank flank-end' + (seg.overdue?' flank-overdue':'') + '" style="left:' + endLeft + '%; width:' + (100-endLeft) + '%;">' +
        t.progress + '% &middot; ' + fmtDateShort(parseDateStr(t.dueDate)) + (seg.overdue ? ' (เกิน ' + seg.overdueDays + ' วัน)' : '') + '</div>';
    }
    rowsHtml += '<div class="gantt-row-track">' + trackInner + '</div>';
  }

  if(showGroups){
    projectsWithTasks.forEach(function(p){
      var pts = sortByStartDate(relevantTasks.filter(function(t){ return t.projectId === p.id; }));
      var collapsed = !!ganttCollapsed[p.id];
      var agg = projectAggregate(p.id);

      labelsHtml += '<div class="gantt-group-row" data-action="toggle-gantt-group" data-id="' + p.id + '">' +
        '<span class="ggr-chevron' + (collapsed?' collapsed':'') + '">&#9660;</span>' +
        '<span class="ggr-dot" style="background:' + p.color + '"></span>' +
        '<span class="ggr-name" title="' + esc(p.name) + '">' + esc(p.name) + '</span>' +
        (agg ? '<span class="ggr-pct">' + agg.progress + '%</span>' : '') +
      '</div>';

      var groupTrackInner = '';
      if(agg){
        var gseg = buildBarSegments(agg, rangeStart, rangeEnd, totalDays);
        groupTrackInner = renderBarHtml(agg, gseg, { isGroup:true, groupColor:p.color, fillColorOverride:p.color, dataAction:'toggle-gantt-group', dataId:p.id,
          tooltip: p.name + ' — รวม ' + agg.taskCount + ' งาน (' + agg.progress + '%)' });
        if(gseg.hasPlan || gseg.hasOverrun){
          var gStartWidth = gseg.hasPlan ? gseg.planLeft : gseg.overrunLeft;
          groupTrackInner += '<div class="gantt-date-flank is-group flank-start" style="left:0%; width:' + gStartWidth + '%;">' + fmtDateShort(parseDateStr(agg.startDate)) + '</div>';
          var gEndLeft = gseg.endOfBarPx;
          groupTrackInner += '<div class="gantt-date-flank is-group flank-end' + (gseg.overdue?' flank-overdue':'') + '" style="left:' + gEndLeft + '%; width:' + (100-gEndLeft) + '%;">' +
            agg.progress + '% &middot; ' + fmtDateShort(parseDateStr(agg.dueDate)) + (gseg.overdue ? ' (เกิน ' + gseg.overdueDays + ' วัน)' : '') + '</div>';
        }
      }
      rowsHtml += '<div class="gantt-group-track" data-action="toggle-gantt-group" data-id="' + p.id + '">' + groupTrackInner + '</div>';

      if(!collapsed){ pts.forEach(renderTaskRow); }
    });
  } else {
    sortByStartDate(relevantTasks).forEach(renderTaskRow);
  }
  rowsHtml += '</div>';

  var gantt = '<div class="gantt-wrap">' +
    '<div class="gantt-labels">' + labelsHtml + '</div>' +
    '<div class="gantt-scroll"><div class="gantt-timeline">' +
      '<div class="gantt-tick-row">' + ticksHtml + tickLabelsHtml + todayTickLabelHtml + '</div>' +
      rowsHtml +
    '</div></div>' +
  '</div>';

  return toolbar + legend + gantt;
}

/* ===================== To-Do List ===================== */
function renderTodosView(){
  var head = '<div class="page-head">' +
      '<div><div class="page-title">To-Do List</div><div class="page-desc">รายการงาน (Job) ที่ต้องติดตาม นอกเหนือจากงานในโปรเจกต์</div></div>' +
      '<button class="btn btn-primary" data-action="open-todo-modal">+ เพิ่มงาน</button>' +
    '</div>';

  if(todos.length === 0){
    return head + '<div class="empty-state">' +
      '<div class="es-icon">&#128221;</div>' +
      '<div class="es-title">ยังไม่มีงานใน To-Do List</div>' +
      '<div class="es-sub">เพิ่มงานที่ต้องติดตาม พร้อมกำหนดผู้รับผิดชอบ วันกำหนดส่ง ความเร่งด่วน และความสำคัญ</div>' +
      '<button class="btn btn-primary" data-action="open-todo-modal">+ เพิ่มงาน</button>' +
    '</div>';
  }

  var now = new Date();
  var todayS = todayStr();
  var weekStartS = toDateStr(mostRecentMonday(now));
  var weekEndS = toDateStr(addDays(mostRecentMonday(now), 6));
  var monthStartS = toDateStr(firstDayOfMonth(now));
  var monthEndS = toDateStr(lastDayOfMonth(now));

  var todayCount = todos.filter(function(t){ return t.dueDate === todayS; }).length;
  var weekCount = todos.filter(function(t){ return t.dueDate >= weekStartS && t.dueDate <= weekEndS; }).length;
  var monthCount = todos.filter(function(t){ return t.dueDate >= monthStartS && t.dueDate <= monthEndS; }).length;
  var overdueCount = todos.filter(isTodoOverdue).length;

  function getWindowTodos(key){
    if(key === 'today') return todos.filter(function(t){ return t.dueDate === todayS; });
    if(key === 'week') return todos.filter(function(t){ return t.dueDate >= weekStartS && t.dueDate <= weekEndS; });
    if(key === 'month') return todos.filter(function(t){ return t.dueDate >= monthStartS && t.dueDate <= monthEndS; });
    if(key === 'overdue') return todos.filter(isTodoOverdue);
    return todos;
  }
  function filterBox(key, label, count, icon){
    var active = todoFilterWindow === key;
    var wTodos = getWindowTodos(key);
    var wTotal = wTodos.length;
    var wNs = wTodos.filter(function(t){ return t.status==='not_started' && !isTodoOverdue(t); }).length;
    var wIp = wTodos.filter(function(t){ return t.status==='in_progress' && !isTodoOverdue(t); }).length;
    var wDn = wTodos.filter(function(t){ return t.status==='done'; }).length;
    var wOd = wTodos.filter(isTodoOverdue).length;
    var miniBar = wTotal > 0 ? (
      '<div class="tfb-mini-bar">' +
        (wNs ? '<div class="tfb-mini-seg" style="width:' + (wNs/wTotal*100) + '%; background:var(--slate);"></div>' : '') +
        (wIp ? '<div class="tfb-mini-seg" style="width:' + (wIp/wTotal*100) + '%; background:var(--amber);"></div>' : '') +
        (wDn ? '<div class="tfb-mini-seg" style="width:' + (wDn/wTotal*100) + '%; background:var(--teal);"></div>' : '') +
        (wOd ? '<div class="tfb-mini-seg" style="width:' + (wOd/wTotal*100) + '%; background:var(--coral);"></div>' : '') +
      '</div>'
    ) : '';
    var subStats = wTotal > 0 ? (
      '<div class="tfb-substats">' +
        (wNs ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--slate);"></span><span class="tfb-stat-label">ยังไม่เริ่ม</span><span class="tfb-stat-num">' + wNs + '</span></div>' : '') +
        (wIp ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--amber);"></span><span class="tfb-stat-label">กำลังทำ</span><span class="tfb-stat-num">' + wIp + '</span></div>' : '') +
        (wDn ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--teal);"></span><span class="tfb-stat-label">เสร็จ</span><span class="tfb-stat-num">' + wDn + '</span></div>' : '') +
        (wOd ? '<div class="tfb-stat-row"><span class="tfb-stat-dot" style="background:var(--coral);"></span><span class="tfb-stat-label">เกินกำหนด</span><span class="tfb-stat-num">' + wOd + '</span></div>' : '') +
      '</div>'
    ) : '';
    return '<div class="todo-filter-box' + (active?' active':'') + '" data-action="toggle-todo-window" data-key="' + key + '">' +
      '<div class="tfb-icon">' + icon + '</div>' +
      '<div class="tfb-count">' + count + '</div>' +
      '<div class="tfb-label">' + label + '</div>' +
      subStats +
      miniBar +
    '</div>';
  }
  var filterBoxes = '<div class="todo-filter-grid">' +
    filterBox('today', 'วันนี้', todayCount, '&#128197;') +
    filterBox('week', 'สัปดาห์นี้', weekCount, '&#128197;') +
    filterBox('month', 'เดือนนี้', monthCount, '&#128197;') +
    filterBox('overdue', 'เกินกำหนด', overdueCount, '&#9200;') +
  '</div>';

  function statusChip(key, label){
    var active = todoFilterStatus === key;
    return '<div class="status-chip' + (active?' active':'') + '" data-action="toggle-todo-status-filter" data-key="' + key + '">' + label + '</div>';
  }
  var statusChips = '<div class="status-chip-bar">' +
    statusChip('all', 'ทั้งหมด') +
    TODO_STATUSES.map(function(s){ return statusChip(s.id, s.label); }).join('') +
  '</div>';

  var searchBar = '<div class="todo-search-bar">' +
    '<span style="font-size:14px; color:var(--ink-faint);">&#128269;</span>' +
    '<input type="text" id="todo-assignee-search" value="' + esc(todoFilterAssignee) + '" placeholder="ค้นหาผู้รับผิดชอบ..." style="flex:1; border:none; outline:none; font-size:13px; font-family:\'IBM Plex Sans\'; background:transparent; color:var(--ink);">' +
    (todoFilterAssignee ? '<button class="btn btn-ghost btn-sm" data-action="clear-todo-assignee" style="padding:3px 8px; font-size:11px;">✕ ล้าง</button>' : '') +
  '</div>';

  var filtered = todos.filter(function(t){
    if(todoFilterStatus !== 'all' && t.status !== todoFilterStatus) return false;
    if(todoFilterWindow === 'today' && t.dueDate !== todayS) return false;
    if(todoFilterWindow === 'week' && !(t.dueDate >= weekStartS && t.dueDate <= weekEndS)) return false;
    if(todoFilterWindow === 'month' && !(t.dueDate >= monthStartS && t.dueDate <= monthEndS)) return false;
    if(todoFilterWindow === 'overdue' && !isTodoOverdue(t)) return false;
    if(todoFilterAssignee && (!t.assignee || t.assignee.toLowerCase().indexOf(todoFilterAssignee.toLowerCase()) === -1)) return false;
    return true;
  });
  var sorted = sortByDueDateTodo(filtered);

  if(sorted.length === 0){
    return head + filterBoxes + statusChips + searchBar + '<div class="empty-state">' +
      '<div class="es-icon">&#128269;</div>' +
      '<div class="es-title">ไม่พบงานตามตัวกรองที่เลือก</div>' +
      '<div class="es-sub">ลองเปลี่ยนหรือล้างตัวกรองดู</div>' +
      (todoFilterAssignee ? '<button class="btn btn-ghost btn-sm" data-action="clear-todo-assignee" style="margin-top:8px;">✕ ล้างคำค้นหา "' + esc(todoFilterAssignee) + '"</button>' : '') +
    '</div>';
  }

  function buildTodoRow(t, isDoneSection){
    var s = todoStatusInfo(t);
    var urg = priorityById(t.urgency);
    var imp = priorityById(t.importance);
    var statusOptions = TODO_STATUSES.map(function(st){
      return '<option value="' + st.id + '"' + (t.status===st.id?' selected':'') + '>' + st.label + '</option>';
    }).join('');
    var rowCls = isTodoOverdue(t) ? 'todo-row-overdue' : (t.status === 'done' ? 'todo-row-done' : (t.status === 'in_progress' ? 'todo-row-inprogress' : ''));

    // Notes display: latest note preview in main row
    var notes = t.notes || [];
    var latestN = notes.length ? notes.slice().sort(function(a,b){ return b.date - a.date; })[0] : null;
    var noteCount = notes.length;
    var noteBtn = '<button class="btn btn-ghost btn-sm todo-note-btn" data-action="toggle-todo-notes" data-id="' + t.id + '" style="padding:4px 9px; font-size:11.5px; gap:4px;">' +
      '&#128172; ' + (noteCount > 0 ? noteCount : '+') +
    '</button>';

    // Inline notes panel (hidden by default, toggled via JS class)
    var notesListHtml = noteCount > 0 ? notes.slice().sort(function(a,b){ return b.date - a.date; }).map(function(n){
      var m = activityTypeMeta(n.type);
      return '<div class="act-item">' +
        '<div class="act-icon" style="color:' + m.color + ';">' + m.icon + '</div>' +
        '<div class="act-main"><div class="act-text">' + esc(n.text) + '</div>' +
        '<div class="act-meta"><span>' + fmtTimestamp(n.date) + '</span><span class="act-tag">' + m.tag + '</span></div>' +
        '</div></div>';
    }).join('') : '';
    var notesPanelHtml = '<tr class="todo-notes-panel" id="tnp-' + t.id + '" style="display:none;">' +
      '<td colspan="8" style="padding:0; border-bottom:none;">' +
        '<div class="todo-notes-expand">' +
          (noteCount > 0 ? '<div class="act-log" style="margin-bottom:10px;">' + notesListHtml + '</div>' : '') +
          '<div class="todo-note-add-row">' +
            '<textarea class="todo-note-ta" id="ta-' + t.id + '" placeholder="พิมพ์บันทึก..." rows="2"></textarea>' +
            '<button class="btn btn-primary btn-sm" data-action="add-todo-note" data-id="' + t.id + '">เพิ่มบันทึก</button>' +
          '</div>' +
        '</div>' +
      '</td>' +
    '</tr>';

    var actInfo = lastActivityInfo(t);
    var dueInfo = dueRemainingInfo(t);
    var descCell = '<div class="task-title">' + esc(t.description) + '</div>' +
      (latestN ? '<div class="task-meta" style="color:var(--ink-faint); margin-top:3px;">&#128172; ' + esc(truncate(latestN.text, 60)) + '</div>' : '') +
      '<div class="last-act' + (actInfo.stale ? ' stale' : '') + '" style="margin-top:4px;"><span class="dot"></span>' + actInfo.label + '</div>';

    var mainRow = '<tr class="task-row ' + rowCls + '" data-action="open-todo-modal" data-id="' + t.id + '">' +
      '<td class="col-desc-cell">' + descCell + '</td>' +
      '<td>' + esc(t.assignee) + '</td>' +
      '<td><div class="mono">' + fmtDateThai(t.dueDate) + '</div>' + (dueInfo ? '<div style="margin-top:3px;"><span class="due-pill ' + dueInfo.cls + '">' + dueInfo.label + '</span></div>' : '') + '</td>' +
      '<td><span class="badge ' + urg.cls + '">' + urg.label + '</span></td>' +
      '<td><span class="badge ' + imp.cls + '">' + imp.label + '</span></td>' +
      '<td>' + (isTodoOverdue(t) ? '<span class="badge badge-coral">เกินกำหนด</span>' : '<select class="todo-status-select" data-action="todo-status-select" data-id="' + t.id + '">' + statusOptions + '</select>') + '</td>' +
      '<td>' + noteBtn + '</td>' +
      '<td><button class="btn btn-danger btn-sm" data-action="delete-todo" data-id="' + t.id + '" data-stop="1">ลบ</button></td>' +
    '</tr>';

    return mainRow + notesPanelHtml;
  }

  var activeItems = sorted.filter(function(t){ return t.status !== 'done'; });
  var doneItems = sorted.filter(function(t){ return t.status === 'done'; });

  var colgroup = '<colgroup>' +
    '<col class="col-desc"><col class="col-assignee"><col class="col-due">' +
    '<col class="col-urg"><col class="col-imp"><col class="col-status">' +
    '<col class="col-note"><col class="col-del">' +
  '</colgroup>';
  var thead = '<thead><tr><th>รายละเอียดงาน</th><th>ผู้รับผิดชอบ</th><th>Due Date</th><th>ความเร่งด่วน</th><th>ความสำคัญ</th><th>สถานะ</th><th>บันทึก</th><th></th></tr></thead>';

  var activeTable = activeItems.length > 0
    ? '<div class="panel"><div class="table-wrap"><table class="tk tk-todo">' + colgroup + thead + '<tbody>' + activeItems.map(function(t){ return buildTodoRow(t, false); }).join('') + '</tbody></table></div></div>'
    : '<div class="empty-state" style="padding:28px 24px;">' +
        '<div class="es-icon">&#9989;</div>' +
        '<div class="es-title">ไม่มีงานที่ค้างอยู่</div>' +
        '<div class="es-sub">งานทั้งหมดในตัวกรองนี้เสร็จสมบูรณ์แล้ว</div>' +
      '</div>';

  var doneSection = '';
  if(doneItems.length > 0){
    doneSection = '<div style="margin-top:20px;">' +
      '<div class="section-label" style="color:var(--teal);">&#10003; งานที่เสร็จแล้ว &middot; ' + doneItems.length + ' รายการ</div>' +
      '<div class="panel" style="opacity:0.88;">' +
        '<div class="table-wrap"><table class="tk tk-todo">' + colgroup + thead + '<tbody>' + doneItems.map(function(t){ return buildTodoRow(t, true); }).join('') + '</tbody></table></div>' +
      '</div>' +
    '</div>';
  }

  return head + filterBoxes + statusChips + searchBar + activeTable + doneSection;
}

  '<div class="modal-body">' +
    '<div class="field"><label>รายละเอียดงาน *</label><textarea id="f-todo-desc" placeholder="รายละเอียดงานที่ต้องทำ...">' + (t?esc(t.description):'') + '</textarea></div>' +
    '<div class="field-row">' +
      '<div class="field"><label>ผู้รับผิดชอบ *</label><input type="text" id="f-todo-assignee" value="' + (t?esc(t.assignee):'') + '" placeholder="ชื่อผู้รับผิดชอบ"></div>' +

    '<div class="field"><label>ความสำคัญ (Importance)</label>' + buildOptionGrid('f-todo-importance-grid', PRIORITY_LEVELS, selectedImportance, '&#11088;') + '</div>' +
    '<div class="field"><label>สถานะ</label>' + buildOptionGrid('f-todo-status-grid', TODO_STATUSES, selectedStatus, '') + '</div>' +

  '<div class="modal-foot">' +
    (t ? '<button class="btn btn-danger" data-action="delete-todo" data-id="' + t.id + '">ลบ</button>' : '') +
    '<button class="btn btn-ghost" data-action="close-modal">ยกเลิก</button>' +
    '<button class="btn btn-primary" data-action="save-todo" data-id="' + (t?t.id:'') + '">' + (t?'บันทึกการแก้ไข':'+ เพิ่มงาน') + '</button>' +
  '</div>';
}

function renderOverviewView(){
  var head = '<div class="page-head">' +
      '<div><div class="page-title">ภาพรวมและภาระงาน</div><div class="page-desc">สรุปสถานะงานทั้งหมด (โปรเจกต์ + To-Do) และภาระงานของแต่ละคน</div></div>' +
    '</div>';

  // --- Period filter by Due Date ---
  var nowOv = new Date();
  var curMonthPrefix = nowOv.getFullYear() + '-' + ('0' + (nowOv.getMonth()+1)).slice(-2); // 'YYYY-MM'
  var curYearPrefix = String(nowOv.getFullYear()); // 'YYYY'
  var inPeriod = function(item){
    if(overviewPeriod === 'all') return true;
    if(!item.dueDate) return false;
    if(overviewPeriod === 'month') return item.dueDate.indexOf(curMonthPrefix) === 0;
    if(overviewPeriod === 'year') return item.dueDate.indexOf(curYearPrefix) === 0;
    return true;
  };
  var tasksArr = tasks.filter(inPeriod);
  var todosArr = todos.filter(inPeriod);

  var thaiMonth = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][nowOv.getMonth()];
  var periodLabel = overviewPeriod === 'month' ? ('เดือน ' + thaiMonth + ' ' + (nowOv.getFullYear()+543))
    : overviewPeriod === 'year' ? ('ปี พ.ศ. ' + (nowOv.getFullYear()+543))
    : 'ทั้งหมด';
  var periodBtns = '<div class="ov-period-bar">' +
    '<span class="ov-period-caption">ช่วงเวลา (ตาม Due Date):</span>' +
    '<button class="ov-period-btn' + (overviewPeriod==='month'?' active':'') + '" data-action="set-overview-period" data-key="month">เดือนนี้</button>' +
    '<button class="ov-period-btn' + (overviewPeriod==='year'?' active':'') + '" data-action="set-overview-period" data-key="year">ปีนี้</button>' +
    '<button class="ov-period-btn' + (overviewPeriod==='all'?' active':'') + '" data-action="set-overview-period" data-key="all">ทั้งหมด</button>' +
    '<span class="ov-period-now">กำลังแสดง: <b>' + periodLabel + '</b></span>' +
  '</div>';

  var totalProjects = projects.length;

  // --- Merged stats: project tasks ---
  var tskDone = tasksArr.filter(function(t){ return Number(t.progress)===100; }).length;
  var tskOverdue = tasksArr.filter(isOverdue).length;
  var tskInProgress = tasksArr.filter(function(t){ var p=Number(t.progress); return p>0 && p<100 && !isOverdue(t); }).length;
  var tskNotStarted = tasksArr.filter(function(t){ return Number(t.progress)===0 && !isOverdue(t); }).length;

  // --- Merged stats: todos ---
  var tdDone = todosArr.filter(function(t){ return t.status==='done'; }).length;
  var tdOverdue = todosArr.filter(isTodoOverdue).length;
  var tdInProgress = todosArr.filter(function(t){ return t.status==='in_progress' && !isTodoOverdue(t); }).length;
  var tdNotStarted = todosArr.filter(function(t){ return t.status==='not_started' && !isTodoOverdue(t); }).length;

  // --- Grand totals ---
  var grandTotal = tasksArr.length + todosArr.length;
  var grandDone = tskDone + tdDone;
  var grandOverdue = tskOverdue + tdOverdue;
  var grandInProgress = tskInProgress + tdInProgress;
  var grandNotStarted = tskNotStarted + tdNotStarted;
  var completionRate = grandTotal ? Math.round(grandDone/grandTotal*100) : 0;

  if(grandTotal === 0){
    return head + periodBtns + '<div class="empty-state">' +
      '<div class="es-icon">&#128202;</div>' +
      '<div class="es-title">ยังไม่มีข้อมูลงานในช่วงเวลานี้</div>' +
      '<div class="es-sub">ลองเปลี่ยนช่วงเวลาเป็น "ทั้งหมด" หรือเพิ่มงานที่มีวันกำหนดส่งในช่วงนี้</div>' +
    '</div>';
  }

  // KPIs
  var kpis = '<div class="kpi-grid">' +
    '<div class="panel kpi-card kpi-card-dual" style="--accent:var(--navy)">' +
      '<div class="kpi-label">โปรเจกต์ &amp; To-Do</div>' +
      '<div class="kpi-dual-row">' +
        '<div class="kpi-dual-item"><div class="kpi-value kpi-value-sm">' + totalProjects + '</div><div class="kpi-dual-caption">โปรเจกต์</div></div>' +
        '<div class="kpi-dual-divider"></div>' +
        '<div class="kpi-dual-item"><div class="kpi-value kpi-value-sm">' + todosArr.length + '</div><div class="kpi-dual-caption">To-Do</div></div>' +
      '</div>' +
      '<div class="kpi-foot">งานในโปรเจกต์ทั้งหมด ' + tasksArr.length + ' งาน</div>' +
    '</div>' +
    '<div class="panel kpi-card" style="--accent:var(--teal)"><div class="kpi-label">เสร็จสมบูรณ์</div><div class="kpi-value">' + completionRate + '%</div><div class="kpi-foot">' + grandDone + ' จาก ' + grandTotal + ' งานทั้งหมด</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--amber)"><div class="kpi-label">กำลังดำเนินการ</div><div class="kpi-value">' + grandInProgress + '</div><div class="kpi-foot">ยังไม่ได้เริ่ม ' + grandNotStarted + ' งาน</div></div>' +
    '<div class="panel kpi-card" style="--accent:var(--coral)"><div class="kpi-label">เลยกำหนด</div><div class="kpi-value">' + grandOverdue + '</div><div class="kpi-foot">ต้องติดตามเร่งด่วน</div></div>' +
  '</div>';

  // Unified donut
  var segs = [
    {key:'ns', n:grandNotStarted, c:'var(--slate)', label:'ยังไม่ได้เริ่ม'},
    {key:'ip', n:grandInProgress, c:'var(--amber)', label:'กำลังดำเนินการ'},
    {key:'dn', n:grandDone, c:'var(--teal)', label:'เสร็จสมบูรณ์'},
    {key:'od', n:grandOverdue, c:'var(--coral)', label:'เลยกำหนด'}
  ];
  var donutSegs = segs.map(function(s){ return {value:s.n, color:s.c}; });
  var donutSvg = buildDonutSvg(donutSegs, {size:152, thickness:22, centerLabel:completionRate+'%', centerSub:'เสร็จสมบูรณ์'});

  var makeSourceRow = function(label, ns, ip, dn, od, total, icon){
    return '<div style="margin-bottom:10px;">' +
      '<div style="font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;">' + icon + ' ' + label + ' <span class="mono" style="color:var(--ink);">' + total + '</span></div>' +
      '<div style="display:flex; gap:14px; flex-wrap:wrap;">' +
        '<span style="font-size:12px; color:var(--ink-soft);">ยังไม่เริ่ม <span class="mono" style="color:var(--slate); font-weight:700;">' + ns + '</span></span>' +
        '<span style="font-size:12px; color:var(--ink-soft);">กำลังทำ <span class="mono" style="color:var(--amber); font-weight:700;">' + ip + '</span></span>' +
        '<span style="font-size:12px; color:var(--ink-soft);">เสร็จ <span class="mono" style="color:var(--teal); font-weight:700;">' + dn + '</span></span>' +
        (od ? '<span style="font-size:12px; color:var(--coral); font-weight:700;">เลยกำหนด ' + od + '</span>' : '') +
      '</div>' +
    '</div>';
  };
  var legendRows = segs.map(function(s){
    var pct = grandTotal ? Math.round(s.n/grandTotal*100) : 0;
    return '<div style="display:flex; align-items:center; gap:9px; padding:5px 0; border-bottom:1px solid var(--line-soft);">' +
      '<span style="width:11px; height:11px; border-radius:3px; background:' + s.c + '; flex-shrink:0;"></span>' +
      '<span style="flex:1; font-size:13px; color:var(--ink);">' + s.label + '</span>' +
      '<span class="mono" style="font-size:13px; font-weight:700; color:var(--ink);">' + s.n + '</span>' +
      '<span class="mono" style="font-size:11.5px; color:var(--ink-faint); min-width:36px; text-align:right;">' + pct + '%</span>' +
    '</div>';
  }).join('');
  var sourceSummary = makeSourceRow('งานโปรเจกต์', tskNotStarted, tskInProgress, tskDone, tskOverdue, tasksArr.length, '&#128203;') +
    (todosArr.length > 0 ? makeSourceRow('To-Do List', tdNotStarted, tdInProgress, tdDone, tdOverdue, todosArr.length, '&#128221;') : '');
  var statusDonutPanel = '<div class="panel" style="padding:18px 20px; margin-bottom:20px; display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap;">' +
    '<div style="display:flex; flex-direction:column; align-items:center; gap:6px;">' +
      donutSvg +
      '<div style="font-size:11px; color:var(--ink-faint);">รวม ' + grandTotal + ' งาน</div>' +
    '</div>' +
    '<div style="flex:1; min-width:220px;">' +
      '<div class="section-label" style="margin-top:0; margin-bottom:10px;">สัดส่วนสถานะ (ภาพรวม)</div>' +
      legendRows +
      '<div style="margin-top:14px; padding-top:12px; border-top:1.5px dashed var(--line);">' +
        sourceSummary +
      '</div>' +
    '</div>' +
  '</div>';

  // --- Unified workload by person (merge tasks + todos) ---
  var segLabel = function(pctOfBar, text){ return pctOfBar >= 13 ? ('<span class="wl-seg-label">' + text + '</span>') : ''; };

  var byPerson = {};
  // Group by PROJECT OWNER, not by each task's assignee — 1 project = 1 workload item.
  // Status reflects the average progress across all tasks in that project (within the selected period).
  var tasksByProject = {};
  tasksArr.forEach(function(t){
    if(!tasksByProject[t.projectId]) tasksByProject[t.projectId] = [];
    tasksByProject[t.projectId].push(t);
  });
  projects.forEach(function(proj){
    var projTasks = tasksByProject[proj.id];
    if(!projTasks || !projTasks.length) return; // no tasks in this period → project doesn't count
    var ownerKey = (proj.owner || 'ไม่ระบุ').trim() || 'ไม่ระบุ';
    if(!byPerson[ownerKey]) byPerson[ownerKey] = {taskItems:[], todoItems:[]};
    var avgProgress = Math.round(projTasks.reduce(function(s,t){ return s + Number(t.progress); }, 0) / projTasks.length);
    var anyOverdue = projTasks.some(isOverdue);
    var latestDue = projTasks.reduce(function(d,t){ return (!d || (t.dueDate && t.dueDate > d)) ? t.dueDate : d; }, null);
    // Synthetic "task" representing the whole project for this owner's workload tally
    byPerson[ownerKey].taskItems.push({
      id: 'proj-' + proj.id,
      title: proj.name,
      progress: avgProgress,
      dueDate: latestDue,
      __isProjectRollup: true,
      __projectId: proj.id,
      __overdueOverride: anyOverdue && avgProgress < 100
    });
  });
  todosArr.forEach(function(td){
    var key = (td.assignee || 'ไม่ระบุ').trim() || 'ไม่ระบุ';
    if(!byPerson[key]) byPerson[key] = {taskItems:[], todoItems:[]};
    byPerson[key].todoItems.push(td);
  });
  var isTaskOverdue = function(t){ return t.__isProjectRollup ? t.__overdueOverride : isOverdue(t); };
  var persons = Object.keys(byPerson).sort(function(a,b){
    var ta = byPerson[a].taskItems.length + byPerson[a].todoItems.length;
    var tb = byPerson[b].taskItems.length + byPerson[b].todoItems.length;
    return tb - ta;
  });
  var maxPersonCount = persons.length ? (byPerson[persons[0]].taskItems.length + byPerson[persons[0]].todoItems.length) : 1;

  var wlRows = persons.map(function(name){
    var pd = byPerson[name];
    // task stats (now: 1 row per project owned)
    var tns = pd.taskItems.filter(function(t){ return Number(t.progress)===0 && !isTaskOverdue(t); }).length;
    var tip = pd.taskItems.filter(function(t){ var p=Number(t.progress); return p>0 && p<100 && !isTaskOverdue(t); }).length;
    var tdn = pd.taskItems.filter(function(t){ return Number(t.progress)===100; }).length;
    var tod = pd.taskItems.filter(isTaskOverdue).length;
    // todo stats
    var dns = pd.todoItems.filter(function(t){ return t.status==='not_started' && !isTodoOverdue(t); }).length;
    var dip = pd.todoItems.filter(function(t){ return t.status==='in_progress' && !isTodoOverdue(t); }).length;
    var ddn = pd.todoItems.filter(function(t){ return t.status==='done'; }).length;
    var dod = pd.todoItems.filter(isTodoOverdue).length;
    // totals
    var ns = tns + dns, ip = tip + dip, dn = tdn + ddn, od = tod + dod;
    var total = pd.taskItems.length + pd.todoItems.length;
    var widthPct = (total / maxPersonCount * 100);
    var donePct = total ? Math.round(dn/total*100) : 0;
    var ring = buildDonutSvg([{value:dn,color:'var(--teal)'},{value:total-dn,color:'var(--slate-soft)'}], {size:46, thickness:6, centerLabel:donePct+'%', labelSize:11});
    var taskBadge = pd.taskItems.length ? ('<span style="font-size:10px; background:var(--navy-soft); color:var(--navy); border-radius:4px; padding:1px 5px; font-weight:700; margin-left:4px;">โปรเจกต์:' + pd.taskItems.length + '</span>') : '';
    var todoBadge = pd.todoItems.length ? ('<span style="font-size:10px; background:var(--teal-soft); color:#1D7468; border-radius:4px; padding:1px 5px; font-weight:700; margin-left:2px;">T:' + pd.todoItems.length + '</span>') : '';

    // Build the "unfinished work" list for this person (projects not at 100%, todos not done)
    var unfinished = [];
    pd.taskItems.forEach(function(t){
      if(Number(t.progress) !== 100){
        unfinished.push({ kind:'project', id:t.__projectId, title:t.title, progress:Number(t.progress), dueDate:t.dueDate, overdue: isTaskOverdue(t) });
      }
    });
    pd.todoItems.forEach(function(td){
      if(td.status !== 'done'){
        unfinished.push({ kind:'todo', id:td.id, title:td.description, status:td.status, dueDate:td.dueDate, overdue: isTodoOverdue(td) });
      }
    });
    wlUnfinishedByPerson[name] = unfinished;
    var nameClickable = unfinished.length > 0;

    return '<div class="wl-row">' +
      '<div class="wl-ring">' + ring + '</div>' +
      '<div><div class="wl-name' + (nameClickable ? ' wl-name-clickable' : '') + '"' + (nameClickable ? ' data-action="open-person-unfinished" data-person="' + esc(name) + '"' : '') + '>' + esc(name) + (nameClickable ? ' <span class="wl-name-arrow">&#8250;</span>' : '') + taskBadge + todoBadge + '</div><div class="wl-name-sub">' + total + ' งานรวม' + (unfinished.length ? ' &middot; ค้าง ' + unfinished.length : '') + '</div></div>' +
      '<div class="wl-bar-track" style="width:' + widthPct + '%;">' +
        (ns ? '<div class="wl-bar-seg" style="width:' + (ns/total*100) + '%; background:var(--slate);">' + segLabel(ns/total*100, ns) + '</div>' : '') +
        (ip ? '<div class="wl-bar-seg" style="width:' + (ip/total*100) + '%; background:var(--amber);">' + segLabel(ip/total*100, ip) + '</div>' : '') +
        (dn ? '<div class="wl-bar-seg" style="width:' + (dn/total*100) + '%; background:var(--teal);">' + segLabel(dn/total*100, dn) + '</div>' : '') +
        (od ? '<div class="wl-bar-seg" style="width:' + (od/total*100) + '%; background:var(--coral);">' + segLabel(od/total*100, od) + '</div>' : '') +
      '</div>' +
      '<div class="wl-stats">' +
        '<span>ยังไม่เริ่ม <b>' + ns + '</b></span><span>กำลังทำ <b>' + ip + '</b></span><span>เสร็จ <b>' + dn + '</b></span>' + (od ? '<span style="color:var(--coral);">เลยกำหนด <b>' + od + '</b></span>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  var wlLegend = '<div style="display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-soft);">' +
    '<span><b style="color:var(--navy);">โปรเจกต์:n</b> = จำนวนโปรเจกต์ที่เป็นเจ้าของ (คิดความสำเร็จจากค่าเฉลี่ยของงานในโปรเจกต์) &nbsp; <b style="color:#1D7468;">T:n</b> = To-Do List</span>' +
  '</div>';
  var workloadPanel = persons.length > 0 ? (
    '<div class="panel" style="padding:18px 18px 6px 18px; margin-top:0;">' +
      '<div class="section-label" style="margin-top:0;">ภาระงานของแต่ละคน (เจ้าของโปรเจกต์ + To-Do รวม)</div>' +
      wlLegend + wlRows +
    '</div>'
  ) : '';

  return head + periodBtns + kpis + statusDonutPanel + workloadPanel;
}

function handleSaveProject(editId){
  var name = document.getElementById('f-project-name').value.trim();
  var desc = document.getElementById('f-project-desc').value.trim();
  var owner = document.getElementById('f-project-owner').value.trim();
  var category = document.getElementById('f-project-category-grid').getAttribute('data-selected');
  var categoryOtherEl = document.getElementById('f-project-category-other');
  var categoryOther = categoryOtherEl ? categoryOtherEl.value.trim() : '';
  var priority = document.getElementById('f-project-priority-grid').getAttribute('data-selected');
  var color = document.getElementById('f-project-swatches').getAttribute('data-color');
  var errEl = document.getElementById('f-project-error');
  if(!name){ errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  var proj;
  if(editId){
    proj = projectById(editId);
    if(proj){
      proj.name = name; proj.description = desc; proj.color = color;
      proj.owner = owner; proj.category = category; proj.categoryOther = categoryOther; proj.priority = priority;
    }
  } else {
    proj = { id: uid('proj'), name: name, description: desc, color: color, owner: owner, category: category, categoryOther: categoryOther, priority: priority, createdAt: Date.now() };
    projects.push(proj);
  }
  pushProject(proj);
  closeModal();
  render();
}

    var deptEl = rowEls[ri].querySelector('.f-assignee-dept');
    var nm = nameEl ? nameEl.value.trim() : '';
    var dp = deptEl ? deptEl.value.trim() : '';
    if(nm) assignees.push({ name: nm, dept: dp });
  }
  var start = document.getElementById('f-task-start').value;
  var due = document.getElementById('f-task-due').value;
  var progress = document.getElementById('f-task-progress').value;
  var errEl = document.getElementById('f-task-error');

  if(!title || !assignees.length || !start || !due){
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ: ชื่องาน ผู้รับผิดชอบอย่างน้อย 1 คน วันเริ่มต้น และวันกำหนดส่ง';
    errEl.classList.add('show');
    return;
  }
  if(due < start){
    errEl.textContent = 'วันกำหนดส่งต้องไม่อยู่ก่อนวันเริ่มต้น';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  var task;
  if(editId){
    task = taskById(editId);
    if(task){
      var oldProgress = Number(task.progress);
      task.title = title; task.assignees = assignees; delete task.assignee; task.startDate = start; task.dueDate = due; task.progress = Number(progress); task.updatedAt = Date.now();
      if(Number(progress) !== oldProgress){
        addActivity(task, 'progress', 'ปรับความคืบหน้า ' + oldProgress + '% → ' + Number(progress) + '%');
      }
    }
  } else {
    task = { id: uid('task'), projectId: projectId, title: title, assignees: assignees, startDate: start, dueDate: due, progress: Number(progress), notes: [], createdAt: Date.now() };
    addActivity(task, 'created', 'สร้างงาน (ความคืบหน้าเริ่มต้น ' + Number(progress) + '%)');
    tasks.push(task);
  }
  pushTask(task);
  closeModal();
  render();
}

  var dataRows = [['ลำดับ','ชื่องาน','ผู้รับผิดชอบ','วันเริ่มต้น','วันกำหนดส่ง','ระยะเวลา (วัน)','ความคืบหน้า (%)','สถานะ','เกินกำหนด (วัน)','บันทึกล่าสุด']];

  XLSX.writeFile(wb, fileBase + '.xlsx');
}

/* ===================== Export Gantt chart as PNG image ===================== */
function exportProjectGantt(pid){
  var p = projectById(pid);
  if(!p) return;
  var pt = sortByStartDate(tasksOfProject(pid));
  var validTasks = pt.filter(function(t){ return t.startDate && t.dueDate; });
  if(!validTasks.length){ alert('โปรเจกต์นี้ยังไม่มีงานที่มีวันเริ่มต้นและวันกำหนดส่งครบถ้วนสำหรับสร้างแผนภูมิ'); return; }

  if(typeof html2canvas === 'undefined'){
    alert('กำลังโหลดไลบรารีสำหรับสร้างรูปภาพ กรุณารอสักครู่แล้วลองใหม่');
    return;
  }

  // Step 1: ensure we are viewing this project's detail with Gantt fit to full project
  var needFit = (ganttRangeStart !== null || ganttRangeEnd !== null || ganttZoomMode !== 'custom' || currentView !== 'projects' || currentProjectId !== pid);
  currentView = 'projects';
  currentProjectId = pid;
  ganttRangeStart = null;   // null = auto-fit to whole project
  ganttRangeEnd = null;
  ganttZoomMode = 'custom';
  render();

  // Step 2: after DOM paints, capture the gantt at full (un-scrolled) width
  setTimeout(function(){
    var wrap = document.querySelector('.gantt-wrap');
    if(!wrap){ alert('ไม่พบแผนภูมิ Gantt บนหน้าจอ กรุณาลองใหม่'); return; }
    var scroll = wrap.querySelector('.gantt-scroll');
    var timeline = wrap.querySelector('.gantt-timeline');
    if(!scroll || !timeline){ alert('ไม่พบตาราง Gantt'); return; }

    // ---- Collect elements we will temporarily modify, with their original inline styles ----
    var modified = []; // {el, prop, prev}
    var setStyle = function(el, prop, val){ if(!el) return; modified.push({el:el, prop:prop, prev:el.style[prop]}); el.style[prop] = val; };

    // 1) Expand scroll container so the full timeline width is captured (no clipping)
    var fullW = timeline.scrollWidth;
    var labelsW = wrap.querySelector('.gantt-labels') ? wrap.querySelector('.gantt-labels').offsetWidth : 0;
    setStyle(scroll, 'overflow', 'visible');
    setStyle(scroll, 'width', fullW + 'px');
    setStyle(wrap, 'width', (labelsW + fullW) + 'px');

    // 2) Hide the "today" vertical line(s) + label(s) — rendered in both tick-row and body-rows
    var todayEls = wrap.querySelectorAll('.gantt-today-line, .gantt-today-label');
    for(var ti=0; ti<todayEls.length; ti++){ setStyle(todayEls[ti], 'display', 'none'); }

    // 3) Replace striped overrun gradient (html2canvas can't render repeating-linear-gradient) with solid coral
    var overruns = wrap.querySelectorAll('.gantt-overrun');
    for(var oi=0; oi<overruns.length; oi++){
      setStyle(overruns[oi], 'background', '#D9614F');
      setStyle(overruns[oi], 'backgroundImage', 'none');
    }

    // 4) Capture gantt, then compose a legend bar on top of the resulting canvas
    var restore = function(){
      for(var i=modified.length-1; i>=0; i--){ modified[i].el.style[modified[i].prop] = modified[i].prev; }
    };

    html2canvas(wrap, {
      backgroundColor: '#FFFFFF',
      scale: 2,
      useCORS: true,
      logging: false,
      scrollX: 0,
      scrollY: 0,
      width: wrap.scrollWidth,
      height: wrap.scrollHeight,
      windowWidth: wrap.scrollWidth + 120,
      windowHeight: wrap.scrollHeight + 120
    }).then(function(ganttCanvas){
      restore();

      // Compose final canvas: legend header + title on top, gantt below
      var SCALE = 2;
      var legendH = 52 * SCALE;
      var gw = ganttCanvas.width;
      var gh = ganttCanvas.height;
      var out = document.createElement('canvas');
      out.width = gw;
      out.height = gh + legendH;
      var cx = out.getContext('2d');

      // white background
      cx.fillStyle = '#FFFFFF';
      cx.fillRect(0, 0, out.width, out.height);

      // legend bar
      var padX = 18 * SCALE;
      var fontPx = 14 * SCALE;
      var cy = legendH / 2;
      // project title
      cx.textBaseline = 'middle';
      cx.font = '700 ' + fontPx + 'px \"IBM Plex Sans\", Arial, sans-serif';
      cx.fillStyle = '#1C2733';
      var titleText = p.name;
      cx.fillText(titleText, padX, cy);
      var cursorX = padX + cx.measureText(titleText).width + 28 * SCALE;

      var legendItems = [
        {c:'#7C8DA0', t:'ยังไม่ได้เริ่ม'},
        {c:'#E8954B', t:'กำลังดำเนินการ'},
        {c:'#2A9D8F', t:'เสร็จสมบูรณ์'},
        {c:'#D9614F', t:'เกินกำหนด'}
      ];
      var boxSz = 13 * SCALE;
      cx.font = '500 ' + (12.5 * SCALE) + 'px \"IBM Plex Sans\", Arial, sans-serif';
      legendItems.forEach(function(it){
        cx.fillStyle = it.c;
        roundRect(cx, cursorX, cy - boxSz/2, boxSz, boxSz, 3 * SCALE);
        cx.fill();
        cursorX += boxSz + 7 * SCALE;
        cx.fillStyle = '#46586A';
        cx.fillText(it.t, cursorX, cy);
        cursorX += cx.measureText(it.t).width + 22 * SCALE;
      });
      // export date (right aligned)
      cx.font = '400 ' + (11.5 * SCALE) + 'px \"IBM Plex Sans\", Arial, sans-serif';
      cx.fillStyle = '#94A2AF';
      cx.textAlign = 'right';
      cx.fillText('ส่งออก ' + fmtDateThai(todayStr()), gw - padX, cy);
      cx.textAlign = 'left';

      // divider under legend
      cx.strokeStyle = '#E3EAF0';
      cx.lineWidth = 1 * SCALE;
      cx.beginPath();
      cx.moveTo(0, legendH - 0.5 * SCALE);
      cx.lineTo(gw, legendH - 0.5 * SCALE);
      cx.stroke();

      // draw the gantt below
      cx.drawImage(ganttCanvas, 0, legendH);

      var safeName = p.name.replace(/[^a-zA-Z0-9\u0e00-\u0e7f_\- ]+/g, '_').trim() || 'project';
      var link = document.createElement('a');
      link.download = 'QAQC_' + safeName + '_' + todayStr() + '_Gantt.png';
      link.href = out.toDataURL('image/png');
      link.click();
    }).catch(function(err){
      restore();
      console.warn('Gantt capture failed:', err);
      alert('เกิดข้อผิดพลาดในการสร้างรูปภาพ Gantt chart กรุณาลองใหม่อีกครั้ง');
    });
  }, needFit ? 450 : 250);
}

// Helper: rounded rectangle path for canvas
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

document.addEventListener('click', function(e){
  var overlay = e.target.classList && e.target.classList.contains('modal-overlay');
  if(overlay){ closeModal(); return; }

  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.getAttribute('data-action');
  var id = el.getAttribute('data-id');

  switch(action){
    case 'open-person-unfinished':
      var personName = el.getAttribute('data-person');
      openModal(personUnfinishedModalHtml(personName));
      break;
    case 'goto-unfinished-item':
      var ufPerson = el.getAttribute('data-person');
      var ufIdx = Number(el.getAttribute('data-idx'));
      var ufItems = wlUnfinishedByPerson[ufPerson] || [];
      var ufItem = ufItems[ufIdx];
      if(ufItem){
        closeModal();
        if(ufItem.kind === 'project'){
          // Project rollup represents the whole project (not a single task) — go to its detail page
          currentView = 'projects';
          currentProjectId = ufItem.id;
          render();
        } else {
          currentView = 'todos';
          currentProjectId = null;
          render();
          openModal(todoModalHtml(ufItem.id));
        }
      }
      break;
    case 'goto-view':
      currentView = el.getAttribute('data-view');
      if(currentView !== 'projects') currentProjectId = null;
      render();
      break;
    case 'back-to-projects':
      currentProjectId = null;
      render();
      break;
    case 'open-project':
      currentProjectId = id;
      render();
      break;
    case 'open-project-modal':
      openModal(projectModalHtml(null));
      break;
    case 'edit-project':
      openModal(projectModalHtml(id));
      break;
    case 'delete-project':
      handleDeleteProject(id);
      break;
    case 'pick-color':
      var wrap = el.closest('.swatches');
      wrap.setAttribute('data-color', el.getAttribute('data-color'));
      Array.prototype.forEach.call(wrap.querySelectorAll('.swatch'), function(sw){ sw.classList.remove('selected'); });
      el.classList.add('selected');
      break;
    case 'select-category':
      var catId = el.getAttribute('data-cat-id');
      var catGrid = document.getElementById('f-project-category-grid');
      catGrid.setAttribute('data-selected', catId);
      Array.prototype.forEach.call(catGrid.querySelectorAll('.category-card'), function(card){
        var isSel = card.getAttribute('data-cat-id') === catId;
        card.classList.toggle('selected', isSel);
        var checkEl = card.querySelector('.cc-check');
        if(isSel && !checkEl){
          card.querySelector('.cc-title').insertAdjacentHTML('beforeend', ' <span class="cc-check">&#10003;</span>');
        } else if(!isSel && checkEl){
          checkEl.remove();
        }
      });
      var otherWrap = document.getElementById('f-category-other-wrap');
      if(otherWrap) otherWrap.style.display = (catId === 'other') ? 'block' : 'none';
      break;
    case 'select-option':
      var val = el.getAttribute('data-val');
      var grid = el.closest('.priority-grid');
      grid.setAttribute('data-selected', val);
      Array.prototype.forEach.call(grid.querySelectorAll('.priority-btn'), function(btn){
        var isSel = btn.getAttribute('data-val') === val;
        btn.classList.toggle('selected', isSel);
        var tint = btn.getAttribute('data-tint');
        btn.style.background = isSel ? tint : '';
      });
      break;
    case 'save-project':
      handleSaveProject(id || null);
      break;
    case 'open-task-modal':
      openModal(taskModalHtml(id, null));
      break;
    case 'open-edit-task':
      var tk = taskById(id);
      if(tk) openModal(taskModalHtml(tk.projectId, id));
      break;
    case 'add-assignee-row':
      e.stopPropagation();
      var rowsContainer = document.getElementById('f-task-assignee-rows');
      if(rowsContainer){
        var newRow = document.createElement('div');
        newRow.className = 'assignee-row';
        newRow.setAttribute('data-assignee-row', '');
        newRow.innerHTML = '<input type="text" class="f-assignee-name" placeholder="ชื่อผู้รับผิดชอบ">' +
          '<input type="text" class="f-assignee-dept" placeholder="ฝ่าย (เช่น QA, Production)">' +
          '<button type="button" class="btn btn-ghost btn-sm assignee-remove-btn" data-action="remove-assignee-row" title="ลบแถวนี้">&times;</button>';
        rowsContainer.appendChild(newRow);
        newRow.querySelector('.f-assignee-name').focus();

      break;
    case 'export-project-excel':

      break;
    case 'clear-project-filters':
      projectFilterCategory = 'all';
      projectFilterPriority = 'all';
      projectFilterOwner = '';
      render();

    case 'apply-gantt-range':
      var gs = document.getElementById('gantt-range-start').value;
      var ge = document.getElementById('gantt-range-end').value;
      if(gs && ge && gs <= ge){ ganttRangeStart = gs; ganttRangeEnd = ge; ganttZoomMode = 'custom'; }
      render();
      break;
    case 'fit-gantt-range':
      ganttRangeStart = null;
      ganttRangeEnd = null;
      ganttZoomMode = 'custom';
      render();
      break;
    case 'gantt-zoom-month':
      var nowM = new Date();
      ganttRangeStart = toDateStr(firstDayOfMonth(nowM));
      ganttRangeEnd = toDateStr(lastDayOfMonth(nowM));
      ganttZoomMode = 'month';
      render();
      break;
    case 'gantt-zoom-week':
      var nowW = new Date();
      var monday = mostRecentMonday(nowW);
      ganttRangeStart = toDateStr(monday);
      ganttRangeEnd = toDateStr(addDays(monday, 6));
      ganttZoomMode = 'week';
      render();
      break;
    case 'gantt-zoom-custom':
      ganttZoomMode = 'custom';
      render();
      break;
    case 'gantt-jump-today':
      var nowT = new Date();
      ganttRangeStart = toDateStr(addDays(nowT, -7));
      ganttRangeEnd = toDateStr(addDays(nowT, 30));
      ganttZoomMode = 'custom';
      render();
      break;
    case 'toggle-gantt-group':
      ganttCollapsed[id] = !ganttCollapsed[id];
      render();
      break;
    case 'close-modal':
      closeModal();
      break;
    default:
      break;
  }
}, false);

document.addEventListener('change', function(e){
  if(!e.target) return;
  var action = e.target.getAttribute('data-action');
  if(action === 'filter-gantt'){
    ganttFilterProject = e.target.value;
    render();
    return;
  }
  if(action === 'filter-project-category'){
    projectFilterCategory = e.target.value;
    render();
    return;
  }
  if(action === 'filter-project-priority'){
    projectFilterPriority = e.target.value;
    render();
    return;
  }
  if(action === 'todo-status-select'){
    var todoId = e.target.getAttribute('data-id');
    var td = todoById(todoId);
    if(td){
      var oldSt = td.status;
      td.status = e.target.value; td.updatedAt = Date.now();
      if(e.target.value !== oldSt){
        addActivity(td, 'status', 'เปลี่ยนสถานะเป็น "' + ((todoStatusById(e.target.value)||{}).label||e.target.value) + '"');
      }
      pushTodo(td);
    }
    render();
    return;
  }
}, false);

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
  if(e.key === 'Enter' && e.target && e.target.id === 'f-filter-owner'){
    projectFilterOwner = e.target.value.trim();
    render();
  }
}, false);

/* ===================== Init ===================== */
render();
loadAll();

})();
</script>
</body>
</html>
